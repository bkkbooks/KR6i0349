body:
  text: 劉宋天竺沙門求那跋陀羅譯皇明吳興後學沙門廣莫參訂夏官大夫攜李袁黃閲正一切佛語心品第一之二復次大慧非幻無有相似見一切法如幻唐譯云復次大慧見諸法非幻無有相似故説一切法如幻此承前惑亂如幻意以明非幻不可以喻其妄也古注云言諸妄法離幻更無相似故説一切法如幻大慧白佛言世尊為種種幻相計著言一切法如幻為異相計著魏譯云大慧言世尊為執著諸法如幻相故言諸法如幻為執著諸法顛倒相故言諸法如幻也按魏譯可解大意為以種種惑亂作幻相計著言一切法如幻耶為以種種差別異相計著言一切法如幻耶此躡上意為問蓋以幻相觀察諸法則不見種種異相若以惑亂諸異觀察則不離顛倒見矣然以幻相觀者亦未離過故下文獨難幻相見者若種種幻相計著言一切性如幻者世尊有性不如幻者所以者何謂色種種相非因世尊無有因色種種相現如幻世尊是故無種種幻相計著相似性如幻魏譯云若執著諸法如幻相者世尊不得言一切法皆如幻相若執著諸法顛倒相故言如幻者不得言一切法如幻何以故世尊色有種種因相見故世尊無有異因色有諸相可見如幻是故世尊不得説言執著諸法一切如幻若種下牒前幻意世尊下辨色非幻謂本質色實有其體不如幻者所以下徵明非幻之意謂色有種種相實在不滅非幻因故若無因之色可説如幻本質色性豈説如幻是故計著種種幻相言一切法如幻者過矣今文太簡取魏譯參看詳審會意可解佛告大慧非種種幻相計著相似一切法如幻大慧然不實一切法速滅如電是則如幻佛告下牒非所難然不下佛出正意佛意謂如幻者非例幻相但因諸法速滅不實故言如幻也大慧譬如電光剎那頃現現已即滅非愚夫現非愚夫現魏譯作凡夫不見非愚夫現者按魏譯意謂諸法剎那起滅如電之速智者能了凡夫不見言其不悟也今文蓋謂如電不實非如愚夫妄計現體實故如是一切性自妄想自共相觀察無性非現色相計著唐譯云一切諸法依自分別自共相現亦復如是以不能觀察無所有故而妄計著種種色相此合電光之喻也如是二字是法合語與唐譯亦復如是句同謂一切性雖剎那現現即非現由自心妄想分別自共相故而有現也若觀察性即無性則非現矣故云非現色相計著爾時世尊欲重宣此義而説偈言非幻無有譬説法性如幻不實速如電是故説如幻重頌可解大慧復白佛言如世尊所説一切性無生及如幻將無世尊前後所説自相違耶説無生性如幻如世下唐譯云如佛先説一切諸法皆悉無生又言如幻將非所説前後相違集注云大慧以如來前後説法性説無生説如幻意謂幻與無生是無諸法之性是有故曰自相違耶佛告大慧非我説無生性如幻前後相違過所以者何謂生無生覺自心現量有非有外性非性無生現唐譯云佛言大慧無有相違何以故我了於生即是無生唯是自心之所見故若有若無一切外法見其無性本不生故大慧非我前後相違過然壞外道因生故我説一切性無生大慧外道癡聚欲令有無有生非自妄想種種計著緣大慧我非有無有生是故我以無生説而説外道癡聚欲令諸法之有從無而生非如世尊説一切法從自妄想種種計著因緣生故破彼邪計生因故説無生若執無生猶未離妄大慧説性者為攝受生死故壞無見斷見故為我弟子攝受種種業受生處故以聲性説攝受生死集注云聲者法也前説一切諸法之性者為攝受生死破外道空見斷見故又欲令諸弟子離此二見以法性之説攝受生死大慧説幻性自性相為離性自性相故墮愚夫惡見相希望不知自心現量壞因所作生緣自性相計著説幻夢自性相一切法不令愚夫惡見希望計著自及他一切法如實處作不正論魏譯云我説一切法如幻者為令一切愚癡凡夫畢竟能離自相同相故以諸凡夫癡心執著墮於邪見以不能知但是自心虗妄見故令離執著因緣生法是故我説一切諸法如幻如夢無有實體何以故若不如是説者愚癡凡夫執邪見心欺誑自身及於他身離如實見一切法故説如幻性者為令愚夫離性相執故愚夫墮於惡見希望是故不知自心現量今欲壞彼因所作生緣計著故説一切法如幻如夢不令愚夫墮於惡見墮惡見故計著自他諸法乃以如實處亦作不正之論大慧如實處見一切法者謂超自心現量超魏譯作入唐譯作了達此承明如實處義謂如實處見一切法皆是性上無作功德故超自心現量爾時世尊欲重宣此義而説偈言無生作非性有性攝生死觀察如幻等於相不妄想觀察二字通上二句謂能觀察無生法性如幻等故於諸性相不生妄想復次大慧當説名句形身相善觀名句形身菩薩摩訶薩隨入義句形身疾得阿耨多羅三藐三菩提如是覺已覺一切衆生善觀下顯名句形身之益也謂諸菩薩因名句形身證得本覺自覺覺他故新説云因上如來為衆生故慈悲方便作種種異説欲令衆生了名句中實義莫著言説故説名句文身大慧名身者謂若依事立名是名名身句身者謂句有義身自性決定究竟是名句身形身者謂顯示名句是名形身形唐譯作文句有義身者謂句中無義尚屬於名如云徑迹此但是名未得為句在迹辨義方顯其句如云象迹馬迹人迹等象迹非人馬等迹人馬迹非象迹決定究竟自性無所移易方得為句故云句有義身自性決定究竟也故成唯識論云名詮自性句詮差別義意同此形身者形即文也謂顯示名句曰文身論云文即是字為二所依謂非字不能顯名句故故云為二所依也而言身者約名句文當體得名名句形三各有自體性故又形身者謂長短高下魏譯云復次字身者謂聲長短音韻高下此重顯形身之相也按魏譯意取聲為實體以名句文三是假相故瑜伽論云此三離聲無別體故今云長短高下者即聲上音韻屈曲聯布合聚為形身也又句身者謂徑迹如象馬人獸等所行徑迹得句身名此引事重明句身之相也徑迹是名自性雖具義意未彰不為句身也若云象迹馬迹等差別義顯得為句身大論云天竺語法衆字和合成語衆語和合成句作例云如菩為一字提為一字是二不合則無語若和合名為菩提是名句身大慧名及形者謂以名説無色四陰故説名自相現故説形唐譯云名謂非色四蘊以名説故文謂名之自相由文顯故集注云謂受想行識四陰但有名言相所現處色陰乃彰是名名句形身總結可知説名句形身相分齊應當修學以名句文身之相勉諸當學爾時世尊欲重宣此義而説偈言名身與句身及形身差別凡夫愚計著如象溺深泥集注云如來假名句文身方便説法若凡愚猶著言説不悟實義如象溺深泥何由而出離復次大慧未來世智者以離一異俱不俱見相我所通義問無智者彼即答言此非正問謂未來世有智者以離一異等見如來常所通義問彼外道無智之人彼以邪執覆心不解正義故疑非正此世尊懸見未來正道不行邪法增熾之斃故下文示以置答之教謂色等常無常為異不異如是涅槃諸行相所相求那所求那求那句唐譯作依所依譯語見前注造所造見所見塵及微塵塵句唐譯作地及微塵修與修者如是比展轉相如是等問而言佛説無記止論無記止論者謂彼如上所問諸法相義應以無記止其論也無記猶言忘之也非彼癡人之所能知謂聞慧不具故此出無記所以謂無記豈實然耶蓋為外道癡人聞慧不具不能知佛正義若以正義答之彼必以邪執相訾令墮惡道佛慈憐之故作無記方便止其非也如來應供等正覺令彼離恐怖句故説言無記不為記説彼計諸相為實若以非相遣之彼則驚怖其言故説無記令彼離此怖也又止外道見論故而不為説設此無記非唯遮其誹謗抑亦止其見論大慧外道作如是説謂命即是身如是等無記論魏唐二譯命即是身下加身異命異一句命即是身者涅槃三十九迦葉梵志問佛云身即是命身異命異謂人死時此身既捨後身未生於其中間豈可不名身異命異佛答曰有因緣故身即是命命即是身有因緣故身異命異智者不應一向而説身異命異蓋佛正意謂以因緣合故身即是命因緣離故身異命異外道則別計生因不藉緣起世尊破意在此然今此問亦作無記止之大慧彼諸外道愚癡於因作無記論非我所説魏譯云外道迷於因果義故是故無記非我法中名無記也謂外道愚癡別計生因故作無記非如來法中有此無記大慧我所説者離攝所攝妄想不生云何止彼謂佛法中人離於根塵能所一切異見則妄想不生然有正問隨義即答云何止彼之問大慧若攝所攝計著者不知自心現量故止彼凡夫外道若於根塵攝受而不忘者則不知自心現量故應止彼大慧如來應供等正覺以四種記論為衆生説法大慧止記論者我時時説為根未熟不為熟者為根未熟衆生於深法中且止勿説已熟者云何止彼四種論引見後偈復次大慧一切法離所作因緣不生無作者故一切法不生魏譯云一切法離作者及因是故不生以無作者故是故我説一切法不生大慧何故一切性離自性以自覺觀時自共性相不可得故説一切法不生此徵釋不生所以何故下徵意以自下釋成説一下結謂以自覺聖智觀察一切自共性相不可得故故説一切法不生也何故一切法不可持來不可持去以自共相欲持來無所來欲持去無所去是故説一切法離持來去謂一切法本性空寂何有來去徵意釋結同前下皆倣此大慧何故一切諸法不滅謂性自性相無故一切法不可得故一切法不滅謂一切法性相本無云何有生亦何有滅大慧何故一切法無常謂相起無常性是故説一切法無常謂一切相從緣所起倐滅如電故無常也大慧何故一切法常謂相起無生性無常常故説一切法常唐譯云何故一切法常謂諸相起即是不起無所有故無常性常是故我説一切法常謂起即不起生即無生不壞本質全體是常故云一切法常又性無常常者謂無常性常故云無常常爾時世尊欲重宣此義而説偈言記論有四種一向反詰問分別及止論以制諸外道四種論者大論三十五云一必定論二分別論三反問論四置論一必定論者如衆生中世尊為第一一切法中無我為第一世間不可樂涅槃安隱等名為必定論二分別論者如無畏太子問佛佛能説是語令他人瞋否佛言是事當分別答太子言佛或時憐憫心故出衆生於罪中而衆生瞋然衆生後當得利爾時無畏之子坐其膝上佛問無畏汝子或時吞諸瓦石草木汝聽咽否答言不聽先教令吐若不肯吐左手捉耳右手擲口縱令血出亦不置之佛言汝不愍之耶答曰愍之深故為出瓦石雖當時痛後得安隱佛言我亦如是若衆生欲作重罪善教不從以苦言諫之雖起瞋恚後得安隱是等名為分別論三反問論者還以所問答之如佛告比丘於意云何是色常耶無常耶比丘言無常若無常是苦否答言苦若法是無常苦聞法聖弟子著是法言是法是我是我所否答曰不也世尊佛告比丘從今已後所有色若過去若未來若現在若內若外若好若醜是色非我所我非色所如是應以正實智慧知受想行識亦如是是等名為反問論四置論者如十四難世間有常世間無常世間有邊世間無邊是等默而置之是為置論已上並是論文彼文猶廣今略取其要也論言十四難為置論者如今經前云色等常無常等佛作無記止論意同其云必定即今一向義置即止義有及非有生僧佉毗舍師一切悉無記彼如是顯示僧佉句唐譯作數論與勝論輔行第十云迦毗羅經十萬偈名僧佉論梵語僧佉譯云數論用二十五諦明因中有果計一為宗毗舍亦云毗世譯云勝異論立六句義以計極微常住不滅今偈第四句應作第三謂彼如是顯示一切悉無記義始順正覺所分別自性不可得以離於言説故説離自性此頌佛正義爾時大慧菩薩摩訶薩復白佛言世尊惟願為説諸須陀洹須陀洹趣差別通相趣猶向也差別通相者下文有三種三結之別名差別相同證涅槃名通相也須陀洹者涅槃三十六云須名無漏陀洹名修習修習無漏故名須陀洹又須者名流流有二種一順流二逆流以逆流故名須陀洹古注云大慧因上愚夫觀惑亂法起聲聞乘種性然聲聞法中有四果差別故舉四果差別為問若菩薩摩訶薩善解須陀洹趣差別通相及斯陀含阿那含阿羅漢方便相分別知已如是如是為衆生説法謂二無我相及二障淨度諸地相究竟通達得諸如來不思議究竟境界如衆色摩尼善能饒益一切衆生以一切法境界無盡身財攝養一切此敘所問之益也謂若聞四果之相乃能為諸衆生差別説法令其隨聞獲證得至如來不思議究竟境界也如衆色摩尼者喻能説之人謂能隨機演説如摩尼珠隨色變現故無盡身財等者謂以功德法財無盡之藏攝養一切衆生之慧命也今文但敘利他不言自利者由前重重勉離二乘行相大慧豈不聞命而知其非故此但備隨宜樂説以被三根之化是以所敘獨利他也斯陀含譯云一往來阿那含譯云不來阿羅漢譯語見前佛告大慧諦聽諦聽善思念之今為汝説大慧白佛言善哉世尊唯然聽受佛告大慧有三種須陀洹須陀洹果差別云何為三謂下中上集注云上問諸須陀洹須陀洹趣今答云有三種須陀洹須陀洹果差別言互顯故利鈍不同故有三耳下者極七有生極七有生瑜伽論云極七返謂或於天上或於人間或於天上人間受七有生已得盡苦際蓋下下機極於七生也中者三五有生而般涅槃須陀洹中者或三五生而得涅槃上者即彼生而般涅槃其上機者即此一生而得涅槃名現滅須陀洹此三種有三結下中上斷結廣狹利鈍詳如瑜珈論説古注云三種皆有下中上謂上上上中上下中上中中中下下上下中下下故諸結通有九品云何三結謂身見疑戒取是三結差別上上升進得阿羅漢是三下明其結惑廣狹差別上上即九品中上上以上上升進得第四果也大慧身見有二種謂俱生及妄想如緣起妄想自性妄想謂俱下先標二種身見如緣下次引例明俱生者謂無始種習俱滅俱生故妄想者現行分別故譬如依緣起自性種種妄想計著生上文直引二性以例今譬如下重以所例明其依生之相例妄想身見依俱生身見而生也以彼非有非無非有無無實妄想相故愚夫妄想種種妄想自性相計著唐譯云彼法但是妄分別相非有非無非亦有亦無凡夫愚癡而橫計著謂彼二種身見非有非無非非有非非無非有無句中闕一非字唐譯兼顯亦有亦無合今義明非四句耳然此身見是無實妄想相凡夫癡故以妄想心計著種種妄想身見相也如熱時𦦨鹿渴水想是須陀洹妄想身見此舉喻顯身見虗妄是須下結妄想身見彼以人無我攝受無性斷除久遠無知計著攝受無性者謂攝受空寂之性也此明須陀洹人修得人無我故攝受空性乃斷無始一切見惑無知謂見惑即知解故上釋妄想身見竟下釋俱生身見大慧俱生者須陀洹身見自他身等四陰無色相故色生造及所造故展轉相因想故大種及色不集故唐譯云俱生身見以普觀察自他之身受等四蘊無色相故色由大種而得生故是諸大種互相因故色不集故今文見自他身下應加一受字謂觀察自他身受等四陰也色生下謂色陰依於造所造而得生故造所造者謂四大能造所造能造即色香味觸名四微所造即地水火風名四大凡一切色質由能所八法所成故展轉相因相者上相字以平聲呼之言自他之身由能造所造展轉相因成故色不集者謂能所造色剎那不住以不住故不集也新説云言能普觀自身與他身齊等受想行識諸陰與色陰俱有名無體無自性相觀色陰從四大種所造展轉相因而生四大中既無主宰誰能合集以成色乎色陰有質尚空況受等四陰無色相故豈非空耶須陀洹觀有無品不現身見則斷如是身見斷貪則不生是名身見相集注云有者色陰也無者四陰也言觀此五陰無體身見則斷凡貪愛者為有身見捨身見故貪從何生故法華經云諸苦所因貪欲為本貪不生故是名身見斷相大慧疑相者謂得法善見相故及先二種身見妄想斷故疑法不生此約能斷邊顯疑相也然疑自性曾未之顯故今略引釋之百法論注云疑者于諸諦理猶豫為性能障不疑善品為業障善品者以猶豫故善不生也是為疑之自性今文於須陀洹所見所斷處顯疑不生耳不於餘處起大師見為淨不淨是名疑相須陀洹斷餘處者謂諸天魔梵婆羅門等是也彼等自謂得道各有所授行者或於彼處起大師想亦復不知何者為淨為不淨是名疑相今須陀洹善見正法於彼等處不起師想能知淨不淨故疑結則斷大慧戒取者云何須陀洹不取戒謂善見受生處苦相故是故不取集注云言須陀洹不取未來受生戒觀有生處即有諸苦不求受生處樂故大慧取者謂愚夫決定受習苦行為衆具樂故求受生謂諸凡夫欲取未來受生樂處故習戒善是名戒取結惑之相彼則不取除回向自覺勝離妄想無漏法相行方便受持戒支是名須陀洹取戒相斷謂聲聞人雖不取有漏戒善而其無漏戒支善自受持除無漏戒外皆不取也須陀洹斷三結貪癡不生貪癡魏唐二譯作貪瞋癡因斷三結故三毒不生若須陀洹作是念此諸結我不成就者應有二過墮身見及諸結不斷集注云謂存能斷之心則墮身見反不能斷諸結故魏譯云彼若如是不離三結大慧白佛言世尊世尊説衆多貪欲彼何者貪斷問貪相衆多須陀洹斷者為是何等佛告大慧愛樂女人纏綿貪著種種方便身口惡業受現在樂種未來苦彼則不生所以者何得三昧正受樂故是故彼斷非趣涅槃貪斷種種方便謂造身口惡業之方便也如梵網經説淫殺盜等各有因緣法業前方便後方便等如云殺因殺緣殺法殺業等是也今謂須陀洹得三昧樂故世間愛欲之貪不復生矣然其趨寂之貪誠未之斷也大慧云何斯陀含相謂頓照色相妄想生相見相不生善見禪趣相故頓來此世盡苦際得涅槃是故名斯陀含頓照者謂二果之利智也能斷下地思惑秪一往來得涅槃樂故云頓照也色相妄想生相者色相是自共相妄想是思惑以智照明自共生相不實故見相不生也善見禪趣相者謂其善解四禪離生喜樂等次第行相故頓來下謂其秪此往來斷下界思盡苦邊際得涅槃故大慧云何阿那含謂過去未來現在色相性非性生見過患使妄想不生故及結斷故名阿那含集注云阿那含者已出欲界皆生色界觀三世色性無實見凡有生處即有諸苦過患起空無漏智斷諸結使未來妄想生相不生名阿那含大慧阿羅漢者謂諸禪三昧解脫力明煩惱苦妄想非性故名阿羅漢新説云言阿羅漢修行四禪及三三昧了八解脫分證十力三明六通皆已成就煩惱發業所招諸苦妄想永滅是故名阿羅漢大慧白佛言世尊世尊説三種阿羅漢此説何等阿羅漢為得寂靜一乘道為菩薩摩訶薩方便示現阿羅漢為佛化化佛化化唐譯作佛變化佛告大慧得寂靜一乘道聲聞非餘餘者行菩薩行及佛化化巧方便本願故於大衆中示現受生為莊嚴佛眷屬故大慧以三種阿羅漢問佛佛答是得寂實行羅漢非餘二種權示現者餘者下謂彼二種乘本願力內祕大行外現小乘於聲聞衆中示現受生為莊嚴佛眷屬故此是實行彼是權施故非餘也大慧於妄想處種種説法謂得果得禪禪者入禪悉遠離故示現得自心現量得果相説名得果此承權現者以明內祕外現之義也於妄下明內祕義妄想處者謂四果諸禪三昧解脫等處也以小乘所修所證未離妄想故果涅槃也禪所修定境也禪者魏譯作能思惟入禪作所思惟蓋謂能修之人所修之定也權現羅漢以此小果小行自悉遠離則內心不住小乘而自祕也復於此處説果説禪化他回小而向於大是為權現者方便本願故云於妄想處種種説法也示現下明外現義謂內懷大志外現小乘雖得自心現量而未云超也得果相者現小乘之迹也此説名為權現得果之義復次大慧欲超禪無量無色界者當離自心現量相禪無量者即四禪四無量心也無色界可知以彼四禪四無色界未離自心現量故勉行者當超而離也集注云即遣前得自心現量果相大慧受想正受超自心現量者不然何以故有心量故滅受想定是色無色諸定之頂雖極證此定亦未能超有頂心量故云此定超者不然爾時世尊欲重宣此義而説偈言諸禪四無量無色三摩提一切受想滅心量彼無有此頌四禪四無色滅受想也此諸心量以實相觀之悉不可得故無有也須陀槃那果往來及不還及與阿羅漢斯等心惑亂此頌四果所證由心惑亂妄見涅槃真諦理中一無所有禪者禪及緣斷知見真諦此則妄想量若覺得解脫及字唐譯作所知字作惑斷知者謂知苦斷集也集注云初四句明所修行法次四句明能證之人今四句能所合明皆是妄想心量若覺此妄想心量不實即得究竟解脫復次大慧有二種覺謂觀察覺及妄想相攝受計著建立覺此標下釋蓋觀察為真計著為妄下先釋觀察大慧觀察覺者謂若覺性自性相選擇離四句不可得是名觀察覺覺魏唐二譯作智集注云若覺性自性相本來空寂於一切法選而擇之未有一法為真實者離一異等四句則一切法了不可得大慧彼四句者謂離一異俱不俱有無非有非無常無常是名四句大慧此四句離是名一切法此四句離下唐譯作我以諸法離此四句是故説言一切法離此四句離是名一切法者謂一切法離此四句則一切法當體真如所謂離一切相即一切法也大慧此四句觀察一切法應當修學此勉菩薩觀一切法離四句過也大慧云何妄想相攝受計著建立覺謂妄想相攝受計著堅濕暖動不實妄想相四大種宗因相譬喻計著不實建立而建立是名妄想相攝受計著建立覺謂妄下唐譯云謂於堅濕暖動諸大種性取相執著虗妄分別以宗因喻而妄建立是名取相分別執著建立智此釋邪智妄計以明建立之不實也堅濕暖動是地水火風之性也凡計不實大種為實為常者皆邪智耳宗因喻者天竺凡建立法義悉由宗因喻為之衡準若於三支無過則正有過則邪詳如因明論説是名二種覺相若菩薩摩訶薩成就此二覺相人法無我相究竟善知方便無所有覺觀察行地得初地入百三昧得差別三昧見百佛及百菩薩知前後際各百劫事光照百剎土是名下總結二覺也若菩薩下顯二覺之功也此二覺中真者選而從之妄者抑而遠之一取一舍通名成就究竟下顯初地之相也無所有覺天台四教儀登初地中即名無功用位今無所有即無功用也集注云若菩薩摩訶薩融通真妄成就此二覺之相了人法空我不可得以無所有覺於解行地善巧觀察即得初地入大乘光明照燭百佛剎土故攝論云菩薩入初地時證十百明門一於一剎那頃證百三摩地二以淨天眼見百佛國三以神通力能動百佛世界四能往百佛世界教化衆生五能以一身化百類身形令有情見六能成就百類所化有情七若為利益能留身住世百劫八能知前後際百劫事九能以智慧入百法明門洞達曉了十能以身現百類眷屬餘地倍倍增勝知上上地相大願殊勝神力自在法雲灌頂當得如來自覺地善繫心十無盡句成熟衆生種種變化光明莊嚴得自覺聖樂三昧正受從前初地至第十地乃至如來自覺地上上增勝具足種種神通自在三昧正受皆由成就二覺相故究竟顯其功德若是也十無盡句者華嚴十地品經云初歡喜地菩薩發廣大如法界之願以此十句無盡故我之大願亦無有盡一衆生界無盡二世界無盡三虗空界無盡四法界無盡五涅槃界無盡六佛出現界無盡七如來智界無盡八心所緣界無盡九佛智所入境界無盡十世間轉法轉智轉無盡復次大慧菩薩摩訶薩當善四大造色云何菩薩善四大造色大慧菩薩摩訶薩作是覺彼真諦者四大不生於彼四大不生作如是觀察觀察已覺名相妄想分齊自心現分齊外性非性是名心現妄想分齊謂三界觀彼四大造色性離四句通淨離我我所如實相自相分段住無生自相成云何下唐譯云云何了知大慧菩薩摩訶薩應如是觀彼諸大種真實不生以諸三界但是分別唯心所見無有外物如是觀時大種所造悉皆性離超過四句無我我所住如實處成無生相集注云真諦常寂故四大不生觀察四大不生已則知名相分齊是自心現分齊以外性無性故善觀四大造色之性本無所有離四句則無不淨無不淨則我我所離了知自相分段法住如實相處成自相無生也大慧彼四大種云何生造色謂津潤妄想大種生內外水界津潤是能造內外水界是所造言妄想生者由自心現故內外者內謂身中外謂器界下倣此堪能妄想大種生內外火界堪能唐譯作炎盛若以堪能對上津潤譯炎盛者為是宗鏡第六十九云堪能妄想者即計火大堪能成熟萬物之性故飄動妄想大種生內外風界斷截色妄想大種生內外地界斷截色唐譯作色分段斷截分段義楞嚴第四經云覺明空昧相待成搖故有風輪堅覺寶成搖明風出風金相摩故有火輪寶明生潤火光上蒸故有水輪火騰水降交妄立堅故有金輪金輪即地大皆由妄明而成彼此同義但彼詳此略耳色及虗空俱計著邪諦五陰集聚四大造色生色色陰也虗空受等四陰也俱者謂五陰集聚也由五陰集色身始生故云五陰集聚四大造色生造色指色身故外道於此五陰計立二十五諦蓋邪諦也詳如華嚴鈔説上通約內外此單言內身以明衆生生起之由耳大慧識者因樂種種迹境界故餘趣相續集注云言識者即上五陰中妄識也由迷真心而成五陰六入十二處十八界皆識之迹境也妄識樂著種種迹境界故作業受生於餘趣中相續不斷地等四大及造色等有四大緣非彼四大緣魏譯云大慧四大有因謂色香味觸大慧四大無因此承上文內外大等以明真俗之義也地等四大外器界也造色等內根身也有四大緣者約能造四微色香味觸為四大之生緣即俗諦義也非彼四大緣者明真諦之義也謂四大種性相本空能所不實故非彼緣所以者何謂性形相處所作方便無性大種不生大慧性形相處所作方便和合生非無形此徵釋上文真俗二義也謂真諦寂然離能所因緣相故故其長短大小形相及和合方便悉皆無性無性則大種不生矣大慧下明俗諦義也謂諸形相由能所八法和合方便而生非真諦之無是世俗之有故非無形是故四大造色相外道妄想非我魏譯云是故大慧外道虗妄分別四大及四塵非我法中如此分別此結明上文四大造色是外道妄想非如來所説我者世尊自稱復次大慧當説諸陰自性相前令菩薩當善四大造色今造色既明復當善於五陰自相蓋前明共相此明自相是故如來無問自説也云何諸陰自性相謂五陰云何五謂色受想行識彼四陰非色謂受想行識大慧色者四大及造色各各異相大慧非無色有四數如虗空譬如虗空過數相離於數而妄想言一虗空云何下徵標語謂五下列五數大慧下正釋義四大是器界造色是根身有依正性相堅濕暖動之不同故云各各異相此釋色陰也非無色有四數者謂受想行識是無色既是無色豈有四數故遣云非也四陰非色則如虗空離諸數矣故云過數相也既離於數而又妄想言一虗空虗空云何言一言多一多皆妄也大慧如是陰過數相離於數離性非性離四句數相者愚夫言説所説非聖賢也此明陰無自性愚夫妄計諸數也謂陰本無體數相徒施有無一異四句皆離愚夫妄説聖賢何有大慧聖者如幻種種色像離異不異施設又如夢影士夫身離異不異故大慧聖智趣同陰妄想現唐譯云諸聖但説如幻所作唯假施設離異不異如夢如像無別所有不了聖智所行境故見有諸蘊分別現前此明聖賢所見異於愚夫也謂聖者見彼諸陰色像如幻如影如夢所現離異不異假施設故然知陰相本空一何所異假名現前何謂不異異不異相俱不可得故云離異不異也聖智下謂趣聖智者亦同凡夫現見五陰但迷悟有異如前文云惑亂法諸聖亦現而非顛倒與今義同是名諸陰自性相汝當除滅滅已説寂靜法斷一切佛剎諸外道見此結陰相虗妄勉令除滅當證其真也滅已下謂諸陰既滅則説真心寂靜令斷一切世間諸外道見也大慧説寂靜時法無我見淨及入不動地入不動地已無量三昧自在及得意生身得如幻三昧通達究竟力明自在救攝饒益一切衆生猶如大地載育衆生菩薩摩訶薩普濟衆生亦復如是此顯寂靜之功極於果德也力謂十力明謂三明餘文可解復次大慧諸外道有四種涅槃新説云上明覺智以顯生德優劣此明涅槃辨其顯德邪正是謂菩提涅槃二轉依果德也云何為四謂性自性非性涅槃種種相性非性涅槃自相自性非性覺涅槃諸陰自共相相續流注斷涅槃是名諸外道四種涅槃非我所説法唐譯云復次大慧涅槃有四種何等為四謂諸法自性無性涅槃種種相性無性涅槃覺自相性無性涅槃斷諸陰自共相流注涅槃大慧此四涅槃是外道義非我所説此四涅槃第一謂諸法自性非性為涅槃第二謂諸法自相之性非性為涅槃一約性顯二約相顯此二了所觀諸法性相非性處為涅槃也第三復了能觀之覺亦非有性名為涅槃但文中語倒不甚明顯應以覺字置非性二字之上則明矣第四觀諸陰自共相流注斷處名涅槃者此與二乘見處相似然是外道非二乘也以邪正異故新説乃以第四為二乘涅槃非今文意何者經文明言外道有四種涅槃何謂二乘則邪正不分矣集注引楞嚴五現涅槃證者其意頗近但所引未切何者楞嚴五現者以欲界及四禪五處安隱勝淨依處名五現涅槃彼文不及諸陰自共相故若取楞嚴第八外道約五陰起顛倒論者是今經意彼文云色受想中見有非有行遷流內觀無不無如是循環窮盡陰界八俱非相隨得一緣皆言死後有相無相今經相續流注即彼遷流之義也彼文又云又計諸行性遷訛故心發通悟有無俱非虗實失措由此計度死後俱非今經云斷即彼俱非之義也以此觀之今四種皆是外道涅槃不必約二乘解也大慧我所説者妄想識滅名為涅槃此顯如來正説涅槃之相也謂轉八識妄想成無漏寂滅名大涅槃大慧白佛言世尊不建立八識耶佛言建立大慧白佛言若建立者云何離意識非七識佛告大慧彼因及彼攀緣故七識不生魏譯云大慧白佛言世尊世尊可不説八種識耶佛告大慧我説八種識大慧言若世尊説八種識者何故但言意識轉滅不言七識轉滅佛告大慧以依彼念觀有故轉識滅七識亦滅此躡上文妄想識滅之意為問也按下經偈云如水大流盡波浪則不起如是意識滅種種識不生魏唐二譯同此則知今文離意識非七識者謂離第六意識則無餘轉識也若據彼因彼緣之語則又似第七識依彼緣彼之義似是實非也何者按魏譯云以依彼念觀有故者蓋餘識依第六念觀而有故也此約意識粗顯邊説意識於餘識中行相最勝餘識所無念觀即意識行相耳是知今文彼因彼緣即意識行相因緣以意識因緣滅故餘轉不生言粗相滅也如水大流已盡餘波不生矣或以第七識解者則違後偈及魏唐譯義明經者幸校焉意識者境界分段計著生習氣長養藏識意俱我我所計著思惟因緣生不壞身相藏識因攀緣自心現境界計著心聚生展轉相因此承上文以明心意識相因生相也謂第六意識由計著境界分段而生此為意識自體義含前五識皆以隨根了境故習氣長養藏識意俱者習氣第六識能熏種子也由其能熏藏識而藏識為其所熏故云習氣長養藏識意與之俱意俱之意即第七識也成唯識云第六意識俱有所依唯有二種謂七八識隨闕一種必不轉故故云長養藏識意俱也我我所思惟因緣生者明第七生因也謂第七識隨緣執我貪瞋戒慢四惑相隨恆審思惟內我因緣始得生故不壞下明第八識生因也謂此藏識恆與雜染互為因緣恆取自相分境為境界故作意受想思恆共相應故云計著心聚生以藏識常住故云不壞身相也須知文中三生句各顯心意識之生相耳展轉相因者成唯識云第六意識俱有所依唯有二種謂七八識第七末那俱有所依但有一種謂第八識阿賴耶識俱有所依亦但一種謂第七識彼識若無定不轉故是為展轉因緣相生不斷也譬如海浪自心現境界風吹若生若滅亦如是是故意識滅七識亦滅海喻藏識浪喻轉識也自心現境界風吹者謂外之器界內之根身唯識所現故云自心現境界也而言風吹者謂自心之境如風反擊藏海轉識波浪因之而生亦因之而滅以法合喻故云亦如是是故下結問意也爾時世尊欲重宣此義而説偈言我不涅槃性所作及與相妄想爾𦦨識此滅我涅槃初句云我不者謂我不取也涅槃二字通第二句性之一字即長行性自性非性涅槃所作即因緣和合之義相者和合所生之相即長行種種相性非性涅槃前二句偈意世尊謂我不取性相二種涅槃影顯後二涅槃皆不取也後二句頌長行妄想識滅為如來正涅槃義彼因彼攀緣意趣等成身與因者是心為識之所依彼指第六意識也意趣即意識行相等指餘轉識謂由彼意識因緣故始成八種識體心指第八識謂與轉識為因者是第八識也以第八識為七轉識所依故須知其因存展轉義來者無觀今偈便作第七依彼緣彼義解當準長行為是如水大流盡波浪則不起如是意識滅種種識不生大流唐譯作瀑流水喻藏識即長行海喻大流喻第六識波浪喻餘轉識此明七轉識中第六意識行相粗動勝餘識故意識若不行餘轉識皆滅故喻大流盡則餘波不生也然其海水不動以喻藏識常住故復次大慧今當説妄想自性分別通相若妄想自性分別通相善分別汝及餘菩薩摩訶薩離妄想到自覺聖外道通趣善見覺攝所攝妄想斷緣起種種相妄想性自性行不復妄想通相魏唐二譯作差別相此文來意由前妄想識滅名涅槃處發起蓋前文通言妄想未明妄想通相有十二差別故今分別令諸菩薩善自滅之言通相者以妄想通十二故外道通趣通字意亦類此謂諸外道所計不同而能計者亦唯妄想之所趨逐故云通趣以離妄想故善見外道通趣也緣起種種相是緣起自性屬所妄想自性行是遍計自性屬能行者念念計度之謂即前經所云行顯現者是也此文例置讀者善以意會可解大慧云何妄想自性分別通相謂言説妄想所説事妄想相妄想利妄想自性妄想因妄想見妄想成妄想生妄想不生妄想相續妄想縛不縛妄想是名妄想自性分別通相此總列下別釋大慧云何言説妄想謂種種妙音歌詠之聲美樂計著是名言説妄想大慧云何所説事妄想謂有所説事自覺聖智所知依彼而生言説妄想是名所説事妄想言説約能所説事約所言説由事顯故云依彼而生也所説事約世出世論上通佛果下及異類種種事業種種心行非凡小思議可了故云聖智所知大慧云何相妄想謂即彼所説事如鹿渴想種種計著而計著謂堅濕暖動相一切性妄想是名相妄想即彼所説事而稱相者謂事有種種相亦種種然彼諸相虗妄不實衆生無知計著堅濕等一切性相如渴鹿之想陽焰是名相妄想大慧云何利妄想謂樂種種金銀珍寶是名利妄想大慧云何自性妄想謂自性持此如是不異惡見妄想是名自性妄想自性指固執之性也謂封執不移堅持己見此法如是決定不異名自性妄想大慧云何因妄想謂若因若緣有無分別因相生是名因妄想自種為因他助為緣分別於有則因緣相生分別於無則自然相生因緣自然各有其因名因妄想大慧云何見妄想謂有無一異俱不俱惡見外道妄想計著妄想是名見妄想此總攝外道諸見不出四句邪解所執皆名惡見大慧云何成妄想謂我我所想成決定論是名成妄想成魏譯作建立唐譯作理謂於我我所法中建立自他如云色是我我有色色屬我我在色如是循環有十六相以此計度成決定論名成妄想依理分別故唐譯名理大慧云何生妄想謂緣有無性生計著是名生妄想大慧云何不生妄想謂一切性本無生無種因緣生無因身是名不生妄想不生對上生者而言生計是有不生計是無謂無因能生一切法如云無極而太極者是也故云無種因緣生無因身大慧云何相續妄想謂彼俱相續如金縷是名相續妄想唐譯云謂此與彼遞相繫屬如金與線言彼俱者即彼此繫屬之義金者鈎鎖屬縷者線屬謂無始妄想如金與縷繫屬不斷故大慧云何縛不縛妄想謂縛不縛因緣計著如士夫方便若縛若解是名縛不縛妄想縛名縛不縛名解謂妄想纏綿難出離故名縛不縛妄想如士夫者喻也如宰官以人罪而繫之以杻械枷鎖方便名縛又以校勘審鞠而出之名解解亦妄想此以喻釋名也然而外道凡夫若解若縛皆名為縛未離煩惱故二乘聲聞解脫世網乃名為解解非真解亦名妄想故法華云但盡生滅名為解脫其實未得一切解脫於此妄想自性分別通相一切愚夫計著有無大慧計著緣起而計著者種種妄想計著自性如幻示現種種之身凡夫妄想見種種異幻於此下承前十二妄想以明愚夫計著之過也計著緣起等者謂依緣起自性而生計著則有種種妄想計著自性如幻下舉喻明能所妄想非實幻幻術也種種所幻之相也謂如幻術自性幻出種種之身諸凡夫人妄見種種異幻然其不知幻無自性種種非真也幻者喻緣起性妄見種種異者喻妄想性大慧幻與種種非異非不異若異者幻非種種因若不異者幻與種種無差別而見差別是故非異非不異此顯幻與種種非異不異以明能所妄想非實也謂幻所現法雖有種種總一幻自性耳能所妄想亦爾故云如幻然以妄故異不異皆非也是故大慧汝及餘菩薩摩訶薩如幻緣起妄想自性異不異有無莫計著結前能所二性以勉行者莫著此二起諸有無一異等見也爾時世尊欲重宣此義而説偈言心縛於境界覺想智隨轉新説云言愚夫妄心為生死境界所縛妄想智隨境界轉也覺謂妄覺也無所有及勝平等智慧生此重頌離妄想到自覺聖處之義也又對前妄智顯今真智耳集注云無所有最勝處無自他相故平等真性圓明故智慧生妄想自性有於緣起則無妄想或攝受緣起非妄想此重頌二性以明無而妄有也妄想有緣起無者緣起是一故無妄見種種故有又妄想或攝受如依藤計蛇緣起非妄想如藤非蛇相故云妄想有緣起無此舉緣起破妄想也種種支分生如幻則不成彼相有種種妄想則不成集注云謂種種緣生支分雖有所生然皆如幻故支分不成彼緣生之相雖種種總屬妄想故彼相不成此舉妄想破緣起也彼相則是過皆從心縛生妄想無所知於緣起妄想唐譯云彼相則是過皆從心縛生妄計者不了分別緣起法此明二性之過也彼相指上文二相也謂彼二相從心縛生凡愚無知於緣起中生種種妄想此諸妄想性即是彼緣起妄想有種種於緣起妄想唐譯云此諸妄計性皆即是緣起妄計有種種緣起中分別謂妄想無實全是緣起緣起本無妄見種種於緣起法中世諦第一義第三無因生妄想説世諦斷則聖境界自此至偈末重頌與孤起間出殊非重説偈意然因長行文略語義不備偈中互補而發明之亦不違重頌之意也世諦第一義者世諦即世間法也謂諦審是苦是集是生滅因果等法然而世相非真陰心非假非是非非是非是是無然非然無是非是寂然平等則世諦即名第一義矣第三無因生者承上句而言謂世諦第一義是二無因遂為第三此三皆屬法數故應斷之蓋不斷其法但斷其情凡情既斷聖境斯現矣譬如修行事於一種種現於彼無種種妄想相如是此重頌一幻種種身喻以小乘觀法類彼幻事也一者指行者觀想種種現者指觀想所見青黃等色現也然於觀處無種種由想相故如是現耳集注云此一喻破妄想遍計性也如二乘人修諸觀行若作青想觀時天地萬物莫不皆青以無青處見青由心變故於一色境現種種相黃赤白等亦復如是而如實體性初無彼種種之相其所現者是妄想耳故曰妄想性如是譬如種種翳妄想衆色現翳無色非色緣起不覺然集注云此一喻破因緣依他起性也如目有種種翳以妄想分別故見有青黃赤白等色顯現然翳本無色亦無非色緣起如之以計著故故曰不覺譬如鍊真金遠離諸垢穢虗空無雲翳妄想淨亦然此中有二喻發明圓成實性謂妄想如垢穢雲翳圓成實如真金虗空然此喻於圓成實中又當分會其義可也蓋虗空喻圓真金喻成實耳集注云此一喻以斷彼妄想虗偽及緣起過患則圓成之性如真金離垢穢如虗空無雲翳也無有妄想性及有彼緣起建立及誹謗悉由妄想壞集注云謂妄想與緣起之性本自無有若於非有計有非無計無是為建立誹謗悉由妄想自壞如實之見妄想若無性而有緣起性無性而有性有性無性生依因於妄想而得彼緣起相名常相隨而生諸妄想究竟不成就則度諸妄想此承上偈委辨妄想緣起二必無性也妄想下謂妄想無性中而有緣起性者則無能生有矣若無性能生有性則有性從無性生也依因於妄想而得彼緣起者承上無性生義謂緣起依妄想生始得緣起相也緣起之相妄想之名常相隨轉而生諸想果能究竟其實則緣起妄想二不成就二既不成則度諸想矣然後智清淨是名第一義妄想有十二緣起有六種自覺知爾𦦨彼無有差別集注云既度諸妄想成清淨智了知十二妄想六種緣起但有其名而無所實復於自覺聖境界中了知爾焰智障與彼妄想緣起悉空無相無有差別故下文以五法等為真實也緣起有六者即前緣因中六種因是五法為真實自性有三種修行分別此不越於如如宗鏡云迷如理以成名相妄想即生悟名相之本如妄便稱智則無名相妄想唯如智矣智因如立智體亦空如假智明本來常寂故並空矣今言修行者雖能分別五法三性之真妄未能空其智體故曰不越於如如衆相及緣起彼名起妄想彼諸妄想相從彼緣起生衆相是緣起蔓生之相彼名是妄想建立之名緣起與妄想名相互融然皆起於妄想而諸妄想復從緣生故前文云相名常相隨而生諸妄想即此意也覺慧善觀察無緣無妄想成已無有性云何妄想覺覺慧乃本覺之慧也以本覺之慧善觀緣起妄想二性皆無二性既無則圓實之性成矣然雖已成不作成想故遣云成已無有性成且不立云何復有妄想之覺彼妄想自性建立二自性妄想種種現清淨聖境界以妄想中建立緣起妄想二性也妄想不除則於緣起中見種種現然非真現由妄想見若諸妄想清淨即為聖境界也妄想如畫色緣起計妄想集注云妄想如畫種種色像雖有分別而無實體衆生計著緣起而生妄想亦復如是若異妄想者則依外道論新説云此明佛法知生死緣起法從自妄想心中生若計生死有無諸法異於妄想從微塵冥諦自在等生者即外道論妄想説所想因見和合生魏譯云妄想説妄想因見和合生以能想説所想皆因知見和合而生也離二妄想者如是則為成離二妄想者承上能所二想也離二想已則為圓成實性蓋能所二想即緣起遍計二性故大慧菩薩摩訶薩復白佛言世尊惟願為説自覺聖智相及一乘若自覺聖智相及一乘我及餘菩薩善自覺聖智相及一乘不由於他通達佛法此大慧問意由前十二妄想章中有離妄想到自覺聖義未蒙委釋故今重請開示自覺聖義自覺聖義是理一乘是教蓋能所兼請也若自下大慧自述重請之益言不由於他通達佛法者所謂佛法者即自覺也因善自覺即通佛法離覺無佛離心無法故云不由於他通達佛法佛告大慧諦聽諦聽善思念之當為汝説大慧白佛言唯然受教佛告大慧前聖所知轉相傳授妄想無性菩薩摩訶薩獨一靜處自覺觀察不由於他離見妄想上上升進入如來地是名自覺聖智相次佛告下魏譯云佛告大慧菩薩摩訶薩離阿含名字法諸論師所説分別法相在寂靜處獨坐思惟自內智慧觀察諸法不隨他教離種種見虗妄之相當勤修行入如來地上上證智大慧是名自身內證聖智修行之相前大慧所問自覺自覺無他即妄想無性是故諸佛以自所知傳授妄想無性菩薩令其緣自覺了非外尋也然而前聖所知亦唯自覺耳若諸菩薩欲知自覺當設方便方便者何謂遠離闠閙獨處靜室依自心觀察離諸妄想了一分妄情證一分自覺上上升進直入如來之地自覺聖智圓滿究竟是為菩薩善知自覺聖智之相此先答自覺相也大慧云何一乘相謂得一乘道覺我説一乘云何得一乘道覺謂攝所攝妄想如實處不生妄想是名一乘覺上文自覺明矣次説一乘自覺謂本覺也一乘覺者謂一乘中分斷分證以至究竟謂始覺也蓋一乘道中覺彼能攝所攝妄想實際則始本不二能所皆空是以不生妄想原始要終不離一乘故云一乘道覺此次答一乘相也大慧一乘覺者非餘外道聲聞緣覺梵天王等之所能得唯除如來以是故説名一乘一乘覺者不與諸乘所共一乘能兼諸乘諸乘不攝一乘以故二乘外道等不能得也夫道不遠人而人自遠苟能志在一乘孰不了證此世尊策進二乘及諸外道天等故作此言以顯一乘之殊勝也大慧白佛言世尊何故説二乘而不説一乘佛告大慧不自般涅槃法故不説一切聲聞緣覺一乘不自般涅槃法故者謂如來以一乘道普度有情皆以如來滅度而滅度之於一乘中無自入涅槃法故以二乘獨取涅槃不度衆生是故世尊於聲聞緣覺中不説一乘也以一切聲聞緣覺如來調伏授寂靜方便而得解脫非自己力是故不説一乘以二乘人厭有著空慕三怖一如來則以寂靜方便調伏令熟然後引歸寶所今以寂靜得解脫者是如來方便非己智力是故不即為説一乘復次大慧煩惱障業習氣不斷故不説一切聲聞緣覺一乘前文以彼所修明不説意今復以彼所障明不説意也業習不斷者謂諸聲聞但斷正使緣覺雖侵習氣猶為三昧所醉是故不即為説一乘不覺法無我不離分段死故説三乘此顯淺證之過以明説三之由也謂彼二乘雖得人無我不覺法無我未離變易死由是權説三乘不談一義也分段死魏唐二譯作變易死蓋二乘人但覺人無我唯離分段死今云不離分段死者譯場之訛也大慧彼諸一切起煩惱過習氣斷及覺法無我彼一切起煩惱過習氣斷三昧樂味著非性無漏界覺覺已復入出世間上上無漏界滿足衆具當得如來不思議自在法身煩惱言起者起即動義又生滅義屬見思二惑令心生滅流動故云起也彼一下謂彼聲聞斷見思煩惱習氣已乃得三昧樂住已發非性偏真界中無漏覺智得是覺已復能上上升進入彼一乘無漏覺道滿足十力四無所畏三十七品助道之具當得如來不思議法身也爾時世尊欲重宣此義而説偈言諸天及梵乘聲聞緣覺乘諸佛如來乘我説此諸乘乃至有心轉諸乘非究竟若彼心滅盡無乘及乘者無有乘建立我説為一乘此重頌一乘諸乘之義也長行云唯除如來餘非究竟今偈復言即此佛乘若有心轉亦非究竟蓋遣三一之迹耳若彼三一之心忘能所之乘息無乘可建無待可忘非對三而言一者是真一乘乘謂所乘法乘者謂能乘人引導衆生故分別説諸乘解脫有三種及與法無我煩惱智慧等解脫則遠離此重頌説三之由也初二句可知解脫三種者謂空無相無願也法無我句應攝人空煩惱智慧言二障也等之一字該五法八識三自性耳末句承上三句謂證得解脫則諸相自離譬如海浮木常隨波浪轉聲聞愚亦然相風所漂蕩彼起煩惱滅餘習煩惱愚浮木喻聲聞之愚也波浪喻諸識也相風喻諸法相也相是法風是喻謂愚法聲聞所知未斷識浪未平法相之風漂蕩雖煩惱滅餘習之愚未斷此顯界內煩惱雖斷界外無明猶未伏故古注云聲聞斷四住煩惱故言起煩惱滅也未斷無明故言餘習煩惱愚味著三昧樂安住無漏界無有究竟趣亦復不退還得諸三昧身乃至劫不覺此頌三昧樂住之過也謂二乘人安住三昧偏真無漏界中故無進趣究竟之志然亦不還有界耽此三昧之身如氷夾魚乃至百千劫猶不覺知樂小之過此世尊極言滯寂之愚以警其進趣大乘也譬如昏醉人酒消然後覺彼覺法亦然得佛無上身此頌覺彼著已復入上上無漏得佛法身之義也酒喻偏真三昧昏醉人喻二乘耽三昧樂而不覺者覺彼所醉故云酒消回心向大進得法身
