分別事識者分別察取義事者根塵苦樂受等也下文云取種種塵名分別事識宗鏡第五十七云真謂第八餘七俱名分別事識雖第七識不緣外塵緣第八故名分別事廣説八者謂眼等六識第七末那第八賴耶大慧譬如明鏡持諸色像現識處現亦復如是明鏡持像喻也現識處現法也喻中持字謂執持也法中處字指八識所依處也下現字是所現所現如像即分別事識也上現字有二義一顯現二現前現前者如鏡持像悉現前故顯現者唯識顯現無外境故因知喻義有缺法義無窮此蓋分喻現前義耳鏡無顯現義故大慧現識及分別事識此二壞不壞相展轉因唐譯云現識與分別事識此二無異相互為因壞不壞者如前二種生住滅相剎那生滅名壞自性無垢畢竟清清淨名不壞也又如六識得塵即滅是壞熏入第八識為種是不壞展轉因者成唯識云阿賴耶為依故有末那轉依止心及意餘轉識得生即展轉之因也此釋前文流注及相生義也蓋壞者屬相不壞屬流注約粗細邊論壞不壞耳大慧不思議熏及不思議變是現識因賢首云謂無明能熏真如不可熏處而能熏故名不思議熏又熏即不熏不熏之熏名不思議熏謂真如心受無明熏不可變異而變異故名不思議變又變即不變不變之變名不思議變然此不思議正明前文非思量所知及釋流注住義也大慧取種種塵及無始妄想熏是分別事識因塵六塵取貪著取塵是現行無始妄想是種子以此種現熏習為分別事識因此釋相住義也大慧若覆彼真識種種不實諸虗妄滅則一切根識滅大慧是名相滅不實諸虗妄者即上分別事識之因也前文不言根今云根識者指六依根識也以揀後二識不依根故此釋相滅義也覆字楊彥國纂云覆者返復之義謂回光返照還於真識也大慧相續滅者相續所因滅則相續滅所從滅及所緣滅則相續滅所因唐譯作依因上明相滅已竟此明流注滅也相續即流注義相續所因下謂相續因滅則相續緣滅也所從下承上因緣意從即因也謂相續因緣滅則相續之名滅也大慧所以者何是其所依故依者謂無始妄想熏緣者謂自心見等識境妄想此徵明上文因緣為相續所依而兼出因緣之相也依者下顯相續所因之相也依者之依即前文因字非所依之依也蓋所依之依兼因緣義故緣者下顯相續所緣之相也無始妄想熏即不思議熏也自心見等識境妄想即不思議變也此熏及變為相續所依故蓋緣字約所緣緣説謂自心所見內色為識之境非取外色故云自心見等識境也等字該聞嗅嘗觸思也內色是唯識妄想生故末云妄想觀所緣緣論云內色如外現為識所緣緣此可知矣已上釋前二種生住滅竟大慧譬如泥團微塵非異非不異金莊嚴具亦復如是此明轉識與藏識非異非不異也泥團喻轉識微塵喻藏識言泥團由微塵而成如轉識由藏識而轉金莊嚴具配釋如上故云亦復如是大慧若泥團微塵異者非彼所成而實彼成是故不異若不異者則泥團微塵應無分別言泥團與微塵異者如水與火性不相循方稱為異故云非彼所成今泥團實因微塵所成則非異矣故云而實彼成又言泥團與微塵不異者應無二相不可分別今二相可別則非不異矣不可言異不可言不異故云非異非不異也上辨喻竟下正法合如是大慧轉識藏識真相若異者藏識非因若不異者轉識滅藏識亦應滅而自真相實不滅此法合也轉識合泥團藏識合微塵轉識藏識真相若異者下辨轉識與藏識真相非異非不異也而自真相實不滅者自指第八識自相謂第八自相湛然清淨實不滅也亦猶泥團雖滅而微塵自相實不滅故第八賴耶稱為藏者藏含藏也謂具能藏所藏執藏義故蓋持種義邊名能藏受熏義邊名所藏第七執以為我名執藏是故大慧非自真相識滅但業相滅若自真相滅者藏識則滅此結上文重辨第八真相不滅也但業相滅者業相即前七識及第八見相二分亦即前文無始虗偽習氣耳大慧藏識滅者不異外道斷見論議大慧彼諸外道作如是論謂攝受境界滅識流注亦滅若識流注滅者無始流注應斷攝受境界言諸轉識也攝受執取義識流注言第八細相也外道見轉識攝受境界相滅因計第八流注自種亦滅故佛辨云若識流注滅者則無始及今流注應斷今相續故外計不成大慧外道説流注生因非眼識色明集會而生更有異因大慧彼因者説言若勝妙若士夫若自在若時若微塵眼識色明集會魏譯作識依眼色空明和合首楞嚴經云眼識生者因空因明因心因眼蓋以四因集會眼識得生色明即彼空明也今文但云眼不言心蓋眼之一字義屬心故心即作意也識之一字是所生此出佛之正因生義也外道計識流注生因謂不藉外緣更有異因異因者邪因也彼因下出異因之名謂以勝妙士夫乃至極微為生識之因中論云諸法不自生亦不從他生不共不無因是故説無生今外道所計之因是從他生耳勝妙亦云勝性謂生梵天之天主也士夫亦云丈夫即神我別名自在謂大自在天也此等實不能生是彼妄想橫計非真實義復次大慧有七種性自性所謂集性自性性自性相性自性大種性自性因性自性緣性自性成性自性觀經記曰此七種都是妄計離識別有自性者約識論義解集性自性者集謂集聚此指數論師所立二十五法論云大等諸法三事合成又云大等諸法多事合成如軍林等以彼所執五大十一根從初覺心五塵三事集聚生起故云集性自性也性自性者亦即立勝性自性者是也相性自性者相即質礙之色此指勝論師所立六句以實德業大有和合同異及四大極微諸質礙法為生起之因也大種性自性者此指順世所立四大是常能生諸法即前云微塵能生粗色是也因性自性緣性自性者此二即二聲論師所立一待緣生即以聲為生法之因此乃單以聲為因故云因性自性也二待緣顯即以生聲之緣為因故云緣性自性也成性自性者此指計六句中和合句也彼執諸法和合而成故云成性自性也愚按魏譯云外道有七種自性則知此七是外道所計今文缺外道二字讀者致疑世尊但舉其名不出其義下以七種第一義破之故結云第一義心不與外道論惡見共也魏譯云我有七種第一義我者世尊自稱也今下文亦缺我字當按魏譯讀之可了復次大慧有七種第一義所謂心境界慧境界智境界見境界超二見境界超子地境界如來自到境界七種俱稱第一義者言一一俱從三世如來第一義心建立故一一俱稱本性故心境界者心即真識心也境謂相狀界謂分齊言七義各有相狀分齊故如宗鏡云第八本識真如一心廣大無邊體性微細顯心原而無外包性藏以該通檀持種之名作總報之主建有情之體立涅槃之因居初位而總號賴耶處果位而唯稱無垢備本後之智地成自他之利門是為心境界也慧境界者天台云善入佛法名慧肇師云造心分別謂之慧分別則從因立名也大論云道慧道種慧是因中總別一切智一切種智是果上總別故知慧自因中説也止觀輔行傳弘決云言總別者直語道慧一切智故故名為總各加種故故名為別若通途説智秪是慧俱通權實及以因果今則約義稍別故分為二如前文云善解自心現境界究竟通達五法自性識二無我義又云離説所説觀所觀隨入無所有分別義是為慧境界也智境界者肇師云決定審理謂之智決定乃從果立號也下經云聖智有三相謂無所有相諸佛自願處相自覺聖智究竟相下經自解茲未具釋也然此三相包攝世出世智罄無不盡是為智境界也見境界者見是見解下則該乎三乘上則通乎佛地世出世見悉含攝故是為見境界也超二見境界者超一切有無能所邪正偏圓等二見是為超二見境界也超子地境界者子地是諸菩薩所證之地超者上極等覺過下下地乃名為超雖言於超意通下地以地地有超義故謂超過本地趨升上地也如來自到境界者不與三乘人共獨證自覺聖智境界最上灌頂位菩薩猶不能及呪下地乎是為如來自到境界也然此七種以理解行證四科收之於義相應所謂心者心即真如真如屬理慧智見超四種屬解超子地屬行義雖兼證有上可超猶屬行故然而行中非全無證證有分滿行雖分證未離行故如來自到屬證究竟處故已上七種第一義是佛正教非如外道七自性也以此七正破前七邪耳大慧此是過去未來現在諸如來應供等正覺性自性第一義心以性自性第一義心成就如來世間出世間出世間上上法聖慧眼入自共相建立如所建立不與外道論惡見共此結如來七第一義不與外道七自性惡見論共也應供等正覺是如來十號總稱世間法者謂四禪四無色滅受想等也出世間法者謂三乘十地諸波羅蜜等也出世上上法者謂如來大涅槃常樂我淨等也聖慧眼入者謂以無分別之正慧分別諦理能所既寂境觀雙融名聖慧眼入也自共相建立者如來自到為自相餘義與三乘共故如所建立不與外道共者謂如上所建七種第一義心體用互收寂照冥攝無出一心是故不與外道計有計無著外性相惡見所共也大慧云何外道論惡見共所謂自境界妄想見不覺識自心所現分齊不通謂諸外道於自心現境生諸妄想及有無之見而不覺不識自心所現以不覺故自心分齊不通大慧愚癡凡夫性無性自性第一義作二見論性無性者謂有性無性也諸外道愚癡於自性第一義中作有無二見論故唐譯云於自性第一義見有見無而起言説復次大慧妄想三有苦滅無知愛業緣滅自心所現幻境隨見今當説唐譯云大慧我今當説若了境如幻自心所現則滅妄想三有苦及無知愛業緣三有妄想為有生之因無知愛業緣為有生之緣妄想內心也緣者外境也無知即無明也三有衆生以無明故依於內心外境起諸貪愛以貪愛故造種種業受種種苦今謂若諸衆生於三有中妄想心滅則無知愛業之緣亦滅蓋內心滅故外境隨滅也然諸衆生不知外境由自心現故執為實因起種種異見分別世尊隨他所見方便説法當是其時故云隨見今當説大慧若有沙門婆羅門欲令無種有種因果現及事時住緣陰界入生住或言生已滅魏譯云大慧諸沙門婆羅門作如是説本無始生依因果現復作是説實有物住依諸緣故有陰界入生住滅故以生者滅故唐譯云大慧有諸沙門婆羅門妄計非有及有於因果外顯現諸物依時而住或計蘊界處緣生住有已即滅此出衆計也無種有種因果現者謂彼外道欲令無種之因顯現有種之果蓋計無因而生萬物也及事時住者事事物也謂實有事物依時而住如春華秋實等是也緣陰界入生住者謂一切法緣陰界入而生而住而滅也或言生已滅者計謂諸法生已還滅作無常論也魏唐二譯義意明顯可了大慧彼若相續若事若生若有若涅槃若道若業若果若諦破壞斷滅論所以者何以此現前不可得及見始非分故此佛判上文外道所計屬斷見也若相續下列法相名破壞下正判其見所以下徵明屬斷所以現前不可得者現前是末不可得是無因義謂末無因也及見始非分者始乃是本非分亦無因義謂本無因也言相續等法見其本末無因故作斷滅論也詳如楞嚴第十中説大慧譬如破瓶不作瓶事亦如焦種不作芽事此譬明斷見之非器也謂上文作本末無因論者如破瓶焦種無復可用蓋深責其非也如是大慧若陰界入性已滅今滅當滅自心妄想見無因故彼無次第生次第唐譯作相續此佛辨諸法非斷滅也若陰界入性已今當滅者此但自心妄想見計其本末無因而作斷滅既是斷滅應無次第生相然從無始來次第相生於今不斷是故諸法不入斷滅大慧若復説無種有種識三緣合生者龜應生毛沙應出油汝宗則壞違決定義有種無種説有如是過所作事業悉空無義無種有種識三緣合生者指數論師所立二十五諦也始從冥初生覺心五塵乃至大等諸法乃以神我為其主耳今文無種指冥初也有種指大等諸法也識即神我彼計此三生一切法蓋以無能生有矣故今破云若有無識三緣能生法者龜應生毛沙應出油何者無而能有故也然而龜必無毛沙必無油彼計三緣合生者妄矣所宗自壞義墮空無也大慧彼諸外道説有三緣合生者所作方便因果自相過去未來現在有種無種相從本已來成事相承覺想地轉自見過習氣作如是説此牒明上文三緣作事無實之原也謂其所作方便因果三世諸法若有若無等相原其本起悉由覺想邪教及自心惡見習氣所轉遞相承襲故作是説如是大慧愚癡凡夫惡見所噬邪曲迷醉無智妄稱一切智説此結前文邪見沙門婆羅門輩無智妄稱智説下文復顯正見論者大慧若復諸餘沙門婆羅門見離自性浮雲火輪揵闥婆城無生幻𦦨水月及夢見離自性者謂正見觀察諸法本離自性如浮雲火輪等虗妄不實無生者言諸法無生如浮雲等生即無生也內外心現妄想無始虗偽不離自心內心外境由妄想現無始虗偽習氣不離自心妄想因緣滅盡離妄想説所説觀所觀受用建立身之藏識因是自種緣是假借此妄因緣滅盡則離能説所説能觀所觀及離藏識所建受用資身法等離之一字直貫下句於識境界攝受及攝受者不相應攝受執取義上攝受是所取塵下攝受者是能取根以妄想因緣滅故能取所取根塵識境俱不相應無所有境界離生住滅自心起隨入分別承明前文妄想因緣滅盡證得無所有境也無所有謂自性清淨一法叵得遠離相及流注生住滅境於清淨自心起無分別智隨入一切分別故楊彥國云所謂真心任遍知也大慧彼菩薩不久當得生死涅槃平等大悲巧方便無開發方便無開發方便唐譯作無功用行開發即功用義方便屬行也彼菩薩指前正見沙門婆羅門也不久當得者謂近於佛覺得果用故大慧彼一切衆生界皆悉如幻不勤因緣遠離內外境界心外無所見不勤因緣唐譯作從緣無起心外無所見作離心無得不勤即無起義謂彼菩薩既得無功用行知一切衆生界皆悉如幻於諸因緣無起滅念由是遠離內外境界離心無法故云心外無所見次第隨入無相處次第隨入從地至地三昧境界解三界如幻分別觀察當得如幻三昧度自心現無所有得住般若波羅蜜捨離彼生所作方便金剛喻三摩提隨入如來身隨入如如化神通自在慈悲方便具足莊嚴等入一切佛剎外道入處離心意意識是菩薩漸次轉身得如來身唐譯云漸升諸地住三昧境了達三界皆唯自心得如幻定絶衆影像成就智慧證無生法入金剛喻三昧當得佛身恆住如如起諸變化力通自在大悲方便以為嚴飾遊衆佛國離諸外道及心意識轉依次第成如來身今文與唐譯句句相對其義明顯等入佛剎外道入處者謂以離心意識故一切平等魔佛無二如淨名云入魔境界即佛境界故云等入餘如新説新説云言漸升諸地者謂登歡喜地乃至第七遠行地也證無生法者謂無功用道登第八不動地也入金剛喻三昧者謂初地菩薩創得無分別智斷異生性障二地至十地菩薩如實修行漸斷諸障增勝功德第十一地等覺菩薩金剛喻定頓斷俱生二障種子也轉依次第成如來身者即等覺後念解脫道斷二障習氣即得如來無上菩提及大涅槃二轉依果也大慧是故欲得如來隨入身者當遠離陰界入心因緣所作方便生住滅妄想虗偽唯心直進觀察無始虗偽過妄想習氣因三有思惟無所有佛地無生到自覺聖趣自心自在到無開發行如隨衆色摩尼隨入衆生微細之心而以化身隨心量度諸地漸次相續建立是故大慧自悉檀善應當修學此文結勸正見沙門婆羅門所應斷所應修當如是學文義可知爾時大慧菩薩復白佛言世尊所説心意意識五法自性相一切諸佛菩薩所行自心見等所緣境界不和合顯示一切説成真實相一切佛語心為楞伽國摩羅耶山海中住處諸大菩薩説如來所歎海浪藏識境界法身魏譯云爾時聖者大慧菩薩摩訶薩復白佛言世尊惟願為諸菩薩摩訶薩説心意意識五法自體相等法門諸佛菩薩修行之處遠離自心邪見境界和合故能破一切言語譬喻體相故一切諸佛所説法心為楞伽城摩羅耶山大海中諸菩薩説觀察阿黎耶識大海波境界説法身如來所説法故今文字句闕簡讀者當以魏譯合看可入也言心意意識者心是第八識意是第七識意識是第六識義兼前五第八言心可知第七言意者成唯識云第七名意何異第六言第七識即意故彼第六識異意故如眼識等然諸聖教恐此濫彼故於第七但立意名又欲顯第七與彼第六為近所依故已上自別中問答至前應當修學結文已竟今爾時下大慧重請前義蓋心意識相前雖明釋而大慧未達其詳出是翻前重請以希委示源流因緣起滅或頓生或漸生乃至究竟微細本識邊際使修行者下中上修得超心意識相入真實際是為重請之要也讀者詳之爾時世尊告大慧菩薩言四因緣故眼識轉何等為四謂自心現攝受不覺無始虗偽過色習氣計著識性自性欲見種種色相唐譯云所謂小覺自心現而執取故無始時來取著於色虗妄習氣故識本性如是故樂見種種諸色相故此明眼識託四緣生也一謂不覺自心現量攝受故二謂無始見妄所生故三謂識自性染著故四謂根性樂見以色為食故因此四緣眼識得轉一識如是餘識皆然故下結云水流處藏識轉識浪生也大慧是名四種因緣水流處藏識轉識浪生此結上文四因緣名以示生識之由也水喻藏識奔逸諸根曰流即識之行相也處者藏識所依處也成唯識云執受及處處謂處所即器世間也是諸有情所依處故執受有二謂諸種子及有根身此執受及處俱是所依阿賴耶識因緣力故自體生時內變為種及有根身外變為器為自所緣行相仗之而得起故由是藏識轉識浪生也大慧如眼識一切諸根微塵毛孔俱生隨次境界生亦復如是譬如明鏡現衆色像猶如猛風吹大海水唐譯云如眼識餘亦如是於一切諸根微塵毛孔眼等轉識或頓生譬如明鏡現衆色像或漸生猶如猛風吹大海水如眼識者舉一識例餘識也一切根塵毛孔俱生者謂眼識遍一切處也隨次境界生者承上眼識而言謂眼識既遍則餘識境界次第隨遍也故云亦復如是明鏡現像喻俱生也猛風吹水喻漸生也諸識俱時而現無前後次第故如明鏡現像次第展生前後不踰如後浪不踰前浪故如猛風吹水須知頓非漸外漸在頓中雖諸識俱生非無展轉因故外境界風飄蕩心海識浪不斷因所作相異不異合業生相深入計著不能了知色等自性故五識身轉此承上文以明識因境轉起諸識浪也外境風者境所緣也境能發識故喻如風唯識云八識所緣不出九種謂空明根境作意分別依染淨依根本依及親生種子也又云八識藉緣有多有少彼頌云眼識九緣生耳識唯從八鼻舌身三七後三五三四謂耳識除明緣鼻舌身三除空明二緣後三者指第六七八三識也五三四者言第六五緣生第七三緣生第八四緣生蓋緣多而斷緣少而恆也今文前云四緣者即彼九種但彼此立名有異耳論又云九緣如風今文亦云外境界風彼此義合因所作相異不異者謂此八識相因所起相雖差別體非有異故云異不異也合業生相深入計著等者謂諸衆生依和合業識從妄入妄無始迄今往而不返故云深入計著蓋由不能了知色等五塵自性虗妄故五識身因之而轉大慧即彼五識身俱因差別分段相知當知是意識因魏譯云不離彼五識因了別識相名為意識彼因常轉故言俱因者指明了意識之生因也以明了意識同緣實五塵故同時俱起故名俱因也差別分段相知者即明了意識之體於五識身中能知五塵差別分段相故成唯識以此名五俱意識也當知知字與相知知字不同相知知字是意識中了別之性當知知字是世尊告大慧語謂於此當知也彼身轉彼不作是念我展轉相因自心現妄想計著轉而彼各各壞相俱轉分別境界分段差別謂彼轉魏譯云大慧五識及心識不作是念我遞共為因自心見虗妄分別取諸境界而彼各各不異相俱現分別境界如是彼識微細生滅彼身轉者承上文五識及意識身轉也彼不作是念等者謂彼六識在迷不了展轉生因不悟自心妄想計著轉我之一字借言六識自稱也以不覺故深心計著實我實法而隨彼轉從不作念下顯諸識不覺之意而彼下言彼六識以不覺故各各取自分境剎那生滅俱時而轉故云壞相俱轉也分別境界分段差別者謂前六識自相分段不同分別取自分境故然諸衆生不了識體本妄轉即不轉執相分別故云謂彼轉也此節約在迷衆生不悟妄識流轉下文約修行者覺而未悉故不知微細習氣而謂識滅也如修行者入禪三昧微細習氣轉而不覺知而作是念識滅然後入禪正受實不識滅而入正受以習氣種子不滅故不滅以境界轉攝受不具故滅謂修行者於三昧中微習流轉不覺而謂識滅然後入禪識實不滅而入禪也以習氣種子不滅故然以攝受境界識不具存故云滅耳大慧如是微細藏識究竟邊際除諸如來及住地菩薩如八識頌云不動地前才捨藏故云除住地菩薩又云金剛道後異孰空故云除諸如來諸聲聞緣覺外道修行所得三昧智慧之力一切不能測量決了餘地相智慧巧便分別決斷句義最勝無邊善根成熟離自心現妄想虗偽宴坐山林下中上修能見自心妄想流注無量剎土諸佛灌頂得自在力神通三昧諸善知識佛子眷屬彼心意意識自心所現自性境界虗妄之想生死有海業愛無知如是等因悉已超度此文總結大慧重請之義以明藏識淵深除住地菩薩及諸如來餘莫能測也餘地下謂初地至十地各依自相智慧善巧方便分別決斷此識若句若義最勝無邊善根成熟之時則離自心妄想虗偽宴坐熏修能見自心妄想流注當此之時無量剎土諸佛以智慧水而灌其頂得自在力通諸善知識等為其眷屬此修行者悉已超度心意識境及生死業愛等因也是故大慧諸修行者應當親近最勝知識此重結勸令親聖者爾時世尊欲重宣此義而説偈言譬如巨海浪斯由猛風起洪波鼓冥壑無有斷絶時藏識海常住境界風所動種種諸識浪騰躍而轉生前四句是喻後四句以法合也藏識如海轉識如浪境界如風藏海常住者謂識之自性即如來藏不生不滅故云常住由境風所動自性不守和合而轉生也青赤種種色珂乳及石蜜淡味衆華果日月與光明非異非不異海水起波浪七識亦如是心俱和合生唐譯云青赤等諸色鹽貝乳石蜜華果日月光非異非不異意等七種識應知亦如是如海洪波浪心俱和合生青赤至光明示六塵之境也色等可知珂珂珮取聲也乳及石蜜取味也淡即靜味楞嚴云顯此舌根不動之時淡性常在不動即靜義華果取香也衆塵現前著之名觸依而分別名法即此六塵是境界風也非異不異者通乎法喻喻中謂波浪與海若異者離海無波波因海有故非異也波浪滅時海水不滅故非不異法中六塵明異不異同此故置此句於識境之中譬如海水變種種波浪轉七識亦如是心俱和合生此重合前喻以明心境和合之詳也謂彼藏識處種種諸識轉謂以彼意識思惟諸相義不壞相有八無相亦無相處藏識所依處也義見前注此所依處諸識亦依轉故意識思惟者謂第六意識於八識中行相最勝具三種思云審慮思決定思動發勝思餘識所無故於諸識彼獨勝也今文以意識思惟勝故由是表而出之不壞相有八無相亦無相者不壞即真實常住也八識自性皆常住故八相即常故不壞也常故無相無相之相亦復無相故云無相亦無相譬如海波浪是則無差別諸識心如是異亦不可得心名採集業意名廣採集諸識識所識現等境説五後四句唐譯云心能積集業意能廣積集了別故名識對境現説五心名採集者採攝取義集遍持義心是第八識此心能攝取遍持無始種現習氣故宗鏡第五十云積集名心者謂第八識中持諸三界五趣種子故第八得名含藏積集即第八自證分能持舊種故名積又能集新熏故名集今文採義應採新熏也集義應集舊種也意名廣採集者意與心同名而重言廣者蓋第七識恆與四惑俱故是有覆無記性約有覆邊遍計我相乃名為廣成唯識云第八行相極不明了不能分別違順境相唯與捨受想應故無廣名諸識識所識者上識字是能緣下所識是所緣前六識了別外境故云識所識也現等境説五者現等境即現量五塵也現謂顯現量謂度量境謂性境取境親明度量刊定顯了分別得境自性名現量境也前五識唯通現量明了意識與彼同緣實法故云現等境説五爾時大慧菩薩以偈問曰青赤諸色像衆生發諸識如浪種種法云何唯願説此大慧躡前偈意而問也謂青赤等塵能發諸識如浪相續然則心意識等為實有耶為實無耶故下答云青赤波浪彼悉無有爾時世尊以偈答曰青赤諸雜色波浪悉無有採集業説心開悟諸凡夫彼業悉無有自心所攝離所攝無所攝與彼波浪同前四句可知彼業下彼業指採集業即業相也所攝指六塵境謂自心本空所攝亦離也末二句承上句意謂所攝既無識浪亦同唯識與境皆無性也受用建立身是衆生現識於彼現諸業譬如水波浪受用建立身者由八識轉變成執受身是衆生現識所具故云建立為識所依故云受用諸業指前七識現識所轉如水之波浪耳爾時大慧菩薩復説偈言大海波浪性鼓躍可分別藏與業如是何故不覺知大慧問意謂海波鼓躍覽而可別此譬上易明也藏與業識何不覺知此法上難解也以難易故宗因有過否爾時世尊以偈答曰凡夫無智慧藏識如巨海業相猶波浪依彼譬類通佛答意云藏識淵深凡夫昏淺深之莫測量之無涯故喻之於海佛令依譬比類而通之是故三支無失爾時大慧菩薩復説偈言日出光等照下中上衆生如來照世間為愚説真實已分部諸法何故不説實此大慧舉日喻而難世尊不説實法也言日光照世賢愚並蒙其益如來以般若光照諸世間亦應平等衆生雖愚説法自當真實何故已説諸法分部繁興真實之義祕而不談耶爾時世尊以偈答曰若説真實者彼心無真實譬如海波浪鏡中像及夢一切俱時現心境界亦然以諸衆生心識虗妄不堪説實譬如下以喻明其虗妄之心也境界不具故次第業轉生識者識所識意者意謂然五則以顯現無有定次第境界不具者言八識無體藉緣而興雖展轉因生而其體原妄故云不具也識所識同前解意謂然者言第七識依彼得轉而復緣彼執我名言任運起故五則顯現可知無定次第者通顯諸識壞相俱轉無所限量不可以次第定也譬如工畫師及與畫弟子布彩圖衆形我説亦如是彩色本無文非筆亦非素為悅衆生故綺錯繪衆像集注云此偈言畫色本無形隨形即畫像以況如來本無法隨機即説法豈得止説一種法也言説別施行真實離名字分別應初業修行示真實真實自悟處覺想所覺離此為佛子説愚者廣分別佛謂以言説故施行相別以真實故文字性離分別説者以應初機久修行者為示實實真實之法但可自悟自悟之處能所覺離實為佛子權因愚者種種皆如幻雖現無真實如是種種説隨事別施設所説非所應於彼為非説種種説法悉皆如幻雖現諸幻原無真實隨事施設別有多門所説若非所應則為非説矣彼彼諸病人良醫隨處方如來為衆生隨心應量説法喻可解妄想非境界聲聞亦非分哀愍者所説自覺之境界此四句結顯藏識海喻非小機可解也妄想指外道聲聞非分者以不信有此識故後二句總結海喻之説是佛自覺境界也哀愍者佛自稱也佛具慈悲哀愍一切故前三十八句疊釋大慧日喻之難此四句重顯識海之深耳復次大慧若菩薩摩訶薩欲知自心現量攝受及攝受者妄想境界當離羣聚習俗睡眠初中後夜常自覺悟修行方便當離惡見經論言説及諸聲聞緣覺乘相當通達自心現妄想之相群聚多憒閙故習俗妨靜業故睡眠助懶惰故修此道者當離此三也離惡見經論者防間心見故離二乘相者策進勝行故餘文可解復次大慧菩薩摩訶薩建立智慧相住已於上聖智三相當勤修學前文令離俗習巧示真修是人聖智之初心也名為助道今文於上下正示聖智名體令修此相方名正行何等為聖智三相當勤修學所謂無所有相一切諸佛自願處相自覺聖智究竟之相修行得此已能捨跛驢心智慧相得最勝子第八之地則於彼上三相修生自願處處字魏唐二譯作住持字蓋謂諸佛住持本願之中也此聖智三相即空假中三觀之智也何者無所有是空佛自願處是假自覺聖智屬第一義是中三相皆標聖者聖猶正也正即圓義此屬圓融三觀智耳然此三相圓修一即是三三即是一一而恆三三而恆一非一非三能三能一此為第一義心之智行也得此圓觀熊超權小之上故云能捨跛驢心智慧相跛驢喻二乘及外道也二乘耽涅槃樂無勝行故如彼跛驢艱於行也外道喻跛驢有坑陷之險若圓得此智無功用行悉具足故故云得第八地也大慧無所有相者謂聲聞緣覺及外道相彼修習生此相二乘及外道修生者謂二乘修空無相無願三解脫故與空相應證得此智外道依無修習或得智相亦不出此佛並收之然校之二乘邪正迢然猶天壤矣蓋智相雖同見解異故二乘又與菩薩同修空智圓別逈隔故佛總以跛驢喻二乘及諸外道不能圓修後二相故也大慧自願處相者謂諸先佛自願處修生謂修此智者當住持諸佛本願之中也佛之本願以慈悲為體權實二智為用隨機赴感方便度生是為諸佛本願之體也佛佛同體故以先佛標名耳大慧自覺聖智究竟相者一切法相無所計著得如幻三昧身諸佛地處進趣行生一切法相無所著者謂非有非無非非有無非一非異非非一異非因緣非不因緣非自然非不自然一切法相俱無所著以無著故證得如幻三昧起無功用行進趣佛地成就慧身也大慧是名聖智三相若成就此聖智三相者能到自覺聖智究竟境界此結前義以明所證是故大慧聖智三相當勤修學此重結勸誡令勤學
