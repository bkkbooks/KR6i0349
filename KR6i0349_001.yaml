body:
  text: 楞伽西域記云僧伽羅國東南隅海中有䮚迦山昔佛於此説䮚迦經而云楞伽訛也按下經云楞伽國摩羅耶山蓋山名摩羅耶山頂有城名楞伽耳梵語楞伽譯云不可往據華嚴論楞伽山高五百由旬下瞰大海傍無門戶非得神通不可升往其所詮義謂自覺聖智境界離心意意識妄想非邪智可到故梵語阿譯云無跋多羅譯云上合言無上謂究竟覺際更無有上故寶者尊重義隨世所重而讚之之辭然世寶可壞如來藏寶不可壞故合云無上寶也經者能詮也所詮勝能詮亦勝故通曰不可往無上寶經也諸有所表詳如華嚴論説今時有作觀楞伽經記者言楞伽寶名楞字去聲呼之以山純此寶故因此寶名山而云楞伽山也此言謬甚經首現言種種寶華以為莊嚴魏譯亦云種種寶性所成又楞伽王偈云於此楞伽城種種寶山上既曰種種寶則非純此寶可知記又謂此寶八楞以喻八識亦謬楞伽是梵語譯云不可往他經凡稱楞伽者皆不可往義豈以八楞八識牽紐此何據哉真齊東野人之語也至於他經或有釋迦毗楞伽寶之名自有譯義不可以彼證此劉宋天竺沙門求那跋陀羅譯譯經圖紀云梵語求那跋陀羅譯云功德賢中印度人也幼學五明四章陀論志性明敏度量該博後遇雜心論莫測涯際方悟佛法崇深投替落𩭄專精志業博通三藏宋元嘉中譯是經為四卷皇明吳興後學沙門廣莫參訂皇明夏官大夫擕李袁黃閲正一切佛語心品第一之一一切佛語心者謂三世諸佛所説第一義心也然此經原我釋迦佛説何言一切謂一即一切故蓋一經所明詳顯此心之義故云佛語心也品者類也義類相從故名為品相傳此經大部有十萬偈百萬句三千六萬言總有一百五十一品今傳此方者佛語心一品耳按經初有如是我聞等句則知今品為百五十一之初品也是故品下有第一字卷雖分四品止第一有本品下列二三四者訛也若權用第一之一之二等乃可如是我聞一時佛住南海濵楞伽山頂種種寶華以為莊嚴與大比丘僧及大菩薩衆俱從彼種種異佛剎來是諸菩薩摩訶薩無量三昧自在之力神通遊戲大慧菩薩摩訶薩而為上首一切諸佛手灌其頂華嚴經云轉論聖王以金瓶盛四大海水灌太子頂授與轉輪王位此世尊取喻上地菩薩堪紹佛位乃以智水而灌其頂蓋表心與佛智相應如佛灌頂以顯位鄰大覺也今大慧等位在上地行非下賢是故經家敘此灌頂之説自心現境界善解其義此語倒置天竺文體蓋如此也若唯此方潤色應云善解自心現境界義文始順種種衆生種種心色無量度門隨類普現於五法自性識二種無我究竟通達下經云五法者謂名相妄想正智如如自性有三謂妄想自性緣起自性成自性識有八謂眼耳鼻舌身意第七末那第八賴耶二無我者謂人無我法無我衆義解見下文已上經家所歎菩薩之德也然闕聲聞歎德所列聽衆又闕緣覺衆爾時大慧菩薩與摩帝菩薩俱摩帝又云末底譯云慧遊一切諸佛剎土言諸菩薩從遊諸佛剎土而來承佛神力從座而起偏袒右肩右膝著地合掌恭敬以偈讚佛世間離生滅猶如虗空華智不得有無而興大悲心五陰合聚成世間也思益經云説五陰是世世間所依止依止於五陰不脫世間法蓋以佛智觀察世間如虗空華本無所有不起分別生滅園離若有若無俱不可得故云智不得有無也然諸衆生為貪所使妄執有無起諸惡見佛愍彼愚承本願力興大悲心而救濟故一切法如幻遠離於心識智不得有無而興大悲心遠離於斷常世間恆如夢智不得有無而興大悲心知人法無我煩惱及爾𦦨常清淨無相而興大悲心世尊知法如幻遠離心識興如幻悲度如幻衆不墮有無故上四偈初偈依五陰讚次偈依心識讚第三偈依諸見讚末偈依二無我讚總謂世尊離諸妄想證法真性自既得度復能度他故也梵語爾焰譯云所知煩惱事障也所知理障也言佛二障永離心常清淨而無能所之相一切無涅槃無有涅槃佛無有佛涅槃遠離覺所覺若有若無有是二悉俱離一切指上四偈中世間心識人法煩惱等也謂一切法本涅槃相若執涅槃則涅槃亦成法數故復遣云無涅槃也無有涅槃佛道能也無有佛涅槃遣所也佛能覺也涅槃所覺也遠離下結明涅槃佛佛涅槃二句以有無不可得故能所俱離也牟尼寂靜觀是則遠離生是名為不取今世後世靜魏譯云若如是觀佛寂靜離生滅彼人今後世離垢無染取梵語牟尼譯云寂默寂默即寂靜義牟尼寂靜者華梵兼舉佛之名也觀者言觀佛也按魏譯觀從人説謂所觀之佛由遠離前偈所云有無能所而生故云是則遠離生然彼能觀之人亦當遠離有無能所彼我之相是名不取既不取者而今而後三世性空復其本然之靜矣已上諸偈雖云讚佛而全經大旨悉蘊其中何者愚謂此經直顯一心頓袪四句世出世間一切法數如空中華本無所有唯一自覺聖智靈鑒虗涵為此心之妙用也自覺即佛佛即一心此今經之極致因知此偈經義昭然矣爾時大慧菩薩偈讚佛已自説姓名我名為大慧通達於大乘今以百八義仰咨尊中上世間解之士聞彼所説偈觀察一切衆告諸佛子言汝等諸佛子今皆恣所問我當為汝説自覺之境界爾時大慧菩薩摩訶薩承佛所聽頂禮佛足合掌恭敬以偈問曰此經以五法三自性八識二無我為所破之要今大慧問語無出此法衆義既破自覺全顯一經大意誠在此耳讀者毋厭其繁可也云何淨其念云何念增長唐譯云云何起計度云何淨計度今經增長即唐譯起義此經先言淨後言起彼經先言起後言淨也云何見癡惑云何惑增長見唐譯作淨起淨先後同上何故剎土化相及諸外道相字義屬上句問如來剎土中教化之相云何無受次何故名無受魏唐二譯合此二句作一句云寂靜及次第蓋無受即寂靜義次第即入住出之次第也何故名佛子解脫至何所誰縛誰解脫何等禪境界云何有三乘唯願為解説已上一十四句末句以願説結之緣起何所生云何作所作云何俱異説俱異二字俱對不俱異對一説此問外道所執四句然不及有無非有非無常無常等略也實影帶其中云何為增長唐譯作云何諸有起云何無色定及以滅正受上句問無色四定下句問第九滅定也九次第定名詳如法界次第初門中説可檢云何為想滅何因從定覺此問無想定也是定經五百劫最初半劫其想始滅最後半劫其想復生云何所作生進去及持身所作生魏譯作因生果進去及持身魏譯作何因身去住今文進字即去義持字即住義身者五陰身也下文佛領偈中云五陰身往來是也云何現分別唐譯作云何見諸物云何生諸地生唐譯作入破三有者誰何處身云何下句問意連上句謂何為三有處何為三有身往生何所至問既破三有往生何處云何最勝子唐譯作云何諸佛子何因得神通及自在三昧云何三昧心最勝為我説末句唐譯作願佛為我説最勝稱佛也佛姓瞿曇譯云地最勝是故稱佛為最勝也謂於人中此族最勝事見釋氏要覽又雜阿毗曇心論第一云我等諸佛悉離諸漏故名最勝已上二十句末句以願説結之云何名為藏問第八識云何意及識意是第七識識是前六識解見下文云何生與滅云何見已還見已還魏譯作斷所見唐譯作退諸見還字即斷退義言見性覽物則流而不返今不為物轉返流全一外用不行謂之見已還云何為種性非種及心量唐譯作云何性非性云何唯是心按唐譯今種性是有性非種是無性云何建立相及與非我義云何無衆生云何世俗説無衆生之無上通諸佛謂無佛無衆生清淨本然指真諦也世俗説者指俗諦也云何為斷見及常見不生不生二字通上句斷見謂云何斷常二見不生云何佛外道其相不相違云何當來世種種諸異部佛滅度後大小乘經有二十部之異云何空何因上半句問空之相下半句問空之因云何剎那壞梵語剎那毗曇論中譯為一瞬俱舍論云時之極少名剎那剎那壞魏譯作念不住蓋此約時言彼約念言壞即不住義云何胎藏生胎藏者謂胎中藏諸肝腑故問意實該胎卵濕化四生今單舉胎生影帶其餘也云何世不動世以遷流為義故問云何得不動耶何因如幻夢及揵闥婆城梵語揵闥婆譯云尋香帝釋之樂神也其城大論云日初出時海中見城門樓櫓宮殿行人出入日轉高轉滅但可眼見而非實有此即世人所謂海市亦云蜃樓今登萊海中常見者是揵闥婆所居之城也世間熱時𦦨及與水月光幻夢揵城熱焰水月皆喻世間不實世間二字通上下句故唐譯云云何諸世間如幻亦如夢揵城及陽焰等何因説覺支及與菩提分云何國土亂亂指五濁而言云何作有見唐譯作云何見諸有云何不生滅世如虗空華云何覺世間云何説離字唐譯作云何知世法云何離文字云何如空華不生亦不滅離妄想者誰魏譯作云何無分別云何虗空譬如實有幾種次句魏唐二譯作真如有幾種幾波羅蜜心何因度諸地誰至無所受末句魏譯作真如無次第無所受即真如也魏譯直説真如今經在行者邊説故云誰至何等二無我云何爾𦦨淨諸智有幾種幾戒衆生性末句問衆生性與戒品當有幾種誰生諸寶性摩尼真珠等梵語摩尼譯云離垢誰生諸語言衆生種種性明處及伎術誰之所顯示明處魏譯作五明處大智度論云五明者一曰聲明釋詁訓字詮目流別二曰工巧明伎術機關陰陽曆數三曰醫方明禁呪間邪藥石針艾四曰因明考定邪正研核真偽五曰內明究暢五乘因果妙理伽陀有幾種梵語伽陀譯云頌長頌及短句成為有幾種成魏譯作法唐譯作道云何名為論云何生飲食及生諸愛欲云何名為王轉輪及小王云何守護國諸天有幾種云何名為地星宿及日月解脫修行者是各有幾種弟子有幾種云何阿闍黎梵語阿闍黎譯云軌範師佛復有幾種下文偈云化佛報生佛如如佛智慧佛等蓋下問名義此問種類復有幾種生問佛過去本所生也魔及諸異學彼各有幾種自性及與心彼復各幾種自性問意在三自性心問意在想心能所故領偈中云自性想所想云何施設量魏譯作施假名唐譯作唯假設唯願最勝説已上七十二句末句以願説結之云何空風雲魏譯作何因有風雲云何念聰明念聰明魏譯作𭶑慧念即作意言作意聰明非無作般若故云念聰明也云何為林樹云何為蔓草云何象馬鹿云何而捕取云何為卑陋何因而卑陋上句問卑陋之相下句問𢍉陋之因云何六節攝六節魏唐二譯作六時按西域記時有兩説一云一年三時謂春夏秋也一云一年六時謂春時熱時雨時秋時雪時寒時今六節即六時也云何一闡提梵語一闡提譯云信不具男女及不男斯皆云何生不男有五種謂生犍妬變半云何修行退云何修行生生魏唐二譯作進禪師以何法建立何等人禪唐譯作瑜伽梵語具云禪那譯云靜慮又云思惟修瑜伽譯云相應衆生生諸趣何相何像類相以色言像以狀言類以族言云何為財富何因致財富上句問財富之相下句問財富之因云何為釋種梵語具云釋迦譯云能仁佛之姓也種猶裔也因緣解見下文何因有釋種問立姓之因也本行經云甘蔗王名善生其第一妃名善賢生一子名長壽第二妃生四子一名炬面二名金色三名象衆四名別成時善賢妃欲立長壽白王擯遣四子出國至雪山北住直樹林中其第四子別成為王以德化人即為強國父王追悔遣使往召辭過不還父王歎曰我子釋迦釋迦之姓本此云何甘蔗種無上尊願説本行經云大茅草王得成仙已壽命極長老不能行時諸弟子出外乞食恐有虎狼之患遂以草籠盛之懸於樹上獵人遙見疑謂是鳥乃射之滴血於地生二甘蔗日炙開剖一出童男一出童女大臣聞之迎歸王宮養育長成男名善生女名善賢男立為王女立為后後世相承名甘蔗種已上二十三句末句以願説結之云何長苦仙彼云何教授如來云何於一切時剎現種種名色類最勝子圍繞云何不食肉云何制斷肉食肉諸種類何因故食肉云何日月形須彌及蓮華師子勝相剎側住覆世界如因陀羅網或悉諸珍寶箜篌細腰鼓狀種種諸華或離日月光如是等無量梵語須彌譯云妙高山名也居四洲之中大海之上梵語因陀羅譯云主又云帝忉利天主之稱也天帝有網百寶所成光光涉入不相障礙佛剎如之自日月形至此問佛剎形相差別詳如華嚴經説云何為化佛云何報生佛云何如如佛云何智慧佛前問佛名幾種此問佛名何義云何於欲界不成等正覺何故色究竟離欲成菩提成唯識論云諸異生求佛果者定色界後引生無漏因生淨居天上大自在宮得菩提故色究竟即淨居天之頂也善逝般涅槃善逝佛十號之一也涅槃經第十七云善者名高逝名不高不高者如來心也高者不名如來是故如來名善逝如老子所云上善若水之意又華嚴鈔第六云善者好也逝者去也謂不向餘三界二乘去唯向大菩提去即直往菩提號梵語般涅槃具云摩訶般涅槃那譯云大滅度滅者寂滅也言得寂滅樂度生死苦故誰當持正法天師住久如天師魏唐二譯作世尊天師即天人師也久如猶言久近問住世久近也正法幾時住悉檀及與見各復有幾種悉檀及見解見下文毗尼比丘分云何何因緣云何何因緣二問辭也承上句謂云何毗尼分何因比丘分梵語毗尼譯云律又云滅滅諸惡故比丘譯云乞士僧之美名也彼諸最勝子緣覺及聲聞何因百變易云何百無受百變易唐譯作轉所依百無受魏譯作百寂靜唐譯作得無相最勝子是菩薩乘併緣覺聲聞指三乘人也百變易百無受是三乘證之法百變易言諸三昧意生之身百無受言諸三昧所得之境境即真如真如無所受故云何世俗通云何出世間上句問世間神通下句問出世神通云何為七地唯願為演説七地已前未離有作登第八地始號不動蓋問有作地相耳已上四十四句末句以願説結之僧伽有幾種梵語僧伽譯云和合衆云何為壞僧問破僧事云何醫方論是復何因緣承上句問醫論因緣何故大牟尼唱説如是言迦葉拘留孫拘那含是我梵語具云迦葉波譯云飲光拘留孫譯云所應斷拘那含具云拘那含牟尼譯云金寂此三是過去佛也是我者釋迦自稱下經云以四等故如來唱言我是拘留孫拘那含牟尼迦葉佛大慧欲明四等故發此問四等者謂字等語等法等身等解見下文何故説斷常及與我無我何不一切時演説真實義而復為衆生分別説心量何不下魏譯作何故不但説唯有於一心魏譯言一心即今真實義而復下二句魏譯略之何因男女林男女林立世阿毗曇論第一云閻浮提林外有二林一名訶梨勒二名阿摩勒此二林南復有七林中有人林是人林中果形如人若男十六歲女十五歲又長阿含第十八云金剛山不遠有大海水海水北岸有叢林名曰男女縱廣五十由旬集注謂男女衆多如林必其未考毗曇及阿含語故失引據今改正何梨阿摩勒梵語訶梨勒譯云天王持來阿摩勒譯語未詳翻譯名義集云樹葉如棗華小而白果如胡桃味酸甜可入藥雞羅及鐵圍金剛等諸山無量寶莊嚴仙闥婆充滿雞羅即須彌天竺諸國梵語不同或音聲相近傳寫之訛也四寶所成在大海中據金輪上日月之所回泊諸天之所遊舍自海入空高十六萬八千由旬晝夜因之而有鐵圍亦山名環繞世界日月光明照燭不及故名鐵圍金剛諸山即七金山也七重環繞須彌之外金剛所成此七山中或仙人或乾闥婆或諸賢聖所居具載華嚴經中已上二十句末句失結願説此下佛領所問語雖錯綜而不遺漏至問不及者佛更補之無上世間解聞彼所説偈大乘諸度門諸佛心第一此四句是經家序語讚上大慧所問百八句義是入大乘諸度之門亦是諸佛第一義心也蓋經以佛語心名品而大慧所問一經之大意已具故云諸佛心第一也又前問義出自五法等數而此法數是一經所破自覺聖智是一經所顯學者於破顯處幸毋忽焉善哉善哉問大慧善諦聽我今當次第如汝所問説此四句是佛誡聽許答之辭下文先領次答已上八句總為結前生後之意此下正領生及與不生涅槃空剎那趣至無自性生及不生涅槃及空領問可知剎那二字義屬下句趣至唐譯作流轉無自性即壞義此領云何剎那壞之問蓋謂剎那流轉不常故壞也集注及古注意皆以趣至無自性一句作答辭謂大慧所問生及不生涅槃虗空剎那之法皆想所見初無自性也此解誤矣何者答偈別在後文此但總領其問豈此領中孤置一語為答文耶愚故通會問語以剎那趣至無自性句為領文非答語也佛諸波羅蜜佛子與聲聞緣覺諸外道及與無色行如是種種事如是句兼指前後事也領辭雖錯綜一一可尋下文或隱晦者略標明之其明顯者不復繁指須彌巨海山洲渚剎土地星宿及日月外道天修羅解脫自在通力禪三摩提修羅梵語具云阿修羅譯云非天其性多嗔無天行故三摩提即三昧通名是梵語也譯云正心行處又云正定滅及如意足覺支及道品諸禪定無量諸陰身往來正受滅盡定三昧起心説心意及與識無我法有五自性想所想及與現二見現二見魏譯作所見能見二乘及諸種性金銀摩尼等一闡提大種荒亂及一佛荒亂即國土亂一佛即拘那含等是我智爾𦦨得向智爾焰可知得向領解脫修行者是各有幾種得果義即四果也向因義即四向也衆生有無有象馬諸禽獸云何而捕取譬因成悉檀譬因即宗因喻三支之二也悉檀悉是華言檀是梵語悉遍也檀具云檀那譯云施謂佛以世界為人對治第一義四法遍施衆生也及與作所作叢林迷惑通叢林言稠林也喻諸邪見諸經中多以稠林喻邪見故蓋謂邪見如林之稠也唐譯作衆林迷惑通者領云何見癡惑云何惑增長二句通即見義心量不現有諸地不相至領何不一切時演説真實義下四句不現有不相至即不真實百變百無受醫方工巧論伎術諸明處此下佛補大慧問不及者諸山須彌地巨海日月量下中上衆生身各幾微塵畜生為下人類為中諸天為上末句言諸身量幾塵所成一一剎幾塵弓弓數有幾四肘為一弓言一弓塵數有幾肘步拘樓舍半由延由延毗曇論云四肘為一弓五百弓為一拘樓舍八拘樓舍為一由延名義集云一肘人一尺八寸佛三尺六寸今四肘有七尺二寸為一弓也如是增上可知梵語拘樓舍又云拘盧舍譯云五百弓又云一牛吼地言牛鳴聲所極聞也半由延二十里一由延四十里故魏譯云肘步至十里二十及四十梵語由延又云由旬譯云限量兔毫窗塵蟣羊毛麥塵雜阿毗曇心論云七極微為一阿耨七阿耨為一銅上塵七銅上塵為一水上塵七水上塵為一兔毫上塵七兔毫上塵為一羊毛上塵七羊毛上塵為一牛毛上塵七牛毛上塵為一窗遊塵七窗遊塵為一蟣七蟣為一虱七虱為一麥七麥為一指二十四指為一肘四肘為一弓五百弓為一拘樓舍鉢他幾麥阿羅麥幾獨籠那佉梨勒叉及舉利乃至頻婆羅是各有幾數鉢他唐譯作一升阿羅作一斗獨籠作一斛那佉梨作十斛勒叉作十萬舉利作一億頻婆羅作一兆謂幾塵成一升乃至幾塵成一兆故云是各有幾數為有幾阿䨲名舍梨沙婆幾舍梨沙婆名為一賴提幾賴提摩沙幾摩沙陀那復幾陀那羅為迦梨沙那幾迦梨沙那為成一波羅此等積聚相幾波羅彌樓阿䨲唐譯作塵舍梨沙婆作芥子賴提作草子摩沙作豆陀那作銖迦梨沙那作兩婆羅作斤彌樓名義集云有人謂彌樓譯云光明七金山也金色光明故若準第一義法勝經云須彌樓山則須彌樓是須彌山舊譯俱舍論亦以須彌作彌樓是則梵音有異若據法華云內外彌樓山須彌及鐵圍是則山體有異未知孰是詳載於此俟來者校焉今文謂如是次第增上乃至幾斤成彌樓山末句字義缺略會意可知是等所應問何須問餘事聲聞辟支佛佛及最勝子身各有幾數何故不問此火𦦨幾阿䨲風阿䨲復幾根根幾阿䨲毛孔眉毛幾應問三乘身各幾塵火焰及風六根諸毛竅等為幾塵所成何故不問此耶上自諸山須彌地至此有三十八句佛因大慧問不及此佛自補之夫此數量唯佛能知非下地可測故大慧不能發問也如華嚴阿僧祗品諸菩薩不能説佛自説之然世有算經列二十三數始從一至十為十次有十三數從十十為百十百為千次萬億兆京垓梓壞溝澗正載即此世數尚謂天地不能容載況佛所知量乎護財自在王轉輪聖帝王云何王守護云何為解脫廣説及句説末句領長頌及短句如汝之所問衆生種種欲種種諸飲食云何男女林金剛堅固山云何如幻夢野鹿渴愛譬云何山天仙犍闥婆莊嚴解脫至何所誰縛誰解脫云何禪境界變化及外道云何無因作此領無句云何有因作此領有句有因無因作此領俱句及非有無因此領不俱句云何現已滅云何淨諸覺云何諸覺轉及轉諸所作云何斷諸想云何三昧起破三有者誰何處為何身云何無衆生而説有吾我云何世俗説惟願廣分別所問相云何及所問非我云何為胎藏及種種異身異身唐譯作餘身分言身四支也云何斷常見云何心得定言説及諸智戒種性佛子云何成及論末句領成為有幾種云何名為論云何師弟子種種諸衆生斯等復云何云何為飲食聰明魔施設末句蓋領三問謂念聰明魔幾種施設量也云何樹葛藤最勝子所問最勝子佛稱大慧也云何種種剎仙人長苦行云何為族姓從何師受學云何為醜陋云何人修行欲界何不覺阿迦膩吒成梵語阿迦膩吒譯云質礙究竟色界頂天之名也云何俗神通云何為比丘云何為化佛云何為報佛云何如如佛平等智慧佛宗鏡第十六云隨機赴感名之為化酬其往因名之為報本覺顯照名為智慧理體無二故曰如如云何為衆僧佛子如是問箜篌腰鼓華剎土離光明心地者有七所問皆如實此及餘衆多佛子所應問末二句結領大慧所問已竟下八句分二偈生起答文也一一相相應遠離諸見過悉檀離言説我今當顯示一一相即大慧問中之相也言説即相之稱謂也諸相本與實智相應遠離有無等見之過則名言亦離矣以此離言説道遍施衆生故曰悉檀離言説次第建立句佛子善諦聽此上百八句如諸佛所説次第建立句者言後之答句次第建立也末二句謂當如諸佛所説以酬前問下文正答不生句生句唐譯作生句非生句今文倒置應云生句不生句凡答語每句中皆上半句拈其問相下半句隨破之依心真如門破一切相故皆曰非下文凡字屬破義者唐譯皆作非今經或變他字亦是破義如無如離如不等字是也又不生與生是所詮義相句字是能詮句身下皆倣此常句無常句相句無相句住異句非住異句住異是生住異滅四相之二問中不出答文補之剎那句非剎那句自性句離自性句空句不空句斷句不斷句邊句非邊句中句非中句邊中句前問不出今補而答之凡問出答不出答出問不出者皆含於心量句中常句非常句常魏譯作變唐譯作恆常句重出者古注云凡有三常一計四大性常二計業習氣相續得果不斷故常三如來藏體真常故常據古注因有三常故經文重出愚謂舉一常即三常備矣若據三常當三出之列而為二將安分屬今姑依魏譯作變義解乃變遷流注相續不斷係三常中之相續常也則前常句屬餘二常矣緣句非緣句因句非因句煩惱句非煩惱句愛句非愛句方便句非方便句巧句非巧句唐譯巧上加一善字淨句非