body:
  text: 劉宋天竺沙門求那跋陀羅譯皇明吳興後學沙門廣莫參訂夏官大夫擕李袁黃閲正一切佛語心品第一之二爾時大慧菩薩摩訶薩白佛言世尊世尊修多羅說如來藏自性清淨轉三十二相入於一切衆生身中如大價寶垢衣所纏如來之藏常住不變亦復如是而陰界入垢衣所纏貪欲恚癡不實妄想塵勞所污一切諸佛之所演說大慧躡前一切修多羅皆應說空無二離自性等而發難也如大下舉喻以明衆生身中藏性常住如來下法合可解此引據下正難云何世尊同外道說我言有如來藏耶世尊外道亦說有常作者離於求那周遍不滅世尊彼說有我求那輔行譯云依諦新說云此難如來若說有如來藏義是違上一切修多羅皆應說空即同外道說有神我然彼計我其義有三一者體常名為作者二者雖在五陰而離於求那三者遍歷諸趣實非生滅今說藏義豈非同於外道我耶佛告大慧我說如來藏不同外道所說之我大慧有時說空無相無願如實際法性法身涅槃離自性不生不滅本來寂靜自性涅槃如是等句說如來藏已如來應供等正覺為斷愚夫畏無我句故說離妄想無所有境界如來藏門大慧未來現在菩薩摩訶薩不應作我見計著我說下世尊自謂應機說法方便不一不同外道所說之我也有時下明應機不一之意謂有時說空乃至自性涅槃以如是等句顯示如來藏已如來又恐愚夫聞此空無相等則無有我復生怖畏為斷此疑復說離妄想無所有境界中有如來藏性即此無所有為入藏性之門不令墮於無見也是故行者莫以如來藏作我見計著譬如陶家於一泥聚以人工水木輪繩方便作種種器如來亦復如是於法無我離一切妄想相以種種智慧善巧方便或說如來藏或說無我以是因緣故說如來藏不同外道所說之我是名說如來藏開引計我諸外道故說如來藏令離不實我見妄想入三解脫門境界譬如下喻也如來下法合陶音搖陶家喻如來泥聚喻藏性人工木輪等喻種種智慧善巧方便作種種器喻或說藏性或說無我等名也以是下結不同外道之意是名下結世尊善巧方便之意三解脫者即空無相無願此三能脫心意識等故門喻也取出入義楊彥國纂云華嚴謂菩薩觀緣起而知自性空得空解脫觀十二有支自性滅得無相解脫入空無願求唯為教化衆生故得無願解脫故曰三解脫希望疾得阿耨多羅三藐三菩提希望約佛邊說謂佛希望衆生疾得阿耨菩提故說種種藏性之門也是故如來應供等正覺作如是說如來之藏若不如是則同外道是故大慧為離外道見故當依無我如來之藏初是故下結前意以明如來隨順說法無外見之咎也次是故下勉諸菩薩當離外見而依此無我之藏性也爾時世尊欲重宣此義而說偈言人相續陰緣與微塵勝自在作心量妄想外道計九物生世間一計時二計方三計微塵四計空五計大種六計神我七計勝妙八計自在天九計大梵天今初云人者即我之異名言神我也陰是所生人與微塵勝自在等是能生作謂作者謂人等作諸陰界入法故得相續而住以顯外道九種作者是妄想心量爾時大慧菩薩摩訶薩觀未來衆生復請世尊惟願為說修行無間如諸菩薩摩訶薩修行者大方便大慧前以如來藏性為難而世尊既釋其疑則知藏性為修行所證之體故今復問修行之次令未來學者得其門故言修行無間者謂行有淺深道原平等如百川歸海同一鹹味故云無間又與前經五性無間義同如諸下大慧所問雖兼頓漸而其本意的在大乘故舉菩薩方便為辭耳佛告大慧菩薩摩訶薩成就四法得修行者大方便云何為四謂善分別自心現觀外性非性離生住滅見得自覺聖智善樂是名菩薩摩訶薩成就四法得修行者大方便成就下示法云何下標名下文釋義云何菩薩摩訶薩善分別自心現謂如是觀三界唯心分齊離我我所無動搖離去來無始虗僞習氣所熏三界種種色行繫縛身財建立妄想隨入現是名菩薩摩訶薩善分別自心現云何下徵名謂如下正釋義也觀三界唯心者謂心外無法唯識變現以唯識故於一切法離我我所無有作者離去來相也以無始虗僞所熏故則有種種色相種種心行之所繫縛身根身也財資生之物也若依若正悉是妄想所現是名下結云何菩薩摩訶薩善觀外性非性謂𦦨夢等一切性無始虗僞妄想習因觀一切性自性菩薩摩訶薩作如是善觀外性非性是名菩薩摩訶薩善觀外性非性云何下徵名謂焰下正釋義也外性非性者外性指離識有法也其性非真故云非性如陽焰幻夢等非實有故從無始妄想習因所起菩薩能觀此因故知外性非性也是名下結云何菩薩摩訶薩善離生住滅見謂如幻夢一切性自他俱性不生隨入自心分齊故見外性非性見識不生及緣不積聚見妄想緣生於三界內外一切法不可得見離自性生見悉滅知如幻等諸法自性得無生法忍得無生法忍已離生住滅見是名菩薩摩訶薩善分別離生住滅見云何下徵名謂如下正釋義也言善觀如幻夢等一切性非性故自性他性俱性不生以諸性不生故隨所證入自心境界所謂三界唯心也分齊即境界義因見外性非性故則內識不起因內識不起故則外緣不聚因見妄想緣生故求於三界內外諸法悉不可得見離自性者謂能觀之見亦離自性也生見悉滅者謂外之緣生內之能見二俱滅故以知諸性如幻故隨得無生法忍得是忍故則能遠離一切生住滅見是名下結云何菩薩摩訶薩得自覺聖智善樂謂得無生法忍住第八菩薩地得離心意意識五法自性二無我相得意生身云何下徵名謂得下正釋義也得無生法忍住第八地者華嚴第八地經云菩薩於七地中善修習方便慧乃至入一切法本來無生無起無相無成無壞無盡無轉無性為性離一切心意識分別想無所取著猶如虗空入一切法如虗空性是名得無生法忍忍者言默會無生忍可於心欲罷而不能者謂之忍菩薩成就此忍即時得入第八不動地與今經同也得意生身者華嚴又云此菩薩隨諸衆生身心信解種種差別於彼佛土衆會之中而現其身乃至應以聲聞身辟支佛身菩薩身如來身得度者即皆現之是名意生身也如意念生無障礙故世尊意生身者何因緣佛告大慧意生身者譬如意去迅疾無礙故名意生譬如意去石壁無礙於彼異方無量由延因先所見憶念不忘自心流注不絶於身無障礙生大慧如是意生身得一時俱菩薩摩訶薩意生身如幻三昧力自在神通妙相莊嚴聖種類身一時俱生猶如意生無有障礙隨所憶念本願境界為成就衆生得自覺聖智善樂大慧因聞意生之名而未知名下之義云何故有此問也佛告下舉喻略釋次譬如下廣釋喻義大慧下法合以明三種意生俱時得現三種身者一三昧樂正受意生身二覺法自性性意生身三種類俱生無行作意生身今文雖略義必俱收會文可解猶如下重躡上喻合顯得自下結如是菩薩摩訶薩得無生法忍住第八菩薩地轉捨心意意識五法自性二無我相身及得意生身得自覺聖智善樂如是下明意生之位也轉捨下示離有行之妄也及得下明證無作之真也得自下重結第四法名然此四法初約內觀故云分別自心二約外觀故云觀外性非性三約能所故云見外性及見不生四約無功用以息前三之法故云得無生忍離心意識也四法次第深入為修行者大方便是名菩薩摩訶薩成就四法得修行者大方便當如是學總結四法勉諸當學爾時大慧菩薩摩訶薩復請世尊惟願為說一切諸法緣因之相以覺緣因相故我及諸菩薩離一切性有無妄見無妄想見漸次俱生緣因魏唐二譯作因緣大慧問意從前內外性中發起內外諸性是因緣法由是今問何者為因何者為緣以覺緣因相故能離一切性有無妄見離妄見故則無漸次俱生也佛告大慧一切法二種緣相謂外及內外緣者謂泥團柱輪繩水木人工諸方便緣有瓶生如泥瓶縷㲲草席種芽酪酥等方便緣生亦復如是是名外緣前後轉生一切下先標緣數謂外下次列內外外緣者下三別釋外緣義外緣者外指因外之助也泥團輪等舉喻例明一切法方便緣生也前後轉生者前謂前方便如造瓶器先具輪繩等後謂後方便如薪火力用等以前前轉生後後故新說云言泥團為因水杖等為緣而成於瓶為果如泥瓶因果既爾例餘縷㲲等四亦復如是皆以縷草種酪為因㲲席芽酥為果緣義可知是名緣生之法必先因後果展轉而生謂親起者為因疏助者為緣也云何內緣謂無明愛業等法得緣名從彼生陰界入法得緣所起名彼無差別而愚夫妄想是名內緣法此別釋內緣義也無明愛業者舉十二因緣之二也無明者謂無始煩惱之惑一念不覺明轉為昏真轉成妄覆於本性無妙覺明故曰無明是過去之因也愛者謂貪於種種勝妙資具及淫欲等境此名為愛是現在之因也略舉過現之因影帶未來故知十二緣起名內緣法也既是過現之因今文何以緣名謂十二展轉為因亦展轉為緣故得緣名也陰界入為緣所起者謂陰等諸法悉依十二而得起故然又十二緣中無明與愛為生之本由是雙舉此二以顯緣生本體故也彼無差別者彼指無明愛等及緣所起二皆無性故無差別而差別者愚妄所計耳此釋緣竟下文釋因大慧彼因者有六種謂當有因相續因相因作因顯示因待因此標名下釋義當有因者作因已內外法生當有因者謂現在作因當來成果現無當有名當有因也相續因者作攀緣已內外法生陰種子等相續因者由識攀緣內外陰等種現不斷名相續因也內是心法外是色法相因者作無間相相續生相即無間相也無間者謂前念滅已後念續生前後無間名無間相此上二因蓋屬四緣中之次第緣也次第不斷即相續故成唯識以次第名等無間緣論云謂八識及彼心所前聚於後自類無間等而開導名等無間也八識頌注云等無間者乃各識前念已滅即開闢處所引後念令生中間無隔者是其相也今文無間正是此義作因者作增上事如轉輪王作謂作用諸識轉變有增上力令諸法生時無有障礙名為作因此屬四緣中之增上緣也成唯識云增上緣者謂有法有勝勢用能於餘法顯緣差別名增上緣今云事者彼謂生住成得等事也如轉輪王者喻也轉輪王於人中最勝有增上力用此緣於四緣中亦有勝勢力用法喻相應故取喻耳顯示因者妄想事生已相現作所作如燈照色等顯示者謂能所相現目可見而有對名顯示也妄想事者謂由妄想故所作事生事既生已能作所作相現能作如燈所作如色能作即諸心心所所作即色等六塵心能照境如燈之照色也以能顯所故云作所作此屬四緣中之所緣緣也已上四緣詳如彼論中說按成唯識及觀所緣緣論皆以內色為所緣緣不取外質故觀所緣緣云內色如外現為識所緣緣許彼相在識及能生識故今云作所作者正取內色之意但經文太簡人難解了詳如彼論待因者滅時作相續斷不妄想性生待因魏譯作觀待因此待因應連顯示因並屬所緣緣也何者以作所作相現則相待之因含攝其中如云滅時還作作時還滅非待而何今經三譯於此六因文雖稍異其義頗同諸解不詳縱解之無據學者曷從愚故按論補釋來者幸尋思之集注云言諸法滅時還作作時還滅妄想相續性斷不妄想性復生遞互相待故曰待因大慧彼自妄想相愚夫不漸次生不俱生魏譯云大慧如是諸法凡夫自心虗妄分別大慧是諸法非次第生非一時生此明上文諸因緣相是愚夫妄想所有本無實體漸次俱生求不可得故皆云不也所以者何若復俱生者作所作無分別不得因相故若漸次生者不得相我故漸次生不生如不生子無父名相我魏譯作身相唐譯作體相按此謂因相之體也此微明漸次俱生二非也若復下謂俱生者能所不異無可分別則因相不得非俱生矣若漸下謂不得因相自體漸次何生故云漸次生不生也復引喻例明謂因相是因漸生是果果若不生因無以名如不生子父名何出大慧漸次生相續方便不然但妄想耳因攀緣次第增上緣等生所生故唐譯云諸計度人言以因緣緣緣無間緣增上緣等所生能生互相繫屬愚夫妄計相續方便有漸次生佛破云不然但妄想耳因攀下重明漸次生因也謂諸愚夫因四緣故生所生也大慧漸次生不生妄想自性計著相故唐譯云次第生者理不得成皆是妄情執著相故漸次不生者謂了知是妄想計著而有以了知故不生也漸次俱不生自心現受用故自相共相外性非性唐譯云漸次與頓皆悉不生但自心現身資等故漸次俱不生者亦謂了知身及資生由自心現以了知故二皆不生受用即資生也了知自心現則自共相等性即非性也大慧漸次俱不生除自心現不覺妄想故相生漸次俱不生者以能了知二生之妄故不生也除不覺自心現故見有相生是故因緣作事方便相當離漸次俱見此結上文四緣方便皆不覺妄想相勉諸行者當離漸次俱見也爾時世尊欲重宣此義而說偈言一切都無生亦無因緣滅於彼生滅中而起因緣想謂諸法本無生滅何有諸凡愚人於妄生滅中而起四緣之想非遮滅復生相續因緣起唯為斷凡愚癡惑妄想緣唐譯云非遮諸緣會如是滅復生但止於凡愚妄想之所著佛謂非遮生滅相續諸緣起法何以故了知諸法當體虗寂由諸凡愚妄生取著但斷取心諸法何有有無緣起法是悉無有生習氣所迷轉從是三有現真實無生緣亦復無有滅觀一切有為猶如虗空華頌義可知攝受及所攝捨離惑亂見非已生當生亦復無因緣一切無所有斯皆是言說攝受是識所攝是境惑亂諸見智者當離諸法本寂不墮三世故云非已生當生也三世既非因緣何有故云一切無所有若能若所其因其緣墮三世論者皆言說妄想耳爾時大慧菩薩摩訶薩復白佛言世尊惟願為說言說妄想相心經心經魏唐二譯作心法門此問從前偈言說妄想二意中發起世尊我及餘菩薩摩訶薩若善知言說妄想相心經則能通達言說所說二種義疾得阿耨多羅三藐三菩提以言說所說二種趣淨一切衆生言說唐譯作能說此大慧自陳問意謂有如是利益故應問也佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧有四種言說妄想相謂相言說夢言說過妄想計著言說無始妄想言說此標名下釋義相言說者從自妄想色相計著生色謂青黃赤白等相謂高低曲直等相本非相由自妄想計著生此明相言說之所由生也夢言說者先所經境界隨憶念生從覺已境界無性生境界無性生魏譯作虗妄境界不實而生先所經境界者謂昔曾經歷之境隨憶生夢夢既覺則夢中言說或隨夢起言說皆妄也出夢言說生之所以云本從無性境界生也無性謂夢中境界無性而有相故過妄想計著言說者先怨所作業隨憶念生過即過惡諸狠戾言說是也由先時怨所作業今隨憶念生諸過惡言說無始妄想言說者無始虗僞計著過自種習氣生魏譯云無始言說者從無始來執著戲論煩惱種子熏習而生過自種者謂過之自種子也過有貪瞋癡慢之不同各有種現交相熏習而起言說是名四種言說妄想相結名可知爾時大慧菩薩摩訶薩復以此義勸請世尊惟願更說言說妄想所現境界前問言說所起之因此問言說所現之境世尊何處何故云何何因衆生妄想言說生魏譯云惟願為我重說四種虗妄執著言語之相衆生言語何處出云何出何因出今文四何皆能問之辭也以言說一句貫之謂何處言說生何故言說生等如魏譯可知佛告大慧頭胸喉鼻唇舌齗齒和合出音聲此明言說所起之處也齗魚巾切齒根肉也唐譯作齶傍牙也大慧白佛言世尊言說妄想為異為不異佛告大慧言說妄想非異非不異所以者何謂彼因生相故所以下魏譯云何以故因彼虗妄法相生言說故因即妄想也從因所生之相言說也不即不離二無實體故云非異非不異雙遣如下文說大慧若言說妄想異者妄想不應是因若不異者語不顯義而有顯示是故非異非不異此承上文以言說對妄想辨異不異也古注云若言說與妄想異者不應因妄想起言說若言說與妄想不異者則言說不能顯示其義非不異也大慧復白佛言世尊為言說即是第一義為所說者是第一義佛告大慧非言說是第一義亦非所說是第一義若以言說為第一義者指非月故若以所說為第一義者法亦成緣因待有故此雙遣能所二過也所以者何謂第一義聖樂言說所入是第一義非言說是第一義言說如門行者依言說之門而入升堂入室處是第一義非門即堂之與室也第一義者聖智自覺所得非言說妄想覺境界自覺所得者謂心境一如理智雙寂為得非言說知解可通故云非言說妄想境界是故言說妄想不顯示第一義言說者生滅動搖展轉因緣起若展轉因緣起者彼不顯示第一義大慧自他相無性故言說相不顯示第一義蓋第一義無聲無臭寂然無朕言說則是生滅動搖從展轉因緣起是故言說不能顯示第一義也自他相無性者謂能說為自相所說為他相自他俱妄故言說不能顯示第一義也復次大慧隨人自心現量故種種相外性非性言說妄想不顯示第一義是故大慧當離言說諸妄想相唐譯云第一義者但唯自心種種外相悉皆無有言語分別不能顯示是故大慧應當遠離言語分別謂隨入一切皆是自心現量則知外種種相性非性矣唯心境界言說莫及是故不能顯示第一義是故下勉諸菩薩當離言既妄想相爾時世尊欲重宣此義而說偈言諸性無自性亦復無言說甚深空空義愚夫不能了諸性諸妄想性也性既無性言說何有故云亦復無言說空空者承上二句謂諸性空及言說空也空空境界即第一義是故愚夫不能了一切性自性言說法如影自覺聖智子實際我所說前二句舉喻類明諸性言說二皆如影謂不實也後二句承上二句出所說意言世尊為得自覺聖智之子說諸性言說之實際耳爾時大慧菩薩摩訶薩復白佛言世尊惟願為說離有無一異俱不俱非有非無常無常一切外道所不行自覺聖智所行離妄想自相共相入於第一真實之義諸地相續漸次上上增進清淨之相隨入如來地相無開發本願譬如衆色摩尼境界無邊相行自心現趣部分之相一切諸法從惟願為說至此皆請說之義也以為說二字直貫末句謂惟願為說離有無等相外道所不行聖智所行者又為說離自共相入第一義者又為說諸地相續乃至如來地無邊相行唯心所現分部之相一切諸法大慧因聞第一義離言說境界故發此問意欲重顯一切外道所計諸見不能行於第一義中所行者唯自覺聖智耳我及餘菩薩摩訶薩離如是等妄想自性自共相見疾得阿耨多羅三藐三菩提令一切衆生一切安樂具足充滿此大慧自陳問意也謂若得聞上諸義則能遠離如是妄想自共相見疾得阿耨菩提也自利既爾亦能令諸衆生具足充滿一切安樂佛告大慧善哉善哉汝能問我如是之義多所安樂多所饒益哀愍一切諸天世人世尊將酬問義且先歎其所問具足自利利他之益佛告大慧諦聽諦聽善思念之吾當為汝分別解說大慧白佛言善哉世尊唯然受教佛告大慧不知心量愚癡凡夫取內外性依於一異俱不俱有無非有非無常無常自性習因計著妄想此世尊將酬其問先顯妄因以定凡愚所計之本也新說云言凡夫愚癡不知自心現量妄習為因之所變現執內外法為有為無起四句等見以十二喻況此有無一異等法皆不真實是應遠離譬如羣鹿為渴所逼見春時𦦨而作水想迷亂馳趣不知非水喻也如是愚夫無始虗僞妄想所熏習三毒燒心樂色境界見生住滅取內外性墮於一異俱不俱有無非有非無常無常想妄見攝受法也羣鹿喻愚夫為渴所逼喻無始妄習所熏陽焰喻陰界入等而作水想喻外道計著迷亂馳趣喻墮一異等見不知非水喻妄見攝受如揵闥婆城凡愚無智而起城想無始習氣計著相現彼非有城非無城喻也彼非有城非無城者謂雖見似城海氣所現實非城也幻相不無因緣故現如是外道無始虗僞習氣計著依於一異俱不俱有無非有非無常無常見不能了知自心現量法也揵城喻陰界入等而起城想喻外道計著習氣計著相現喻依妄習起一異等見非有城非無城喻不能了知自心現量妄起分別有無等也譬如有人夢見男女象馬車步城邑園林山河浴池種種莊嚴自身入中覺已憶念大慧於意云何如是士夫於前所夢憶念不捨為黠慧不大慧白佛言不也世尊喻也佛告大慧如是凡夫惡見所噬外道智慧不知如夢自心現性依於一異俱不俱有無非有非無常無常見法也夢非外來由自心現陰等如夢復何分別一異等耶由諸外道不知自心現量計著諸見與彼憶念夢境不捨者同也譬如畫像不高不下而彼凡愚作高下想喻也如是未來外道惡見習氣充滿依於一異俱不俱有無非有非無常無常見自壞壞他餘離有無無生之論亦說言無法也畫非高下高下由心如彼諸法本然平等而未來外道充滿世間妄見一異等也餘離有無無生之論者謂如來正論觀法無生離於有無外道亦計言無自壞壞他為過甚矣謗因果見拔善根本壞清淨因勝求者當遠離去作如是說彼墮自他俱見有無妄想已墮建立誹謗以是惡見當墮地獄謗因下出撥無之過勝求下勉正行者當離此惡作如下對治衆惡是遠離法譬如翳目見有垂髮謂衆人言汝等觀此而是垂髮畢竟非性非無性見不見故垂髮魏唐二譯作毛輪喻也毛輪是燈上所見圓影垂髮是翳目所見覆面之髮而是下出垂髮之妄謂翳目妄見垂髮而不知垂髮非有非無以翳目妄見故非無性淨眼不見故非有性有性無性二皆妄見如是外道妄見希望依於一異俱不俱有無非有非無常無常見誹謗正法自陷陷他法也翳見垂髮喻諸外道妄見陰界入等誹謗下出其惡見之咎譬如火輪非輪愚夫輪想非有智者喻也火輪旋火也本無有輪愚夫妄作輪想非智者之見也如是外道惡見希望依於一異俱不俱有無非有非無常無常想一切性生法也火輪無性妄計為有喻如諸法本空外作一異等想故有一切性生譬如水泡似摩尼珠愚小無智作摩尼想計著追逐而彼水泡非摩尼非非摩尼取不取故喻也智者不取故非摩尼愚小追逐故非非摩尼如是外道惡見妄想習氣所熏於無所有說有生緣有者言滅法也喻中言愚小者愚指外道小指二乘法中言無有說有謂計異性能生法也有者言滅指外道計斷滅論者復次大慧有三種量五分論各建立已得聖智自覺離二自性事而作有性妄想計著新說云言三種量者一現量二比量三聖言量量者楷定義譬夫升斗量物也現量者現即顯現謂分明證境不帶名言無籌度心親得法體離妄分別而非錯謬比量者比即比類謂以因由譬喻比類量度而得知故聖言量者謂以如來聖教為準繩故五分論者一宗二因三喻四合五結宗因喻三亦云三支比量合結但成之且如外道妄計執聲為常於聲明中立量云聲是有法定常為宗因云所作性故同喻如虗空然而虗空非所作性則因上不轉引喻不齊立聲為常不成若佛法中聲是無常故立量云聲是有法定無常為宗因云所作性故同喻如瓶盆如首楞嚴云音聲雜語言但依名句味豈常也哉外道何由去執集注云如來建立三種量五分論揀辨邪正已令離緣起妄想二種自性事得自覺聖智而愚夫猶計作有性起妄想分別大慧心意意識身心轉變自心現攝所攝諸妄想斷如來地自覺聖智修行者不於彼作性非性想謂正修行者斷心意識能所諸妄想故於自身心得勝轉依不於攝所攝陰界入等作有無想若復修行者如是境界性非性攝取想生者彼即取長養及取我人謂修行者不正計著於如是攝所攝境計著有性無性生攝取相彼即墮於長養我人等見失於正受大慧若說彼性自性自共相一切皆是化佛所說非法佛說謂性自性等是化佛權說非法佛第一義之說也又諸言說悉由愚夫希望見生不為別建立趣自性法得聖智自覺三昧樂住者分別顯示謂化佛言說悉由隨順愚夫希望見生而不為別立趣自性第一義之法何以故蓋自性法乃為得自覺聖智三昧樂住者分別顯示故譬如水中有樹影現彼非影非非影非樹形非非樹形喻也如是外道見習所熏妄想計著依於一異俱不俱有無非有非無常無常想而不能知自心現量法也非影非形二句謂離樹無影影實在樹故非影也所現唯水因樹成影故非非影也水本無樹唯水所現故非樹也離樹無影全影即樹故非非樹也以況自心現量離是非是外道無知妄計一異等譬如明鏡隨緣顯現一切色像而無妄想彼非像非非像而見像非像妄想愚夫而作像想喻也鏡隨外緣顯現衆像鏡無欣厭離是非是也非像非非像者同前樹影諸愚夫輩妄見是像非像而作像想如是外道惡見自心像現妄想計著依於一異俱不俱有無非有非無常無常見法也鏡喻自心現量像喻陰界入法謂陰界入法離自心現量無別有性如像離鏡非別有故而諸外道不知自心妄計一異俱不俱等譬如風水和合出聲彼非性非非性唐譯云譬如谷響依於風水人等音聲和合而起非有非無喻也非性句如前影像如是外道惡見妄想依於一異俱不俱有無非有非無常無常見法合可知譬如大地無草木處熱𦦨川流洪浪雲湧彼非性非非性貪無貪故喻也川流浪湧皆熱焰流動之相也貪無貪者釋上非性非非性意言陽焰流動渴鹿所逐故貪謂非非性也人知是焰故不貪謂非性也如是愚夫無始虗僞習氣所熏妄想計著依生住滅一異俱不俱有無非有非無常無常緣自住事門亦復如彼熱𦦨波浪法也大地無草木處喻真如非相處熱焰等喻陰界入法謂此外道由無始虗僞習氣所熏妄依生住滅相一異等乃緣聖智事門亦復如彼一異等見故云亦復如彼熱焰波浪譬如有人呪術機發以非衆生數毗舍闍鬼方便合成動搖云為凡愚妄想計著往來魏譯云譬如有人依呪術力起於死尸機關木人無衆生體依毗舍闍力依幻師力作去來事喻也非衆生數者謂以草木編刻人形或以呪術或託毗舍闍鬼之力方便合成機關內發動搖云為然以草木編刻本非有情故云非衆生數毗舍闍譯云啖精氣如是外道惡見希望依於一異俱不俱有無非有非無常無常見戲論計著不實建立大慧是故欲得自覺聖智事當離生住滅一異俱不俱有無非有非無常無常等惡見妄想法也木人喻真如無我呪術機發及毗舍闍喻惡見希望計著往來喻依陰界入法起生住滅一異等見是故下結勸得自覺者當離一異等也爾時世尊欲重宣此義而說偈言幻夢水樹影垂髮熱時𦦨如是觀三有究竟得解脫以衆譬例三有也依譬觀察則得究竟解脫譬如鹿渴想動轉迷亂心鹿想謂為水而實無水事如是識種子動轉見境界愚夫妄想生如為翳所翳於無始生死計著攝受性如逆楔出楔捨離貪攝受動轉即有無生滅此有無生滅境界從愚夫妄想所生集注云衆生為計著攝受如楔楔之不能出離如來憐憫以不實諸喻為楔逆而楔之令其出離不被惡見妄想及攝受之性所障如幻呪機發浮雲夢電光觀是得解脫永斷三相續浮雲電光長行無出此為旁喻也三相續見第三卷於彼無有作猶如𦦨虗空如是知諸法則為無所知焰虗空唐譯作如空中陽焰言諸法本無作者如空中陽焰以如是知則所知無實矣言教唯假名彼亦無有相於彼起妄想陰行如垂髮能喻為言教所喻是陰等以言教對陰等謂能所俱無相故云彼亦無相也於彼能所起妄想則行陰遷流依妄生妄如垂髮之非實耳如畫垂髮幻夢揵闥婆城火輪熱時𦦨無而現衆生末句唐譯作實無而見有謂諸妄本無現時似有雖無而衆相常現末句衆生字即衆相也此頌喻義常無常一異俱不俱亦然無始過相續愚夫癡妄想此頌法義明鏡水淨眼摩尼妙寶珠於中現衆色而實無所有一切性顯現如晝熱時𦦨種種衆色現如夢無所有衆譬偈中疊出者蓋反復例明諸法不實勉諸行者要當遠離復次大慧如來說法離如是四句謂一異俱不俱有無非有非無常無常離於有無建立誹謗此承前章以明如來說法離此諸過分別結集真諦緣起道滅解脫如來說法以是為首真諦理也緣起十二緣起法也道滅四諦之二是出世因果影帶苦集二諦世間因果解脫即涅槃也如來化儀分而為三初說二乘故云以是為首非性非自在非無因非微塵非時非自性相續而為說法此揀過也謂如來以正因緣為說諸法非如外道計彼性自在等而作言說復次大慧為淨煩惱爾𦦨障故譬如商主次第建立百八句無所有善分別諸乘及諸地相集注云如來建立百八句義及分別諸乘地相令諸衆生淨除二障斷滅諸惑猶如商主引導衆商直至寶所於其險阻之處設諸方便悉令過之復次大慧有四種禪云何為四謂愚夫所行禪觀察義禪攀緣如禪如來禪此標名下釋義云何愚夫所行禪謂聲聞緣覺外道修行者觀人無我性自相共相骨璅無常苦不淨相計著為首如是相不異觀前後轉進想不除滅是名愚夫所行禪骨璅即小乘白骨觀也如是相不異觀者如是相即牒人無我等不異觀者謂觀諸相本性空寂故不異也古注云二乘觀人空又觀陰界入自共相作無常苦不淨觀如是相不異如是觀自共相等觀無常等行雖有勝進然不離相是名愚夫所行禪云何觀察義禪謂人無我自相共相外道自他俱無性已觀法無我彼地相義漸次增進是名觀察義禪謂字下應加一觀字義始足是觀二乘義外道下是觀外道義觀法下是觀菩薩義自他俱無性者謂自性他性自他俱性無性謂無因性也此四是外道所計之義諸乘並觀故名觀察義禪云何攀緣如禪魏唐二譯於如字上加一真字謂妄想二無我妄想如實處不生妄想是名攀緣如禪攀緣如者謂菩薩乘人以智緣如智理相寂名攀緣如禪也妄想二無我妄想者上妄想字是能緣之智以智稱妄想者謂智體如幻故亦云妄想下妄想字指二無我說二無我是所緣境猶屬法數故亦稱妄想如實處更無妄想故云如實處不生妄想是名下結名云何如來禪謂入如來地得自覺聖智相三種樂住成辦衆生不思議事是名如來禪謂入下魏譯云謂如實入如來地故入內身聖智三空三種樂行故能成辦衆生所作不可思議是名觀察如來禪聖智三種樂者即法身般若解脫故魏譯約內身三空而言三空即三德故爾時世尊欲重宣此義而說偈言愚夫所行禪觀察相義禪攀緣如實禪如來清淨禪此頌舉名下頌出義譬如日日形鉢頭摩深險如虗空火燼修行者觀察梵語鉢頭摩譯云紅蓮華新說云此明外道二乘修禪之相言外道計著神我於禪觀時見如日月形狀明淨朗耀或見如紅蓮華在深險之下二乘以自共相為實有灰身滅智同於虗空如薪盡火滅以為究竟涅槃如是種種相外道道通禪亦復墮聲聞及緣覺境界道通禪者謂外道所通之禪也捨離彼一切則是無所有捨離諸相入真如禪無所有即真如故一切剎諸佛以不思議手一時摩其頂隨順入如相此頌如來禪也前三句頌成辦衆生不思議事末句結入如相爾時大慧菩薩摩訶薩復白佛言世尊般涅槃者說何等法謂為涅槃此問從前如來禪三種樂中發起涅槃是體三種是德大慧因聞德而問體也新說云外道以見神我為涅槃二乘以身智滅如薪盡火滅為涅槃故問如來說何等法名為涅槃佛告大慧一切自性習氣藏意意識見習轉變名為涅槃諸佛及我涅槃自性空事境界此明轉心意識諸見習氣名大涅槃也諸佛下明彼我身土法化教證因果等是涅槃自性空事境界又解自性空即涅槃體也事境界者即力通自在三種意生身是涅槃用也集注云事境界者如華嚴事事無礙法界也復次大慧涅槃者聖智自覺境界離斷常妄想性非性此承前文廣明涅槃意也云何非常謂自相共相妄想斷故非常云何非斷謂一切聖去來現在得自覺故非斷釋文可知大慧涅槃不壞不死若涅槃死者復應受生相續苦壞者應墮有為相是故涅槃離壞離死是故修行者之所歸依涅槃經云涅言不生槃言不滅不生不滅名大涅槃今言壞者即生住異滅四相中之異相也蓋言涅槃永離四相故云不壞不死新說云以更不受生相續故涅槃不死以非有為生住滅法故涅槃不壞以不壞不死故為修行者之所歸依復次大慧涅槃非捨非得非斷非常非一義非種種義是名涅槃新說云涅槃無煩惱可捨無菩提可得故非斷常一異唯證相應是名如來涅槃復次大慧聲聞緣覺涅槃者覺自相共相不習近境界不習近境界唐譯作捨離憒閙前明如來大涅槃義此別明二乘涅槃以顯深淺之殊也二乘之人樂獨善寂宴處山林不假徒衆故云不習近境界不顛倒見妄想不生彼等於彼作涅槃覺不顛倒等者謂二乘不計神我等故不顛倒見也以不顛倒故妄想不生即於不生處作涅槃想此意簡其未盡涅槃實際故也復次大慧二種自性相云何為二謂言說自性相計著事自性相計著言說自性相計著者從無始言說虗僞習氣計著生事自性相計著者從不覺自心現分齊生此文可解復次大慧如來以二種神力建立菩薩摩訶薩頂禮諸佛聽受問義云何二種神力建立謂三昧正受為現一切身面言說神力及手灌頂神力二種神力謂行者於三昧正受時佛現身面言說神力及灌頂神力大慧菩薩摩訶薩初菩薩地住佛神力所謂入菩薩大乘照明三昧入是三昧已十方世界一切諸佛以神通力為現一切身面言說如金剛藏菩薩摩訶薩及餘如是相功德成就菩薩摩訶薩如是相功德成就者謂成就二種神力之菩薩也集注云如華嚴會中金剛藏菩薩住初地時蒙如來神力加持餘菩薩亦爾大慧是名初菩薩地菩薩摩訶薩得菩薩三昧正受神力於百千劫積習善根之所成就次第諸地對治所治相通達究竟此結第一言說神力也次第下謂從初地至第九地皆以言說神力被其功德成就至法雲地住大蓮華微妙宮殿坐大蓮華寶師子座同類菩薩摩訶薩眷屬圍繞衆寶瓔珞莊嚴其身如黃金薝蔔日月光明諸最勝子從十方來就大蓮華宮殿座上而灌其頂譬如自在轉輪聖王及天帝釋太子灌頂是名菩薩手灌頂神力魏譯云至法雲地住大寶蓮華王宮殿師子座上坐同類菩薩摩訶薩眷屬圍繞寶冠瓔珞莊嚴其身如閻浮檀金薝蔔日月光明勝蓮華色爾時十方一切如來各申其手遙摩蓮華王座上菩薩摩訶薩頂如得自在王帝釋王轉輪王灌大子頂授位故大慧彼授位菩薩及眷屬菩薩摩訶薩依如來手摩頂故得遍身樂是故言手摩菩薩頂住持力按魏唐二譯及今經標文皆云如來手灌菩薩之頂獨今文云諸最勝子就彼座上而灌其頂於喻於標有相違意此必譯主或筆受者之訛也故録魏譯如上當准其義有本最勝子子字作手則似諸最勝手從十方來而灌其頂准此義始順譬始下明其授職之義是名下結第二灌頂神力大慧是名菩薩摩訶薩住二種神力若菩薩摩訶薩住二種神力面見諸佛如來若不如是則不能見是名下總結可知若菩薩下明住二力之益若不下顯不住之咎復次大慧菩薩摩訶薩凡所分別三昧神足諸法之行是等一切悉住如來二種神力前所說二力由佛被諸菩薩為菩薩之自利也今文謂所被諸菩薩復承二力分別諸法之行利益衆生為利他行自利利他皆由二種神力所被故云是等一切悉住如來二種神力大慧若菩薩摩訶薩離佛神力能辨說者一切凡夫亦應能說所以者何謂不住神力故此謂凡能說法必藉諸佛神力離佛二力則辨有所屈法有所滯故所以下徵釋凡夫不能說之所以謂不住二力故不能說大慧山石樹木及諸樂器城郭宮殿以如來入城威神力故皆自然出音樂之聲何況有心者聾盲瘖啞無量衆苦皆得解脫如來有如是等無量神力利安衆生木石無情猶能出聲聲中必頌佛德如華嚴中雲臺寶網皆有頌佛之偈而況有情衆生不讚詠乎此顯如來入城有如是神力之大利益之深以明二力加持行者勢必然也大慧菩薩復白佛言世尊以何因緣如來應供等正覺菩薩摩訶薩住三昧正受時及勝進地灌頂時加其神力此大慧復問加持神力之由佛告大慧為離魔業煩惱故及不墮聲聞地禪故為得如來自覺地故及增進所得法故以有如是因緣故諸菩薩必蒙其益而諸佛必被其功也是故如來應供等正覺咸以神力建立諸菩薩摩訶薩若不以神力建立者則墮外道惡見妄想及諸聲聞衆魔希望不得阿耨多羅三藐三菩提以是故諸佛如來咸以神力攝受諸菩薩摩訶薩是故下結所被之由若不下明不蒙之咎以是下重結所被以明諸佛攝受之殷在此爾時世尊欲重宣此義而說偈言神力人中尊大願悉清淨三摩提灌頂初地及十地三摩提亦曰三昧智論云一切禪定攝心皆名三摩提譯云正心行處是心從無始來常曲不端得是正心行處心則端直譬如蛇行常曲入竹筒則直名義集又譯等持謂離沉掉曰等令心一境性曰持二名通用故長行云三昧也爾時大慧菩薩摩訶薩復白佛言世尊佛說緣起即是說因緣不自說道魏譯云如來亦說依於因緣而生諸法而不說有自建立法此難如來所說因緣有過同於外道所說也世尊外道亦說因緣謂勝自在時微塵生如是諸性生謂外道因緣從勝性自在等生一切法然世尊所謂因緣生諸性言說有間悉檀無間悉檀謂世尊所說亦從因緣生一切法則佛與外道所說為有間耶為無間耶若有間則有別義若無間則同外道悉檀解見前注世尊外道亦說有無有生世尊亦說無有生生已滅唐譯云外道亦說以作者故從無生有世尊亦說以因緣故一切諸法本無而生生已歸滅前文先難因緣之名此正難因緣之義也有無有生者謂有從無有生故如世尊所說無明緣行乃至老死此是世尊無因說非有因說世尊建立作如是說此有故彼有非建立漸生唐譯云如佛所說無明緣行乃至老死此說無因非說有因世尊說言此有故彼有若一時建立非次第相待者其義不成大慧難意引正類邪同名無因故先云世尊亦說無有生生已滅疑即無因也無因則同外道故引世尊先所說法證云如世尊所說無明緣行等是緣他生不能自有故屬無因非有因說也世尊又建立云此有故彼有是漸生也若俱時建立非相待者則漸次不成故云非建立漸生觀外道說勝非如來也所以者何世尊外道說因不從緣生而有所生世尊說觀因有事觀事有因如是因緣雜亂如是展轉無窮難佛所說不勝外道而外道因緣反勝於佛所以下出彼勝之所以謂外道說因自性能生於他不從外緣而生於我條直不枝故勝世尊說因則因中有事事中有因展轉雜亂故不勝也蓋能生為因所生為事事即果也故魏譯直作果字新說云謂外道說勝妙徹塵等因不從他緣生而能生他因常為因而不為果是外道說勝也如佛所說觀行是無明果觀識即是因如是一法即是因即是果故因緣雜亂無明生諸行諸行生老死老死生無明如是展轉無窮是如來不如外道也佛告大慧我非無因說及因緣雜亂說此有故彼有者攝所攝非性覺自心現量大慧若攝所攝計著不覺自心現量外境界性非性彼有如是過非我說緣起我常說言因緣和合而生諸法非無因生此世尊辨非無因及雜亂也此有下牒難語而出正意云以此有故彼有則因緣非性能所本空唯知自心所現耳大慧下躡正意而出彼過云以不覺自心現量及外境非性故計著能攝所攝有性無性彼有如是等過非我所說因緣同日而語也我常下正辨非無因生謂以因緣和合而生諸法非無因生也大慧復白佛言世尊非言說有性有一切性耶大慧疑謂因言說有實性故乃有一切法性也世尊若無性者言說不生世尊是故言說有性有一切性唐譯云大慧復白佛言世尊有言說故必有諸法若無諸法言依何起集注云以如來所說諸法由因緣而生非無因生故大慧問曰非言說有自性而有一切性耶意謂若無諸法之性則言說不生以言說有性故則有一切性也佛告大慧無性而作言說謂兔角龜毛等世間現言說大慧非性非非性但言說耳如汝所說言說有性有一切性者汝論則壞大慧前云言說有性有一切性故佛引世間無性之說而證具非也謂如兔角龜毛豈因言說而實有耶言說雖有龜毛兔角必無有性無性俱不可得但空有其言耳故云非性非非性即此而推則言說有性有一切性之論壞矣大慧非一切剎土有言說言說者是作耳唐譯云非一切佛土皆有言說言說者假安立耳或有佛剎瞻視顯法或有作相或有揚眉或有動睛或笑或缺或謦咳或念剎土或動搖缺魏譯作缺呿唐譯作頻申動搖魏譯作身顯法二字通下諸句蓋諸佛土顯法不同故言說非實有性也大慧如瞻視及香積世界瞻視魏譯作無瞬香積作衆香普賢如來國土但以瞻視令諸菩薩得無生法忍及諸勝三昧是故非言說有性有一切性引諸佛剎不務言說者結證大慧之說非也大慧見此世界蚊蚋蟲蟻是等衆生無有言說而各辦事自遠而近推及蜎蠕而有不務言說能辦事者豈謂言說有故有一切性耶爾時世尊欲重宣此義而說偈言如虗空兔角及與槃大子槃大子魏唐二譯作石女兒兔角無性空有其言故云如虗空長行有龜毛無石女兒今增減之無而有言說如是性妄想此二句中前二句意謂兔角槃大子本無而有言說但妄想性耳古注云計有言說性有一切性者是妄想因緣和合法凡愚起妄想不能如實知輪回三有宅法義可知爾時大慧菩薩摩訶薩復白佛言世尊常聲者何事說聲魏譯作法唐譯云所說常聲依何處說新說云因上佛謂言說所說皆無自性故大慧舉餘修多羅佛自說十二因緣有佛無佛性相常住故問所說常聲依何處說佛告大慧為惑亂以彼惑亂諸聖亦現而非顛倒魏譯云佛告聖者大慧菩薩言大慧依迷惑法我說為常何以故大慧聖人亦見世間迷惑法非顛倒心按魏譯可解佛謂彼惑亂法諸佛亦見其但即亂而知常即妄而明真故非顛倒衆生則不然以處處貪著起種種顛倒故下文引喻明之大慧如春時𦦨火輪埀髮揵闥婆城幻夢鏡像世間顛倒非明智也然非不現魏譯云大慧譬如陽焰火輪乾闥婆城幻夢水中月鏡中像世間非智慧者見有諸像顛倒見故有智慧者不生分別非不見彼迷惑之事此舉喻以明上文聖人亦現而非顛倒之意也焰等七事喻惑亂法世間以顛倒心計有計無而諸聖者知離性非性故非顛倒也然非撥無而云不倒現即不現故云然非不現是以宗鏡録云聖人用彼惑亂之境一同凡現色等諸塵以聖人無念著故而非顛倒然聖人非不見彼惑亂法見時正同水月鏡像故大慧彼惑亂者有種種現非惑亂作無常所以者何謂離性非性故唐譯云妄法現時無量差別然非無常何以故離有無故彼惑亂之人見有種種相現佛謂即彼惑亂是真常體故云非惑亂作無常也所以下徵明即亂為常之意謂彼惑亂離有無性故如首楞所謂五陰六入十二處十八界本如來藏妙真如性性真常中求於去來迷悟生死了不可得故云惑亂即常也大慧云何離性非性惑亂謂一切愚夫種種境界故此翻顯迷常計亂之意也言諸惑亂離性非性本體是常而諸愚夫妄想執著種種境界則迷本體之常而計諸惑亂矣故云愚夫種種境界如彼恆河餓鬼見不見故無惑亂性於餘現故非無性如是惑亂諸聖離顛倒不顛倒唐譯云如恆河水有見不見餓鬼不見不可言有餘所見故不可言無聖於妄法離顛倒見如彼下舉喻明諸惑亂非有非無也喻中按唐譯可解恆河餓鬼見不見句言辭疏澀意義如唐蓋譯主是天竺人不善方言讀者會唐譯可入無惑亂性一句惑亂二字是衍文此句蓋釋成上句見不見意謂恆河餓鬼不見故則恆河無性於餘現故則恆河非無性也已上總約喻說如是下法合謂諸聖於惑亂見常則惑亂非有於餘凡愚種種現故則惑亂非無恆河喻惑亂餓鬼喻諸聖餘所現喻凡愚也然以諸聖了亂即常故倒不倒悉離下文云倒不倒皆妄想故有倒不倒見因起聖種性及愚夫種性是故諸聖離倒不倒想也是故惑亂常謂相相不壞故此結不壞惑相以明即常之意也法華經云是法住法位世間相常住與今文同義大慧非惑亂種種相妄想相壞是故惑亂常此承上文反復以明不壞亂而即常也謂惑亂種種相皆妄想相非壞妄相而後言常蓋即種種本體是常故大慧云何惑亂真實若復因緣諸聖於此惑亂不起顛倒覺非不顛倒覺大慧除諸聖於此惑亂有少分想非聖智事想大慧凡有者愚夫妄說非聖言說唐譯云云何而得惑亂真實謂諸聖者於妄法中不起顛倒非顛倒覺若於妄法有少分想則非聖智有少想者當知則是愚夫戲論非聖言說按唐譯可解今文不起顛倒非不顛倒覺句中多一非字令人難解蓋謂聖人不起顛倒不顛倒覺倒不倒皆妄想故彼惑亂者倒不倒妄想起二種種性謂聖種性及愚夫種性此總標下別釋別釋復分為二初聖種次愚種今初聖種聖種性者三種分別謂聲聞乘緣覺乘佛乘聖性復分三種初釋聲聞云何愚夫妄想起聲聞乘種性謂自共相計著起聲聞乘種性是名妄想起聲聞乘種性謂諸小智愚於法故不了法空計著自共相以為實有厭有著空是愚夫妄想所行以不了惑亂真實妄於自共相上計有計無起空相應覺是為聲聞乘性也次釋緣覺大慧即彼惑亂妄想起緣覺乘種性謂即彼惑亂自共相不親計著起緣覺乘種性不親計著魏譯作不樂憒闡唐譯作離於憒闡即彼惑亂等者謂即彼聲聞所計自共相中深觀緣起樂獨善寂遠離憒閙超聲聞之上是為中乘也三釋佛乘云何智者即彼惑亂起佛乘種性謂覺自心現量外性非性不妄想相起佛乘種性是名即彼惑亂起佛乘種性上二乘皆云妄想今於佛乘唯稱智者故謂二乘是愚夫所行以其有倒不倒妄想覺故今則離彼倒不倒想頓了唯心故稱智者不妄想也又三乘皆云即彼惑亂者謂三乘同依有為而修而證故也然所依是一而修者有利有鈍其復證者有偏有圓聲聞一向是鈍而其證者固偏緣覺望聲聞為利望佛則鈍而其證者雖偏猶勝聲聞故處乎中佛乘一向是利而其證者唯圓故文云覺自心現量及外性非性則純覺無妄故曰不妄想也次釋愚夫種性又種種事性凡夫惑想起愚夫種性唐譯云有諸愚夫分別妄法種種事物決定如是決定不異此則成就生死乘性上聖種三乘即彼惑亂起不顛倒想而分三性此愚夫亦即彼惑亂而起顛倒故種種事物性相計著惑想紛然起愚夫種性彼非有事非無事是名種性義此明凡聖種性之義也謂諸聖者了亂即常故非有事愚夫迷常計亂故非無事以迷悟分岐為二種種性也大慧即彼惑亂不妄想諸聖心意意識過習氣自性法轉變性是名為如此釋聖性轉惑為如之義也謂即彼惑亂不妄想之聖者心意意識過惡習氣轉變即轉變性是名真如然而心識如氷真如若水由智日融之而為水矣昔之堅礙今復流通則水之與氷非二法也轉惑為如亦復如是大矣哉轉變之妙若此是故說如離心我說此句顯示離想即說離一切想唐譯云是故真如離於心識我今明了顯示此句離分別者悉離一切諸分別故此結釋上文以明轉如離妄之妙也謂如本離心離心意故一切妄想皆離非妙而何大慧白佛言世尊惑亂為有為無大慧前聞不壞惑亂種種相而言常則是有復聞轉惑為如惑體可轉則是無惑性有無未可了故因發此問佛告大慧如幻無計著相若惑亂有計著相者計著性不可滅緣起應如外道說因緣生法唐譯云如幻無執著相故若執著相體是有者應不可轉則諸緣起應如外道說作者生如幻下約喻說謂如幻法雖現諸相其體是假故無計著相也若惑下法合謂惑亂如幻亦是假法若有所計著相者則有實體不可轉滅今能滅者以其無體故也緣起魏譯作十二因緣蓋惑亂從因緣起若惑亂有實體者則如外道說作者因緣生諸法矣大慧白佛言世尊若惑亂如幻者復當與餘惑作因魏譯云大慧言世尊若迷惑法如幻見者此迷惑法異於迷惑以迷惑法能生法故大慧問意謂惑亂若如幻者幻術與諸幻事作因喻如惑亂與惑事作因矣蓋幻無自性不能與諸幻作因由幻師作故惑亂非性亦不能與餘惑作因由愚夫妄想生故下文答者是也佛告大慧非幻惑因不起過故大慧幻不起過無有妄想唐譯云非諸幻事為幻惑因以幻不生諸過惡故以諸幻事無分別故佛謂幻術非與幻事為因也當知幻本無情不起分別過故大慧下成上不起過意謂彼幻術無妄想故不起過也大慧幻者從他明處生非自妄想過習氣處生是故不起過此牒明幻所生處以成不起過意結非幻惑之因也謂幻事從幻師明處生非幻術自性習氣處生也此譬惑亂之法亦從愚夫妄計處生以惑亂法無自性故故不從自性處生也大慧此是愚夫心惑計著非聖賢也此合明惑亂無性結顯愚夫計著處生非聖賢有也爾時世尊欲重宣此義而說偈言聖不見惑亂中間亦無實中間若真實惑亂即真實捨離一切惑若有相生者是亦為惑亂不淨猶如翳諸聖了亂即常故不見惑亂然惑亂中間本無實體能知中間無實則一切惑亂皆真實矣證真實性則離諸惑若未忘離相是亦為惑亂不淨猶如翳矣所謂一翳在眼空華亂起故
