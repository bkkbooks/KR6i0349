front:
  text: 楞伽經參訂疏序楞伽參訂疏者西吳沙門釋廣莫氏之編也標玄訂謬將以翼經而正心學其亦佩心印者之流歟夫心學之難明也久矣吾儒上自唐虞之君即曰人心惟危道心惟微惟精惟一允執厥中此虞聖之傳大禹以為治平之常法也先儒解曰夫發於形氣者人心也發於義理者道心也人心易私而難公故危道心難明而易昧故微惟能精以察之而不雜形氣之私一以守之而純乎義理之正天下後世治平之道必本乎此耳今夫竺乾氏之論心也則曰真心妄心其所謂寂照冥通空有不二卓然而獨存者真心也乃若根塵虗構情想幻出者妄心也必使空諸妄而融諸真然後為得其正則與吾儒所傳人心道心名雖異而體實同也大率此心之邪正偏圓而楞伽詳示之矣然不獨指其形氣之私而又兼規乎識見之謬則與吾儒格致之學意頗相符信乎其為責善之功有補世教故我太祖高皇帝以天地高博之仁敕天下寺觀僧尼道俗皆令傳習而講解此經意使人人得正其心輔揚聖化大矣哉聖皇之心淵乎遠矣第此經辭氣艱澀義埋幽玄非解卒莫能入而解之者亦未能盡達其源吾閩三山居士林君尚瓊遠示此疏并乞余序余乃乘侍萬機之暇退而閉閣閲之數過掩卷思所以治之之道與余所以用之之心殊似㳷乎無外之體備見於此疏也尋流討源刪華托實而條貫參析超勝前解余因詳序編首而使傳之更以此經併吾儒先聖所遺之典置之座右庶可俾余日用之操奚翅半部論語皇明萬曆癸丑夏四月浴佛日文淵閣大學士太子太保禮部尚書閩中葉向高撰楞伽阿跋多羅寶經參訂疏敘楞伽一經我佛直語此心之妙而決擇名數使不混淆於魔外也夫此心也者真醇融粹虗徹靈明超羣數而非無涉衆名而非有生佛一體物我同根豈四句之可擬羣情之能測哉由諸衆生迷乎自心執夫外性遂起勝妙微塵有無一異神我等見實皆妄計也世尊逐一斥破顯出自覺聖智謂本然具足不從他得此與達磨直指人心見性成佛同義因囑二祖云楞伽四卷可以印心意在此歟或謂達磨別傳心印不立文字故稱直指以教擬禪殆非義矣不知此經亦遣言説之指明實義之月非不立直指而何即如禪者言即言非門庭施設曲拈情解業已枉矣直指之稱安在哉蓋直指以明實拈情以達權曾不相違耳此經化儀亦復如是則禪教固異名而同體也先儒蔣之奇宋濂輩以達磨之禪為禪定為六度之一此則非唯不會達磨之禪亦復不知此經之義矣此經品名佛語心心即達磨直指之心也達磨直指之心即世尊拈華示迦葉所云涅槃妙心也尋源會宗有自來矣第此經文義奇奧讀解良難望崖而退者有之所幸古遺注釋學者因之得入然猶不能深詣而遠尋宗旨緣舊注未詳故也如經云五法三自性八識二無我即八識一種與雜華密嚴等經唯識瑜伽等論相為符證舊注往往略之不亦惜乎廣莫思欲闡明大道不揣已愚乃尋經論及諸古注并魏唐二譯參訂成疏於經之隱而難解者會彼二譯附於其下俾可意會得之注已明者托之其晦者明之題名曰參訂疏蓋不貴竄句遊心以亂人之聰明務令本文無滯則已矣疏成壽梓以布諸方志在就正同業知我罪我所不計也皇明萬曆三十年八月十五日吳興後學沙門廣莫書于西湖秦亭山院楞伽經參訂疏序夫正心之學有常而邪見之情不一何則蓋心非有也而妙性昭昭不可以謂無心非無也而幽靈默默不可以謂有有亦非有無亦非無雙亦雙非極盡有無之量而吾心之體未始疏其涓滴也是故古之人四句橫流百非妄作曷嘗益於是心哉初祖有言欲明是心當以楞伽印之印之為義間邪之謂也群邪既破印何所施榛莽已闢大道坦夷則無適而非真際也然則何心非法何法非心心法兩空空空亦空始可與言楞伽矣楞伽歷劉宋元魏李唐三譯而四卷者蓋宋本也以初祖付授之言其傳獨顯然是經也辭澀而義詳情真而理到解而入者難乎其人惜古師創有解者不存其名泯然而不覩其全書次得受公集注一往參詣厥旨甚微第疲于引據而忽于源流又次得泐公解大略與受公同今時清公出觀楞伽經記雖思慮通長然於才性偏忽而旁采臆説廁乎聖經此豈巧於用短而拙於用長也歟及余歸自朝解解脫世網晚年同仁安莫公憩于西湖之濵問嘗商確此經聞其超超玄論令人洞心駭耳標精義申微旨婉而有歸要皆諸名賢尋味所不到者悉發揚之事核而理暢詞平而氣和燦然出數萬言以示余余乃更為讐訂而壽諸梓其庶乎正心學于將來空情塵于本際劫可盡也而功不可盡也余知莫公舌根不壞以此時萬曆三十四年丙午夏四月佛誕日賜進士出身承直郎奉勑贊畫薊遼保定山東等處軍務從征外國加四品服兵部職方司主事武塘袁黃撰楞伽參訂疏敘如來出世達磨西來拈華示衆面壁傳燈皆直指心印為佛宗祖夫佛即心心即佛也佛與心有二乎哉非聖智自覺不足以言佛非靈鑒虗涵不足以語心心得佛以顯示第一義佛因心以化度人天故佛佛出世唯語此心心之外無法可説識此義者可與談楞伽矣昔聞西域䮚伽城山臨大海傍絶門戶非神通力不可升𨓏故名阿跋多羅言無上也佛以自覺聖智境界其究竟直離心意識妄想非邪智可到而此經直指妙心亦絶蹊徑蓋心一而已出此心為外道為惡見為世間法大約有五法三自性八識二無我種種異論是為謗因果見拔善根本壞清淨因凡若此者當墮地獄何望聖真故大慧菩薩通達大乘能以百八句大義仰咨世尊世尊隨問隨答要以破一切異見如世界不實破以幻夢犍闥婆城熱𦦨水月光如有無識三緣不能生法破以龜生毛沙出油如言説諸妄想相破以四種言説如妄立是非破以是句非句如無始妄想二緣六因破以泥瓶縷氎草席種芽酪酥及燈照色等如七種性自性破以七種境界第一義心如藏識轉識不異破以泥團微塵猛風海水波浪其反覆啓露逐一斥破衆義既破自覺全顯自覺即佛佛即一心心體本空本然寂靜惟遠離諸相是名不取是名牟尼則三世性空復其本然之靜矣佛豈從他得哉此經大部舊有十萬偈百萬句三千六萬言總一百五十一品今經止佛語心一品是百五十一之初品也言簡而理到與達磨直指人心見性成佛同義故達磨曾語二祖曰楞伽四卷可以印心意有在矣世傳達磨不立文字故稱直指不知楞伽已了佛心達磨之不立文字抑亦述而不作歟余本凡愚乍脫世網幸遇仁安法師飛錫秦亭吟咏自適忽以參訂一疏示余朝夕玩誦之見其旁引曲證合異歸同真能默會世尊之密語洞徹此經之妙諦矣六節時周五明中啓靜夜伏思竊為佛語四卷可以四字括之四字者何悟修隨證是也蓋道非悟則不入非修則不行非隨則無漸非證則不了何以故三有衆生以無明故依內心外境造種種業受種種苦如夢未覺如醉未醒若能言下大悟認取二障了境如幻自心所現則滅妄想三有苦及無知愛業緣能以聖慧眼入分別諦理能所既寂境觀雙融體用互收寂照冥攝不與外道斷見性相共而宗旨不墮矣既悟何可不修修行者入禪三昧須離群須遠俗須少睡眠以專精靜業尤當離惡見經論言説及諸聲聞緣覺二乘務在策進勝行然修有四禪有愚夫禪有觀察義禪有攀緣如禪有如來清淨禪四禪中擇取聖智三相所謂無所有相一切諸佛自願處相自覺聖智究竟之相惟此當勤修學修行得此方能捨跛驢心超外道見矣然無上正覺豈一蹴能至哉則當繼之以隨隨者佛地不同至無所有境方為佛地七地已前未離有作登第八地始號不動於是漸升諸地住三昧境了達三昧皆惟自心得如幻定即經所云隨入無相處隨入從地至地三昧境界隨入如來身隨入如如化皆有增進次第相續入于第一真實之義疾得阿耨多羅三藐三菩提則具足其自覺聖智而證無生法證出世間上上法始是如來大涅槃以其隨機赴感名為化佛以酬其報因名為報佛以本覺顯照名為智慧佛以理體無二名曰如如佛當是時自然殊勝莊嚴至法雲地住大蓮華微妙宮殿即有同類眷屬圍繞就座灌頂顯示神力面見諸佛如來又乘二種無量神力分別諸法利益衆生吾事畢矣然而總之只了吾靈鑒虗涵之妙心而已寧有他法哉故謂此經為佛語心可為佛語佛可為無佛無心亦可夫心豈可語哉佛而語心皆化佛非法佛也讀是經者當自得之萬曆三十七年歲次己酉秋九月括蒼李大生和南撰疏經凡例按古凡釋經大科分三一序分二正宗三流通此約全部而言也今經大部未至來秪一品其中雖有序分然無流通由是不拘此三但直疏而已又古釋經科分雜糅義例蔓延意使學者尋源會宗知有由緒而不知末世學人愚者衆而智者寡尋枝摘葉其心易疲屢見有置之高閣而經年不閲者蓋苦此耳然而今經廣破異見唯顯一心隨問即答無定由緒其中大段關節易明餘諸瑣末詳略皆可去取由人何勞於是大都儒者之言多不置此今乃指示坦途直造一心別無牽制此經三譯今疏者宋譯也三譯中有語異而義同者則會彼二譯附本文下使知同故凡參訂諸注有事理謬誤者不敢極詆而略明之無傷大體則隱之唯期開人頂眼識正趣故注中凡引舊注及諸經論成言則先標其名無某云者是參訂家語經中逢梵語處遂翻華言附于其下使不滯於文通義趣故經中所出外道別有論義若廣引其詳則令學者泣岐是故今疏不貴語備務在義周使經義釋然而已疏式經則大字一行直下注則小字兩行並區餘諸義例意會通之所引經論目録魏譯楞伽經唐譯楞伽經華嚴經密嚴經解深密經首楞嚴經勝鬘瓔珞經長阿含經法華經涅槃經本行經地藏經梵網經密迹力士經維摩詰經仁王般若經大品般若經普曜經正法念經瑞應經金剛般若經觀佛三昧海經思益經雜阿含經譬喻經興起行經般泥洹經第一義法勝經楞伽集注楞伽新説楞伽古注楊彥國楞伽纂注泐公楞伽解俱舍論起信論中論瑜伽師地論佛地論成唯識論攝大乘論因明入正理論攝大乘論莊嚴論僧佉論華嚴論大智度論肇論立世阿毗曇論雜阿毗曇論華嚴經疏鈔天台四教儀法華玄義四教儀集注八識頌注宗鏡録西域記後漢郊祀記開皇三寶録周書異記止觀輔行傳弘決百法論注金剛經疏八識頌唯識三十頌大乘律善見律法界次第初門十誦律翻譯名義集大明法數四分戒本譯經圖紀黃帝算經詩經中庸尚書釋氏要覽太極圖説提婆論所引經論目録終
