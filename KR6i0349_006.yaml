body:
  text: 劉宋天竺沙門求那跋陀羅譯皇明吳興後學沙門廣莫參訂夏官大夫擕李袁黃閲正一切佛語心品第一之三爾時大慧菩薩復白佛言世尊惟願為説一切法相續義解脫義若善分別一切法相續不相續相我及諸菩薩善解一切相續巧方便不墮如所説義計著相續問中二義相續可知解脫義者即後文所謂一切法無相續不相續相得寂靜故即彼寂靜名解脫義也不墮下謂善解相續方便故不墮隨言執義病中勿令自心計著相續善於一切諸法相續不相續相及離言説文字妄想覺遊行一切諸佛剎土無量大衆力自在通總持之印種種變化光明照耀覺慧善入十無盡句無方便行猶如日月摩尼四大集注云日月之照臨摩尼之隨色地水火風之周遍皆無作也菩薩無方便行如之於一切地離自妄想相見見一切法如幻夢等入佛地身於一切衆生界隨其所應而為説法而引導之悉令安住一切諸法如幻夢等離有無品及生滅妄想異言説義其身轉勝此上大慧自述所問之益也異言説義者謂異見言説及義也善二義菩薩現形度生令彼離諸異見其身得勝轉依故佛告大慧善哉善哉諦聽諦聽善思念之當為汝説大慧白佛言唯然受教佛告大慧無量一切諸法如所説義計著相續所謂相計著相續緣計著相續性非性計著相續生不生妄想計著相續滅不滅妄想計著相續乘非乘妄想計著相續有為無為妄想計著相續地地自相妄想計著相續自妄想無間妄想計著相續有無品外道依妄想計著相續三乘一乘無間妄想計著相續此酬大慧隨言取義相續之著有無量相約而言之有十一種也所謂下列十一種計著相續之名初云相者即陰界入相也緣者十二因緣也性非性生不生等可知乘非乘者乘是三一之迹非乘是三一之本凡計三一本迹而不忘者亦為計著妄想也地地自相妄想者從初地至等覺地地有自境界相相則不無若計而不捨亦為計著妄想矣自妄想無間妄想者謂由自心依無間法生諸妄想故三乘一乘教道雖別同證真諦故云無間然而計此三一無間亦是妄想計著相續復次大慧此及餘凡愚衆生自妄想相續以此相續故凡愚妄想如蠶作繭以妄想絲自纏纏他有無相續相計著此及餘者此指上十一計著也謂此十一計著及餘凡愚所計著者有無量相不能盡述故云及餘也以此下結顯計著相續之過如蠶作繭妄想如絲言其稠密交互以自纏也復以此法妄教於人為纏他也然諸計著不出有無二品故結云有無相續計著上明相續義竟下明解脫義復次大慧彼中亦無相續及不相續相見一切法寂靜妄想不生故菩薩摩訶薩見一切法寂靜彼中即指上文十一相續中也言此相續忘處即是解脫何者以能見法寂靜故了知諸法無相續不相續相名解脫義也復次大慧覺外性非性自心現相無所有隨順觀察自心現量有無一切性無相見相續寂靜故於一切法無相續不相續相謂覺外境非性內心無相隨順觀察自心現量有無體性皆無相見故得相續寂靜以寂靜故於一切法無相續不相續相名解脫義也復次大慧彼中無有若縛若解餘墮不如實覺知有縛有解彼中指寂靜中也以寂靜義中無縛無解餘諸外道不如實知彼寂靜故有相續之縛不相續之解所以者何謂於一切法有無有無衆生可得故唐譯云一切諸法若有若無求其體性不可得故今文衆生字即體性義按唐譯可解復次大慧愚夫有三相續謂貪恚癡及愛未來有喜愛俱泐師解云貪恚癡者相續之因也五趣者相續之果也由過去因成現在果現在作因復招未來之報言三續者三世循環相續靡間貪愛喜三如次配以此相續故有趣相續彼相續者續五趣魏譯云以此相續故有後生大慧衆生相續生於五道泐師解云以此三毒相續故有諸趣輪轉言趣者即六道也以修羅遍於五道故但云五趣大慧相續斷者無有相續不相續相謂貪等三續斷者則無相續不相續相然則相續解脫二義皆空矣復次大慧三和合緣作方便計著識相續無間生謂以根塵識三因緣和合方便作計著者則諸識相續生起長劫無間方便計著則有相續三和合緣識斷見三解脫一切相續不生有方便計著則有相續三緣識斷見三解脫見解脫已一切相續不生此結顯相續解脫二義之因也爾時世尊欲重宣此義而説偈言不真實妄想是説相續相若知彼真實相續網則斷以不實妄想計著則有相續若知彼實性者則相續網斷以相續喻如網者謂相續無量彼此交互如網羅罩難脫離故此頌相續解脫二義也於諸性無知隨言説攝受譬如彼蠶蟲結網而自纏愚夫妄想縛相續不觀察謂於諸性無知覺故隨所説義相續計著如蠶作繭自纏其中凡愚衆生為妄想所縛亦復如是故於相續無慧觀察大慧復白佛言如世尊所説以彼彼妄想妄想彼彼性非有彼自性但妄想自性耳魏譯意同此大慧引佛昔言為問也彼彼性指諸法而言以彼彼之妄想妄想彼彼諸法然彼諸法非有自性但一妄想自性耳大慧白佛言世尊若但妄想自性非性自性相待者非為世尊如是説煩惱清淨無性過耶一切法妄想自性非性故魏譯云世尊若唯自心分別非彼法相者如世尊説一切諸法應無染淨何以故如來説言一切諸法妄分別見無實體故上文大慧先引佛言為據此正牒難謂若但妄想自性非有一切性自性相待者豈非世尊當作是言濁穢清淨墮無性之過耶何者以一切法非性但妄想自性故佛告大慧如是如是如汝所説大慧非如愚夫性自性妄想真實大慧以無性為難而不知所難之意合正義也故世尊順其所難即證言如是如汝所説要知染淨無性二法叵得非如愚夫以性自性計為真實此妄想自性非有性自性相唐譯云此但妄執無有性相此牒前妄想自性非有外性自性相然大慧如聖智有性自性聖知聖見聖慧眼如是性自性知唐譯云然諸聖者云云前明諸法無性但一妄想今顯聖智有自體性也聖知見者即佛之知見無知之知無見之見為真知見耳聖慧眼者謂徹諸法之真達羣情之妄華嚴疏第一云分別名慧照矚稱眼又云五眼之中慧眼觀理理無異味慧眼觀事事無不見名聖慧眼也然而聖性非空妄想無實不可以前妄想為例文初然字舊注分屬上句今按唐譯義當連此蓋為轉文之辭也大慧白佛言若使如聖以聖知聖見聖慧眼非天眼非肉眼性自性如是知非如愚夫妄想此大慧述上文意以生後難也謂若使如聖人以聖知聖見性自性如是而知是實非虗非如凡夫天眼肉眼妄想可比世尊云何愚夫離是妄想不覺聖性事故唐譯云云何凡愚得離分別不能覺了諸聖法故大慧問意謂諸愚夫云何能離如是妄想而彼不離妄想者以不覺聖性事故世尊彼亦非顛倒非不顛倒所以者何謂不覺聖事性自性故不見離有無相故魏譯云世尊彼癡凡夫非顛倒見非不顛倒見何以故以不能見聖人境界如實法體故以見轉變有無相故按魏譯意大慧謂彼愚夫以不覺聖性自性故非不顛倒也又以見轉變有無相故非顛倒也今文末句不見不字魏譯作以字離字魏譯作轉變字離即轉變義今文不字當從魏譯作以觀大慧意謂彼愚夫亦有一種非顛倒見可取而聖或亦有一種如妄想見不可取故有下文之難蓋疑聖人有自語相違之過也已上二節以難凡聖有覺不覺之異因惜凡夫具倒不倒之疵世尊聖亦不如是見如事妄想不以自相境界為境界故唐譯云聖亦不如凡所分別如是得故非自所行境界相故此難意謂聖亦不應如是見聖性等事如愚夫事妄想計著何以故如來不應以自相境界為境界故是故聖人亦有一種如妄想見不可取世尊彼亦性自性相妄想自性如是現不説因無因故謂墮性相見故魏譯云彼諸聖人見有法體分別法相以世尊不説有因不説無因何以故以墮有法相故此大慧出佛正見以生後難也謂彼聖人亦見諸法性自性相如妄想性現但不説有因無因何以故若説因無因則墮性相見矣蓋謂聖人雖見諸法同凡夫現能了如幻故不説有無不墮性相見也如第二經云以彼惑亂諸聖亦現而非顛倒同今文意異境界非如彼等如是無窮過世尊不覺性自性相故魏譯云餘人見境不如是見世尊如是説者有無窮過何以故以不覺知所有法相無自體相故異境界非如彼等者按魏譯異指餘人而言餘人即衆生也彼等指上諸聖也謂餘衆生所見境界非如彼等諸聖所見如是則成無窮之過矣世尊下出非如彼等之意謂餘衆生不覺性自性相無實體故聖性有凡境無非過而何世尊亦非妄想自性因性自性相彼云何妄想非妄想如實知妄想唐譯云世尊諸法性相不因分別云何而言以分別故而有諸法大慧意謂性自性相非因妄想自性而有彼諸聖人云何以聖性妄想謂非妄想而言如實知性自性相但一妄想耶此難前文但妄想自性句之非也按唐譯可解世尊妄想異自性相異世尊不相似因妄想自性相彼云何各各不妄想而愚夫不如實知妄想異者謂能緣之心有種種差別自性相異者謂所緣之境亦有種種差別然則能緣所緣因不相似彼諸聖人云何於妄想自性相上各各不妄想而愚夫云何不如實知彼不妄想相耶然為衆生離妄想故説如妄想相不如實有此大慧以意妄度出佛方便所以謂今衆生離妄想故説諸聖性為有以有故故云如妄想相也然以方便云有有必非有故云不如實有世尊何故遮衆生有無有見事自性計著聖智所行境界計著墮有見説空法非性而説聖智自性事唐譯云世尊何故令諸衆生離有無見所執著法而復執著聖智境界墮於有見何以故不説寂靜空無之法而説聖智自性事故此難如來自語相違也謂世尊何故遮諸衆生有無有見而世尊自復計著聖知見等墮於有見説衆生法空而非性説自境界有聖智事豈非自語相違耶已上從若使如聖至此文有十節詳觀十節之意第一節大慧牒聖性之事後陳九意宛轉成難總以説空墮有結之是知説空墮有為立難之本故下文世尊答語獨標結難之言以辨聖性為實也奚必分列難名駢枝語意愚故但於語勢斷處略疏其情使來學臨文明識辭義足矣故於舊解不復參入佛告大慧非我説空法非性亦不墮有見説聖智自性事然為令衆生離恐怖句故此辨大慧所難之非以明説聖事之由也謂佛所説聖智事者因説諸法非性衆生聞此生於斷滅恐怖故説離妄想有聖智事為令離此怖故然前難語新説以五難截之詳其五難有是者非者故不取焉今從大慧語意釋之如上竊觀世尊答語但依説空墮有為辨蓋此語係是難本故舉其要而總答之以得如實空故聖性斯顯答中大意如斯而已衆生無始以來計著性自性相聖智自性計著相見説空法佛為衆生從無始來計著性自性相及聖智事等皆計有相見故因説空也對有説空空非實法大慧我不説性自性相魏譯云大慧我不説言法體有無上文因衆生著有故説空今文復申云我於性自性相不説有無則有無雙遣今文闕有無字按魏譯可解大慧但我住自得如實空法如實空者是真常中道之法非前對有所説之空有無不著非即都忘故云如實空也離惑亂即見離自心現性非性見得三解脫如實印所印於性自性得緣自覺觀察住離有無事見相此明如實空之德相也如實空中本離惑亂及自心所現有無性相之見故得空無相願三解脫門所證法行皆由如實空印之所印定言法法離於相見而𭰞乎中道也依自覺聖智觀性自性相則一切性相不離本位即常住故是故如實空法離於有無事相之見復次大慧一切法不生者菩薩不應立是宗謂不生宗是外道所計凡依佛修行者不應立是宗此是有法不生宗所以者何謂宗一切性非性故及彼因生相故説一切法不生宗彼宗則壞此微明不生宗者有過也謂彼外道以無性為宗言一切性有即非有故云不生然彼不生因生所待而有其相説一下承上徵語明不生宗者有壞也彼宗一切法不生彼宗壞者以宗有待而生故此明不生宗壞之所由也謂其以生為待而立不生因有所待不生無能自立故壞也中論云若法為待成是法還成待信矣又彼宗不生入一切法故古注云又彼不生宗即入一切法數中一切法者生不生一異常無常等法也言若立不生宗即入此一切法數故不得立不生宗也不壞相不生故立一切法不生宗者彼説則壞楊彥國纂云不壞真相本自不生今乃建立是宗而入一切法則彼建立何為不壞大慧有無不生宗彼宗入一切性有無相不可得前單約有法立不生宗此又兼取有無立不生宗故云有無不生也集注云就有無上立不生宗則入一切有無之性有無性相既不可得却於何處立有無不生宗也大慧若使彼宗不生一切性不生而立宗如是彼宗壞以有無性相不生故不應立宗謂若使彼依有無性不生而立宗者一切性既不生更於何法論不生耶是知彼宗當壞矣何以故以有無性相不生故不應立宗五分論多過故展轉因異相故及為作故不應立宗分此明前文二宗多過也五分論見前注其以五分簡過過有三十三種詳如因明入正理論説集注云言五分論多過展轉因於相違不成不定不遺等異相及有為有作法故不應立其宗分謂一切法不生如是一切法空如是一切法無自性不應立宗不生一句牒前二宗名如是下收攝餘所立法空法無自性等凡我正修行人不應於是立宗大慧然菩薩摩訶薩説一切法如幻夢現不現相故及見覺過故上誡行者不應立諸邪宗此以正義教令如法説也謂應説法如幻如夢現不現無二相故見覺過者指上一切邪宗悉由妄見知覺過患所起菩薩能示其過名善説法者當説一切法如幻夢性承上見覺有過因勸菩薩説法如幻夢也除為愚夫離恐怖句故愚夫或墮有無恐怖之間則以方便説有説無令彼離於恐怖方便説者不入此例故云除為大慧愚夫墮有無見莫令彼恐怖遠離摩訶衍此誡菩薩説法應觀人根善巧為説無自固執令彼驚怖遠離大乘義也爾時世尊欲重宣此義而説偈言無自性無説無事無相續彼愚夫妄想如死尸惡覺集注云言一切法初無自性離言説相亦無事法而為相續愚夫妄起惡覺其計執如同死尸故唐譯云惡覺如死尸一切法不生非彼外道宗至竟無所生性緣所成就集注云佛説一切法本自不生非彼外道妄計為宗諸法至竟無所生以一切性從緣所成就故一切法不生慧者不作想彼宗因生故覺者悉除滅古注云慧者知諸法體不生故不作不生想彼不生宗因生相而立故覺者悉除滅之譬如翳目視妄見垂髮相計著性亦然愚夫邪妄想喻立不生宗者是妄想計著如翳目之見垂髮施設於三有無有事自性施設事自性思惟起妄想相事設言教意亂極震掉佛子能超出遠離諸妄想謂世間三有之法唯假施設一切因果事業皆無自性由諸衆生妄自思惟起諸惑想諸外道輩計著自共相事施設言教意極惑亂震動掉舉佛子能超如是言教遠離諸想是名正修行者非水水想受斯從渴愛生愚夫如是惑聖見則不然謂三有事業本無自性諸凡愚人以癡愛故於無性處妄起性自性想如鹿渴愛見彼陽焰本非是水而作水想世間愚夫妄有如是惑亂佛之知見則不然也聖人見清淨三脫三昧生遠離於生滅遊行無所有修行無所有亦無性非性性非性平等從是生聖果遊行無所有魏譯作得無障寂靜承上聖見不然之意以明聖行也謂聖人知見清淨故三脫正定因之而生諸生滅行亦因之而離也於無所有境念念相應既無性非性相則寂然平等從是平等生諸聖果云何性非性云何為平等謂彼心不知內外極漂動若能壞彼者心則平等見此徵心見得失以明迷悟之原也謂何者性非性以其心無所知內外漂動故有性非性相若能壞彼無知則內外寂然以寂然故心則平等得正見矣爾時大慧菩薩復白佛言世尊如世尊説如攀緣事智慧不得如世下魏譯云如世尊説智慧觀察不能見前境界諸法如攀緣事者如真如也謂依如緣事則屬智慧不得前境蓋慧眼能觀一切法空故不得也是施設量建立施設所攝受非性攝受亦非性以無攝故智則不生唯施設名耳謂能攝所攝唯假建立能所攝受既無智則不生故云唯施設名云何世尊為不覺性自相共相異不異故智不得耶為自相共相種種性自性相隱蔽故智不得耶為山巖石壁地水火風障故智不得耶為極遠極近故智不得耶為老小盲冥諸根不具故智不得耶此總立五意以起疑情下別躡前意以成質難世尊若不覺自共相異不異智不得者不應説智應説無智以有事不得故此躡第一意辨智無智也難意謂若言自相共相異者自相非因共相何有故非異也若言不異自共無別而實別故非不異也於此不覺不得名智應説無智何以智稱而云不得耶若復種種自共相性自性相隱蔽故智不得者彼亦無智非是智世尊有爾𦦨故智生非無性會爾𦦨故名為智此躡第二意辨智無智也種種自共相者謂萬物各有自共相各有性自性隱蔽障也如日月光明雲煙為障太虗寥廓峯巒為礙智得於此不得於彼亦應非智矣世尊下大慧釋智名義爾焰謂所知也所知是境能知是智所知現前能知乃生非能知無體可會所知智與境合乃名為智此大慧謬釋智體以明不得之過若山巖石壁地水火風極遠極近老小盲冥諸根不具智不得者此亦非智應是無智以有事不可得故此躡第三四五意同辨智非智也謂或以山巖石壁之所障礙地水火風之所間隔則極遠之物不可得矣或老小盲冥諸根不具則極近之物亦不可得矣此曷稱智應是無智以有如上諸事而智不可得故佛告大慧不如是無智應是智非非智我不如是隱覆説攀緣事智慧不得是施設量建立佛謂不應如是作無智論也所言不得者應是智非非智何者不以如是隱覆説攀緣事故而言智慧不得者謂了前境非實是施設量假建立故覺自心現量有無有外性非性知而事不得不得故智於爾𦦨不生順三解脫智亦不得以知前境假立覺彼是內心所現知外物有即無有性即非性於事不得以不得故智於所知不生返順三脫然即返順智境亦不可得非妄想者無始性非性虗偽習智作如是知是知彼不知承上聖智非妄想愚夫可知也蓋彼妄想愚夫依於無始有性無性虗偽習氣之智於如是佛之知見不能了知故云此知彼不知言其智所不徹故於外事處所相性無性妄想不斷自心現量建立説我我所相攝受計著謂諸凡愚智不徹故於外所緣事處一切相中體性有無妄想不斷以自心現量建立説有我我所之相堅固攝受生諸計著不覺自心現量於智爾𦦨而起妄想妄想故外性非性觀察不得依於斷見由不覺自心現量則於能知所知起諸妄想以妄想故觀察外性有無不可得由不可得故依於斷見所言智不得處差別如此正修行者於此當善分別稍差則千里逈隔可不慎諸爾時世尊欲重宣此義而説偈言有諸攀緣事智慧不觀察此無智非智是妄想者説前二句述大慧所疑諸攀緣事智不得者後二句承上意云由攀緣而稱智不得者此無智之言蓋非智也是妄想者之所説耳於不異相性智慧不觀察障礙及遠近是名為邪智老小諸根冥而智慧不生而實有爾𦦨是亦説邪智初二句頌佛正智謂相性非實故智不觀察次二句述諸隱覆是妄想所計故斥名邪智後四句可知復次大慧愚癡凡夫無始虗偽惡邪妄想之所回轉回轉時自宗通及説通不善了知此承前文智不得處來也謂諸凡愚為惡邪妄想所轉則於宗説二通不善了知著自心現外性相故著方便説於自宗四句清淨通相不善分別集注云謂其執文遺旨未能得意忘言以計著性相執方便言説於離四句自宗通法不善分別大慧白佛言誠如尊教惟願世尊為我分別説通及宗通我及餘菩薩摩訶薩善於二通來世凡夫聲聞緣覺不得其短集注云宗説既通解行相應無復過失故凡夫二乘求其短隙不可得也佛告大慧善哉善哉諦聽諦聽善思念之當為汝説大慧白佛言唯然受教佛告大慧三世如來有二種法通謂説通及自宗通説通者謂隨衆生心之所應為説種種衆具契經是名説通衆具者指十二部經也是經有論議重頌因緣譬喻本生本事衆名不同故云衆具自宗通者謂修行者離自心現種種妄想謂不墮一異俱不俱品超度一切心意意識自覺聖境界離因成見相宗者主也趣也謂行有所主得正趣故自宗屬行説通屬解行緣自覺不向外求故言自宗也離因成見相者謂得自覺遠離因緣所成見相故一切外道聲聞緣覺墮二邊者所不能知謂宗通者是大乘義諸凡小輩墮有無二邊不能知此我説是名自宗通法結宗通相大慧是名自宗通及説通相汝及餘菩薩摩訶薩應當修學大慧下總結二通汝及下勉應修學集注云宗説二通前文已明今再説者蓋有以也前約二乘則先宗後説此約一乘則先説後宗機感有殊非重也爾時世尊欲重宣此義而説偈言我謂二種通宗通及言説説者授童蒙宗為修行者童蒙指諸聲聞未能開佛知見故修行者指諸菩薩能修如實行故爾時大慧菩薩白佛言世尊如世尊一時説言世間諸論種種辨説慎勿習近世間諸論魏唐二譯作盧伽耶陀集注云盧伽耶陀譯云左世亦云惡論即外道論也若習近者攝受貪欲不攝受法若人習近世間諸論則攝受名聞利養一切貪欲如今世間研攻章句燒煮黃白等者皆貪欲事非出世法也世尊何故作如是説佛告大慧世間言論種種句味因緣譬喻採集莊嚴誘引誑惑愚癡凡夫不入真實自通不覺一切法妄想顛倒墮於二邊凡愚癡惑而自破壞諸趣相續不得解脫唐譯云盧伽耶陀所有詞論但飾文句誑惑凡愚隨順世間虗妄言説不如於義不稱於理不能證入真實境界不能覺了一切諸法恆墮二邊自失正道亦令他人輪回諸趣永不出離不能覺知自心現量不離外性自性妄想計著是故世間言論種種辨説不脫生老病死憂悲苦惱誑惑迷亂上明習近世論之害下示世論之不足恃者大慧釋提桓因廣解衆論自造聲論彼世論者有一弟子持龍形像詣釋天宮建立論宗要壞帝釋千輻之輪隨我不如斷一一頭以謝所屈作是要已即以釋法摧伏帝釋釋墮負處即壞其車還來人間梵語釋提桓因譯云能天帝持龍形像者謂以龍形自飾欲嚴其威也斷一一頭者外道師及所從之衆也外道專以斷首為要建立論義如對佛立義不説有言無言等亦以斷首謝屈佛不之許今佛引釋天之論説者益明世論之不足恃也何者釋天位出人寰智過天表論猶可壞況其餘天而及於人乎此舉勝者誡其不逮故曰世間諸論慎勿習近如是大慧世間言論因譬莊嚴乃至畜生亦能以種種句味惑彼諸天及阿修羅著生滅見而況於人謂諸世間種種異類乃至畜生亦能造諸言論以因譬莊嚴種種句味破惑諸天及修羅等著生滅見者而況於人不破壞乎是故大慧世間言論應當遠離以能招致苦生因故慎勿習近結顯世論之咎誡諸行者慎勿習近大慧世論者唯説身覺境界而已此明世論之義以示其淺近也説身者固精氣神坎離交運餐采吐納欲希長生者是其類也説覺者冥初生覺覺生大種以神我為覺者是其類也此二者所謂性命之學近是乎大慧彼世論者乃有百千言世論之多種也但於後時後五百年當破壞結集惡覺因見盛故惡弟子受佛讖正像末法為五五百年今云後五百年正當末法之初其時鬬爭堅固廣興異論彼此破壞然皆惡覺異因之見熾盛世間魔氣所熏及自種惡發為其弟子如是大慧世論破壞結集種種句味因譬莊嚴説外道事著自因緣無有自通世論以因譬莊嚴所説者不離有無一異等句及諸勝性微塵等事著自邪種因緣而於如來自通之義非其分也大慧彼諸外道無自通論於餘世論廣説無量百千事門無有自通亦不自知愚癡世論謂世論中雖廣説無量百千事門曾無如來自通之義且彼外道各各自謂成無上道而不自知其為愚癡之論也爾時大慧白佛言世尊若外道世論種種句味因譬莊嚴無有自通自事計著者世尊亦説世論為種種異方諸來會衆天人阿修羅廣説無量種種句味亦非自通耶亦入一切外道智慧言説數耶大慧牒上文語為難謂若外道百千事門無自通者世尊亦廣説種種句味無量他方來集之衆天人修羅等輩事同外道所説亦非自通耶亦入外道智慧言説之數耶佛告大慧我不説世論亦無來去唯説不來不去大慧來者趣聚會生去者散壞不來不去是正法之本來去是因緣聚散之迹不來不去者是不生不滅我所説義不墮世論妄想數中承上文意以明不墮世論之數也蓋世論是生滅法佛義獨超其上故不墮其數中所以者何謂不計著外性非性自心現處二邊妄想所不能轉二邊者指外性非性及內心現處二邊也佛融中道乃能轉物不為二邊妄想所轉相境非性覺自心現則自心現妄想不生妄想不生者空無相無作入三脫門名為解脫覺有無相境皆自心現故非性也既覺自心現量則自心現妄想不生以內外妄想不生故則人空無相願三解脫門名為如來正解脫者大慧我念一時於一處住有世論婆羅門來詣我所不請空間不請空間者謂欲有所問願佛時答勿作無記止我空間即無記止意也舊注以空間作無我解者非也集注云婆羅門具云婆羅賀磨拏譯云淨裔自稱祖自梵天口生因從梵姓諸經中梵志即同此名唯五天竺有餘國無之又云外意其種別有經書世承為業或在家或出家恃術倨傲亦云淨行便問我言瞿曇一切所作耶我時報言婆羅門一切所作是初世論不稱佛而召瞿曇者是外道倨傲不敬之語佛能容之猶有所答言所作者是計有也世論百千計有最淺故先説耳彼復問言一切非所作耶我復報言一切非所作是第二世論非所作者是計無也無甚於有故次之彼復問言一切常耶一切無常耶一切生耶一切不生耶我時報言是六世論從前次第增上故云六世論也大慧彼復問我言一切一耶一切異耶一切俱耶一切不俱耶一切因種種受生現耶我時報言是十一世論外道所計不出四句如文因種種受生現者外道計一切法從勝性微塵等受生現故十一增上如前大慧彼復問言一切無記耶一切記耶有我耶無我耶有此世耶無此世耶有他世耶無他世耶有解脫耶無解脫耶一切剎那耶一切不剎那耶虗空耶非數滅耶涅槃耶瞿曇作耶非作耶有中陰耶無中陰耶大慧我時報言婆羅門如是説者悉是世論非我所説是汝世論非數滅唐譯作非擇滅初云所作非所作今重云作非作者蓋初約所作邊説今約作者邊説無記者謂一切非性故不可記記者反上我無我世非世剎那不剎那皆然虗空等三者即六無為之三也非擇滅者識論云不由擇力本性清淨或緣闕所顯故名非擇滅中陰者謂此生已盡彼生未成中有陰身名中陰也雜阿毗曇云二有中間起雜趣故上自初世論至此皆外道所計持問佛者佛皆答以世論非我所説我唯説無始虗偽妄想習氣種種諸惡三有之因不能覺知自心現量而生妄想攀緣外性如外道法我諸根義三合知生我不如是如外下魏譯云大慧外道説言我根意義三種和合能生於智婆羅門我不如是唐譯云如外道説我及根境三和合生我不如是我諸根我字即外道所計神我按二譯可解婆羅門我不説因不説無因唯説妄想攝所攝性施設緣起非汝及餘墮受我相續者所能覺知非汝下唐譯云非汝及餘取著我者之所能測今文受我相續即著神我不捨之義大慧涅槃虗空滅非有三種但數有三耳滅唐譯作非擇滅復次大慧爾時世論婆羅門復問我言癡愛業因故有三有耶為無因耶我時報言此二者亦是世論耳以癡愛有因無因為二彼復問言一切性皆入自共相耶我復報言此亦世論婆羅門乃至意流妄計外塵皆是世論乃至下唐譯云少有心識流動分別外境皆是世論乃至者謂不及盡述外計超其餘者故云乃至復次大慧爾時世論婆羅門復問我言頗有非世論者不我是一切外道之宗説種種句味因緣譬喻莊嚴我復報言婆羅門有非汝有者非為非宗非説非不説種種句味非不因譬莊嚴婆羅門聞佛所答世論之過驚怖其言因逆問云頗有非世論者否佛復答云有但彼所有非汝有者婆羅門又云我是一切外道之所宗者能作種種句味因譬莊嚴之論亦有能如是作者否佛答云有但彼之所有宗説二通皆正義也不為非宗然亦非説非不説種種句味具足莊嚴所言如實無妄想計著之咎故非汝有婆羅門言何等為非世論非非宗非非説牒問上語我時報言婆羅門有非世論汝諸外道所不能知以於外性不實妄想虗偽計著故世尊但答有非世論而不明示其人者蓋佛自許然復默指菩薩乘人耳以其所行出世之道緣自得法非外道妄想可比其道深遠故非外道所知以於下出非世論者覺了之意謂覺於外性乃不實妄想所計著故謂妄想不生覺了有無自心現量妄想不生不受外塵妄想永息是名非世論此是我法非汝有也非世論者具足智慧覺了有無性相是自心現量故妄想不生妄想不生故不受外塵妄想永息矣是名非世論者之道也佛所説法非外道有以牒前文非汝有句婆羅門略説彼識若來若去若死若生若樂若苦若溺若見若觸若著種種相若和合相續若愛若因計著婆羅門如是比者是汝等世論非是我有妄識所計之相皆世論有如來法中則無故稱非我有也已上佛引昔破外論之事以證行者不可習近為酬大慧所問意令行者深入自宗隨機演説具足二通遠離諸過是以廣明世論之非也大慧世論婆羅門作如是問我如是答彼即默然不辭而退思自通處作是念言沙門釋子出於通外説無生無相無因覺自妄想現相妄想不生婆羅門退思自所通處反疑沙門出其自通之外別説無生等義意猶未悟仍致此疑大慧此即是汝向所問我何故説習近世論種種辨説攝受貪欲不攝受法結初問語大慧白佛言世尊攝受貪欲及法有何句義大慧問謂世論攝受貪欲有何害而沙門攝受法者有何利利害二途有何句義佛告大慧善哉善哉汝乃能為未來衆生思惟咨問如是句義大慧於利害處豈不明悟蓋為末世衆生故發此問佛因歎其利他之行勤且博也主伴同慈相為酬唱於我等有大恩德孰能報復諦聽諦聽善思念之當為汝説大慧白佛言唯然受教佛告大慧所謂貪者若取若捨若觸若味繫著外塵墮二邊見復生苦陰生老病死憂悲苦惱如是諸患皆從愛起斯由習近世論及世論者我及諸佛説名為貪是名攝受貪欲不攝受法何等為貪謂取其順意捨其違情身觸細滑舌味甘美即外六塵也進而或計有無墮二邊見今世苦陰已謝復生未來苦陰生而復死死已復生生老病死憂悲苦惱輪回不息如是諸患皆從愛起愛為生死之源人莫之知避也良由不悟無生習近世論及依世論者為之師友互相牽引佛説此輩名為貪欲如今世間智者或慕長生嗜於餐采或善章句博於功名列子御風陶朱致富此皆世欲之貪輪回安息又愚者或習羅清之愚誕口妄説空或欺初祖之真修名希即佛暗室單傳聯趺默運男女不別餐飲勿拘此皆世論之害自墮墮他泥犂窮劫猶不能盡耳大慧云何攝受法謂善覺知自心現量見人無我及法無我相妄想不生善知上上地離心意意識一切諸佛智慧灌頂具足攝受十無盡句於一切法無開發自在是名為法法義如文夫為沙門者攝受此法離生死苦得涅槃樂自覺覺他為利若此嗟彼不悟反詆異端如來説為可憐愍者所謂不墮一切見一切虗偽一切妄想一切性一切二邊此言正法不墮如是見中大慧多有外道癡人墮於二邊若常若斷非黠慧者受無因論則起常見外因壞因緣非性則起斷見集注云言無𭶑慧者受此無因論則起常見或計造色外因壞滅不復更生因緣之性亦無則起斷見大慧我不見生住滅故説名為法即前所謂不生不滅是如來正法之本大慧是名貪欲及法汝及餘菩薩摩訶薩應當修學此總結貪欲及法利害若此以勉行者貪欲當離法當修也爾時世尊欲重宣此義而説偈言一切世間論外道虗妄説妄見作所作彼則無自宗新説云言梵天為能作一切諸法為所作妄計能所如來法身真實自宗彼不能成唯我一自宗離於作所作為諸弟子説遠離諸世論心量不可見不觀察二心攝所攝非性斷常二俱離乃至心流轉是則為世論妄想不轉者是人見自心前四句可知心量下謂諸心量無實體性故不可見不觀察即不可見能所斷常皆為戲論二故離也世論百千乃至心意少有流動皆是世論若不為妄想流轉者是人能見自心離諸世論心量得究竟實際攝受正法來者謂事生去者事不現明了知去來妄想不復生有常及無常所作無所作此世他世等斯皆世論通頌意可知爾時大慧菩薩復白佛言世尊所言涅槃者説何等法名為涅槃而諸外道各起妄想一切外道各説有涅槃義是故舉此為問意欲如來顯出真實涅槃發露彼計是妄想非涅槃故佛告大慧諦聽諦聽善思念之當為汝説如諸外道妄想涅槃非彼妄想隨順涅槃如諸下魏譯云諸外道等虗妄分別涅槃之相如彼外道所分別者無是涅槃如諸下謂如諸外道妄想涅槃然非如彼隨順妄想所現涅槃蓋譯者艱於華言故語澀若是大慧白佛言唯然受教佛告大慧或有外道陰界入滅境界離欲見法無常心心法品不生不念去來現在境界諸受陰盡如燈火滅如種子壞妄想不生斯等於此作涅槃想大慧非以見壞名為涅槃佛破上義謂不以見法滅壞名為涅槃此墮斷見焦種破瓶無復用故大慧或以從方至方名為解脫境界想滅猶如風止解脫唐譯作涅槃從方至方者指計方外道也謂若無異趣則彼此境界想滅如風止息於此名涅槃也若方境不滅彼此相在從此至彼猶如風行故以風止喻於想滅楊彥國纂云從方至方謂無異趣境界之想雖滅而想性不滅如風暫止或復以覺所覺見壞名為解脫或見常無常作解脫想見常無常作解脫者首楞云是人觀妙明心遍十方界湛然以為究竟神我從是則計我遍十方凝明不動一切衆生於我心中自生自死則我心性名之為常彼生滅者真無常性同此見也或見種種相想招致苦生因思惟是已不善覺知自心現量怖畏於相而見無相深生愛樂作涅槃想有相想中具諸貪愛故致未來受生苦因由是撥有見無於無相境深生愛樂即於此處作涅槃想或有覺知內外諸法自相共相去來現在有性不壞作涅槃想謂計內心外境自共三世諸性不壞以此常見作涅槃想或謂我人衆生壽命一切法壞作涅槃想上是計常此是計斷或以外道惡燒智慧見自性及士夫彼二有間士夫所出名為自性如冥初比求那轉變求那是作者作涅槃想自性即極微自性也士夫即作者之名也彼二有者牒上句自性及士夫也謂極微與作者二有之間極微自性從作者出故云士夫所出名為自性也如冥初比者引例謂冥初生覺覺生五大大從覺生例今士夫出極微自性也求那譯云依諦即極微也謂諸緣依求那轉變蓋計諸緣無常求那是常因計求那是作者以此作涅槃想或謂福非福盡魏譯云復次大慧有餘外道説如是言罪盡故福德亦盡名為涅槃今文非福即罪義或謂諸煩惱盡或謂智慧或見自在是真實作生死者作涅槃想自在謂大自在天也外道共執此天是萬物之因華嚴鈔謂此天有四德一體二遍三常四能生諸法是故執此天是常是一是萬物因是涅槃因故或謂展轉相生生死更無餘因如是即是計著因而彼愚癡不能覺知以不知故作涅槃想魏譯云有餘外道言諸衆生迭共因生非餘因作如彼外道執著於因不知不覺愚癡暗鈍虗妄分別名為涅槃此蓋以相續常為涅槃也或有外道言得真諦道作涅槃想得真諦者謂見生滅盡處名真諦也妄證此諦名為涅槃或見功德功德所起和合一異俱不俱作涅槃想魏譯云有餘外道作如是言有作所作而共和合見一異俱不俱虗妄分別名為涅槃功德者指萬物能生之德也蓋功德是能作功德所起是所作能所和合以四句見作涅槃想或見自性所起孔文彩種種雜寶及利棘等性見已作涅槃想唐譯云或計諸物從自然生孔雀文彩棘針銛利生寶之處出種種寶如此等事是誰能作即執自然以為涅槃自性言自然性也謂孔雀之文彩孰與之飾棘針之銛利孰與之造鵠白烏玄鶴長𠒎短皆起自然無能造者以此自然作涅槃想大慧或有覺二十五真實或王守護國受六德論作涅槃想唐譯云或謂能解二十五諦即得涅槃或有説言能受六分守護衆生斯得涅槃瑜伽論十五因明處中云論體性有六種一言論二尚論三諍論四毀謗論五順正論六教道論蓋謂王守護國受此六種如中庸舜好問一節含此六論是護國義論中釋毀謗直以彼此毀謗為言今從德稱故作是解或見時是作者時節世間如是覺者作涅槃想古注云以時節為因能生世間法者以此作涅槃想或謂性或謂非性或謂知性非性或計有性或計無性或計能知二性者以為涅槃或見有覺與涅槃差別作涅槃想或計有覺之性異乎涅槃作涅槃想有如是比種種妄想結前此可取提婆論二十涅槃合看外道所説不成所成智者所棄不成所成者謂外道所成涅槃皆是妄想故不成也大慧如是一切悉墮二邊作涅槃想如是等外道涅槃妄想彼中都無若生若滅大慧下明前外道涅槃之過謂墮二邊也有無一異俱不俱常無常盡入二邊之論如是下重明外道涅槃之妄謂彼涅槃自性不可得安有生滅之相大慧彼一一外道涅槃彼等自論智慧觀察都無所立如彼妄想心意來去漂馳流動一切無有得涅槃者謂彼外道自妄成論以智觀彼總一虗妄都無所立然彼妄想心意去來馳動一切計中實無得涅槃者已上廣明外道妄計涅槃下文方顯如來真實涅槃大慧如我所説涅槃者謂善覺知自心現量不著外性離於四句見如實處不墮自心現妄想二邊攝所攝不可得一切度量不見所成愚於真實不應攝受棄捨彼已得自覺聖法知二無我離二煩惱淨除二障永離二死上上地如來地如影幻等諸深三昧離心意意識説名涅槃文義可知集注云前文云我所説妄想識滅名為涅槃此云我所説涅槃者善覺知自心現量以善覺知自心現量故妄想識滅大經云涅言不生槃言不滅不生不滅名大涅槃乃知二經之旨名異而體同也大慧汝等及餘菩薩摩訶薩應當修學當疾遠離一切外道諸涅槃見佛以正涅槃義勉諸當學而復誡其外見當離也爾時世尊欲重宣此義而説偈言外道涅槃見各各起妄想斯從心想生無解脫方便愚於縛縛者遠離善方便外道解脫想解脫終不生衆智各異趣外道所見通彼悉無解脫愚癡妄想故愚於縛縛者謂外道之愚縛於妄想以涅槃為所縛妄想為能縛縛是所縛者是能耳集注云外道於有無種種起涅槃見是縛於涅槃也又於涅槃各各起妄想分別是縛於妄想也不知此縛從心想生故無解脫方便而世間愚夫依於外道起種種妄計昧著不捨轉失方便妄生解脫想而實無解脫由外道執此邪智異趣自謂所見通達不知正墮愚癡妄想無有解脫一切癡外道妄見作所作有無有品論彼悉無解脫凡愚樂妄想不聞真實慧言語三苦本真實滅苦因集注云法界次第云苦有三種曰苦苦壞苦行苦苦以逼惱為義妄想言説是三苦之本離妄想言説證真實慧則滅其苦因譬如鏡中像雖現而非有於妄想心鏡愚夫見有二鏡喻真實慧像喻有無法品也夫鏡體虗涵衆像斯照像非色質但影而已故云雖現而非有也真實之慧照有無法亦復如是然彼愚夫以妄想心鏡照之則有無之相紛然故見有二也不識心及緣則起二妄想了心及境界妄想則不生此出妄想心鏡之過兼明覺真遺妄之功也謂彼不識能緣所緣之妄則起心境二想若了心境二非則能所不生矣心者即種種遠離相所相事現而無現如彼愚妄想三有唯妄想外義悉無有妄想種種現凡愚不能了外義魏唐二譯作外境心非真心即前塵種種分別影事故云心即種種若能遠離相所相事心既不緣則雖現而無現矣如彼愚夫妄想三有則心與境唯是妄想然外境界本悉無有而愚夫妄想見種種現以凡愚不了故生妄想經經説妄想終不出於名若離於言説亦無有所説此因外妄兼顯內經也謂如上所陳外道諸論虗妄可知矣然即內經多種亦是言説妄想蓋經者能詮也如標月之指渡河之筏學者須會旨而忘全可也若執言説則終不出於名言之外修二句謂能離言説則所説事亦無能所既無妄想斯斷真心斯顯此世尊因諸外計而別有所警云耳
