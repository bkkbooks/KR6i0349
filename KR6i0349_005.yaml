body:
  text: 劉宋天竺沙門求那䟦陀羅譯皇明吳興後學沙門廣莫參訂夏官大夫携李袁黃閱正一切佛語心品第一之三爾時世尊告大慧菩薩摩訶薩言意生身分別通相我今當說第二卷末一乘相中謂菩薩入出世間上上無漏界當得如來自在法身今意生身正是法身中所具修行菩薩地地升進乃至如來地次第得三種意生身故今當說諦聽諦聽善思念之大慧白佛言善哉世尊唯然受教佛告大慧有三種意生身云何為三所謂三昧樂正受意生身覺法自性性意生身種類俱生無行作意生身修行者了知初地上上增進相得三種身三種意生身者下文云初地至第五地得三昧樂身第八地得覺法自性身種類俱生身者謂覺佛自證法樂應在等妙之間得也此三種身今經三譯例云竪得不言橫具詳玩初地以上地地現十界身方便度生又各各互具十波羅蜜等法豈三種意生身不分具耶當知橫具之義理固有之今經略而不言也又第二經初略明意生且未顯其通相今乃分別說有三種大慧云何三昧樂正受意生身謂第三第四第五地三昧樂正受故三昧樂正受者梵語三昧譯云正定又云正受正定者明定體也正受者指定中所受之境也今文既云三昧又重言正受者謂行者三昧中樂於正受亦或華梵兼舉耳言意生者謂隨意即至物不能留名意生也種種自心寂靜定住心海起浪識相不生知自心現境界性非性是名三昧樂正受意生身種種自心寂靜等者即三昧樂境也種種言諸塵也自心寂靜者言諸塵由自心現不外流逸故得寂靜安住心海識浪不生也以知自心現境外物非性於此得定境不礙心名三昧樂也大慧云何覺法自性性意生身謂第八地觀察覺了如幻等法悉無所有身心轉變得如幻三昧及餘三昧門無量相力自在明如妙華莊嚴迅疾如意猶如幻夢水月鏡像非造非所造如造所造一切色種種支分具足莊嚴隨入一切佛剎大眾通達自性法故是名覺法自性性意生身覺法自性性者法謂世出世間等法也上自性字即法之自體性也下性字即實相義謂覺了諸法自體之實自體之實無所有相無相之相為諸法實相也八地菩薩證得諸法實相乃能轉變五陰之身八識之心成法自性實際身心也得如幻三昧者謂覺諸法如幻故念念與如幻相應得證此定更具無量定門故云及餘也無量相力等者相謂相好力謂神力明謂身光言此意生之身相好光明如天妙華莊嚴其體以顯相好之勝也如幻夢等者謂所現之身無窒礙之迹也非造所造等者謂意生身雖非能所八法所成隨意即生如造所造相一切形體支分具足莊嚴也菩薩乘此身相隨往無礙徧入一切佛剎大眾之中演化不息如是功德悉由通達自性法故是名覺法自性性意生身大慧云何種類俱生無行作意生身所謂覺一切佛法緣自得樂相是名種類俱生無行作意生身種類者上而諸佛下而羣生隨類普現名俱生也無行作者謂異類繁興眾形普會作而無作無作而作如春到人間萬萌俱發春奚為哉無行作者此之謂也集註云謂覺了一切諸佛所證之法緣自得樂相而千種萬類之身於無功用行無作而作一時俱生猶如意生無障礙也大慧於彼三種身相觀察覺了應當修學爾時世尊欲重宣此義而說偈言非我乘大乘謂佛不住大乘也若有住大之心則為非住矣何大哉故今偈意乃遣住大之心方名為大耳非說亦非字非諦非解脫非無有境界然乘摩訶衍所言大者事理皆非也非言說非文字非諦理非解脫諸相雖非不入斷滅故云非無有境界也會得諸非之意大乘不遠即於非處乘摩訶衍矣摩訶衍譯云大乘三摩提自在三摩提即長行三昧之通稱也自在即樂義此頌三昧樂意生身種種意生身此句雙頌覺法自性及種類俱生二身也略文攝二義故云種種自在華莊嚴頌義可知爾時大慧菩薩摩訶薩白佛言世尊如世尊說若男子女人行五無間業不入無擇地獄世尊云何男子女人行五無間業不入無擇地獄無擇魏唐二譯作無間地藏菩薩經云五無間獄者一趣果無間二受苦無間三時無間四命無間五形無間謂地獄中人受此五事皆無間故集註云世尊嘗說造五無間業者即入無間地獄又云行五無間業者不入無間地獄故舉此問之佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧云何五無間業所謂殺父母及害羅漢破壞眾僧惡心出佛身血此經三譯列五逆者如文若唯大乘律謂一殺父母二破和合僧三出佛身血四殺阿羅漢五破羯磨僧四分律又開為七一出佛身血二殺父三殺母四殺和尚五殺阿闍黎六破羯磨僧七殺阿羅漢葢約開合有五七之異耳此五為業共獄為報謂造此五業感報地獄故然而生我者父母詩云父母之恩昊天罔極為子者當竭力孝養以報其恩奚啻萬一況行殺戮而不為逆乎墮無間獄者當然耳阿羅漢為世福田眾生依是植福生人天上或因之而出三界恩及我者過於父母況行殺戮而不為逆乎墮無間獄者當然耳僧以三聚勝戒和合作法人天中尊我等當歸之為作恃怙然依而行之猶不可及況逆之而加破壞是背正道墮無間獄者當然耳佛是九界眾生之慈父也我之沉淪開我之淨妙若昏衢之寶燄苦海之慈航經云手足供給兩肩荷負歷恒沙劫猶不能報況以惡心出其血乎悖之甚矣墮無間獄者當然耳出佛身血通善惡二途如祇域行針出血佛疾得愈此善心出血非逆故以惡心二字簡之以五逆是惡業實事要當墮於地獄者也下文所說是酬大慧不入地獄五無間業蓋以順行無間例彼逆行無間也大慧云何眾生母謂愛更受生貪喜俱如緣母立一切生死由愛所起愛不斷故展轉受生貪喜俱者謂由愛故貪喜相依三世相續如子緣母得以成立無明為父生入處聚落斷二根本名害父母無明是生生之元有陽剛之義故喻為父痴愛乃資生之始有陰柔之義故喻為母人謂六入處謂十二處聚落喻無明所依止也應攝十八界今文不言略也行者能斷無明與愛名害父母彼諸使不現如鼠毒發諸法究竟斷彼名害羅漢集註云鼠之齧人瘡雖已愈其毒遇雷即發羅漢諸使亦爾雖隱而不現遇緣即發能斷彼微細習使名害羅漢云何破僧謂異相諸陰和合積聚究竟斷彼名為破僧集註云異相即色受想行識也僧以和合為義今稱陰為僧者以妄和合故斷彼陰集名破和合僧大慧不覺外自共相自心現量七識身以三解脫無漏惡想究竟斷彼七種識佛名為惡心出佛身血集註云謂不覺五陰自共相是自心所現不實計有七識身今以此身為佛者蓋七識為妄覺境界故依之起染染即名血以空無相願三無漏智斷彼七識妄覺染污名為惡心出佛身血也若男子女人行此無間事者名五無間亦名無間等魏譯云大慧是名內身五種無間若善男子善女人行此無間得名無間者名證如實法故無間等即魏譯如實法義謂事理無間一切平等故復次大慧有外無間今當演說汝及餘菩薩摩訶薩聞是義已於未來世不墮愚癡云何五無間謂先所說無間有外無間者即前文所說殺父母等五逆也上所修斷無明癡愛等者為內今外由內顯以明內者當行外者當斷故下文云若行此者一一不得無間等法若行此者於三解脫一一不得無間等法若行此者牒上外無間也謂若行外五無間則於三脫及內所行乃至無間平等之法一一不得此警眾生勿行外業也除此已餘化神力現無間等謂聲聞化神力菩薩化神力如來化神力為餘作無間罪者除疑悔過為勸發故神力變化現無間等除此者除外五逆實業也餘化下謂三乘聖人以神力化現無間事業為令餘眾生作無間罪者悔過除疑故又為勸發造五逆者改惡崇善故除疑者如維摩所謂罪性本空不在內外中間三處善解二比丘之疑者是也勸發者如世尊勸發闍王懺悔弑父母罪得法眼淨者是也三乘聖人皆有神力現無間等事但有廣狹之殊耳無有一向作無間事不得無間等魏譯云若犯五種無間罪者畢竟不得證人道分唐譯云若有實造無間業者終無現身而得解脫謂無有一向實作五無間事而得內無間等法者故云不得也今文語拙難解按魏唐二譯可了除覺自心現量離身財妄想離我我所攝受或時遇善知識解脫餘趣相續妄想承上文意謂彼實造五逆者必不得無間等法唯除覺悟自心離我我所又或遇善知識懺悔於此二者乃可解脫餘趣相續報想爾時世尊欲重宣此義而說偈言貪愛名為母無明則為父覺境識為佛諸使為羅漢陰集名為僧無間次第斷謂是五無間不入無擇獄集註云前文為顯行內五無間證真實法故因兼說外五無間所以此偈唯頌內五無間也爾時大慧菩薩復白佛言世尊惟願為說佛之知覺佛之知覺唐譯作諸佛體性前則背佛知覺故成無明而不知無明實性即佛知覺今大慧欲顯此義輙於無明癡愛之後問佛知覺似有由矣世尊何等是佛之知覺佛告大慧覺人法無我了知二障離二種死斷二煩惱是名佛之知覺二無我見前註二障即煩惱所知也煩惱謂昏煩之法惱亂心神不能顯發妙明真性名煩惱障所知亦名智障謂以所知之執障蔽中理名所知障二死即分段變易見前註二煩惱者瑜伽師地論五十五云一本煩惱煩惱自性有六種一貪二瞋三無明四慢五見六疑此六能出生一切煩惱故名為本二隨煩惱謂忿恨覆惱嫉慳誑諂憍害無慚無愧惛沉掉舉不信懈怠放逸忘念散亂不正知惡作睡眠尋伺而言隨者謂一切違順境上如是等類隨逐不捨名隨煩惱詳如彼論今文謂覺此諸法不為所蔽名佛之知覺聲聞緣覺得此法者亦名為佛以是因緣故我說一乘謂二乘能得此離障法者即名為佛然不唯二乘是佛即如六道眾生能得此法亦名為佛如龍女深達罪福頓覺佛乘於須臾頃便成正覺此所謂道不遠人但以覺不覺為遠近耳爾時世尊欲重宣此義說偈言善知二無我二障煩惱斷永離二種死是名佛知覺爾時大慧菩薩白佛言世尊何故世尊於大眾中唱如是言我是過去一切佛及種種受生我爾時作曼陀轉輪聖王六牙大象及鸚鵡鳥釋提桓因善眼仙人如是等百千生經說曼陀王魏唐二譯作頂生王善眼仙人魏譯作毗那娑仙人唐譯作月光妙眼集註云因上佛說覺二無我等法名之為佛大慧以謂過去諸佛由覺此法故名之為佛今世尊覺此法亦名為佛覺道雖一過現不同云何言我是過去一切諸佛又本生經說如來過去曾種種受生如作轉輪王及作釋提善眼大象鸚鵡等百千生故舉相違之義以問事見本生等經佛告大慧以四等故如來應供等正覺於大眾中唱如是言我爾時作拘留孫拘那含牟尼迦葉佛云何四等謂字等語等法等身等是名四等宗鏡云云何等義所謂同一名字同一梵聲同一乘門同一真體乃至同一心同一智同一覺同一道故以四種等故如來應供等正覺於大眾中唱如是言云何字等若字稱我為佛彼字亦稱一切諸佛彼字自性無有差別是名字等唐譯云謂我名佛一切如來亦名為佛佛名無別是謂字等云何語等謂我六十四種梵音言語相生彼諸如來應供等正覺亦如是六十四種梵音言語相生無增無減無有差別迦陵頻伽梵音聲性新說云密跡力士經說佛聲有八轉謂體業具為從屬於呼是八轉聲各具八德所謂調和聲柔軟聲諦了聲易解聲無錯謬聲無雌小聲廣大聲深遠聲八八即成六十四種非唯釋迦佛一切諸佛皆如是集註云頻伽譯云妙聲鳥正法念經云迦陵頻伽出妙音聲若天若人緊那羅等無能及者唯除如來音聲故諸經稱佛音聲必引為喻云何身等謂我與諸佛法身及色身相好無有差別除為調伏彼彼諸趣差別眾生故示現種種差別色身是名身等古註云答上種種受生佛謂除為教化異趣眾生方便示現種種之身若不如是則無差別云何法等謂我及彼佛得三十七菩提分法新說云菩提是覺分是因義此三十七為諸乘覺因亦名道品故淨名云道品是道場是法身因然三十七品總有七類一對治顛倒道謂四念處二斷諸懈怠道謂四正勤三引發神通道謂四神足四現觀方便道謂五根五親近現觀道謂五力六現觀目體道謂七覺分七現觀後起道謂八正道義如別說此七類次第者謂聞法已先當念持次即勤修勤故攝心調柔柔故信等成根根增為力七覺分別八正正行總以喻顯法性如地念處如種子正勤為種植神足如抽芽五根如生根五力如莖葉增長開七覺花結八正果一切諸佛所證無異是名法等略說佛法無障礙智是名四等是故如來應供等正覺於大眾中唱如是言結前四等以明唱說之致爾時世尊欲重宣此義而說偈言迦葉拘留孫拘那含是我以此四種等我為佛子說大慧復白佛言如世尊所說我從某夜得最正覺乃至某夜入般涅槃於其中間乃至不說一字亦不已說當說不說是佛說大慧白佛言世尊如來應供等正覺何因說言不說是佛說某夜得正覺入涅槃者言世尊示生始終二事以該其中也某者汎言之辭世尊示生成道入滅之迹詳如瑞應普曜等經周書異記并開皇三寶等錄所載年月日異不敢孰是究者請自檢之夫我佛示生八十年於其中間種種說法乃謂不說一字者何也蓋般若離言說相離文字相若有所說即為謗佛所謂無法可說是名佛說此大慧歷聞一乘非說非字故以不說之說為問也佛告大慧我因二法故作如是說云何二法謂緣自得法及本住法是名二法因此二法故我如是說集註云不從他悟曰自得了無所從曰本住云何緣自得法若彼如來所得我亦得之無增無減緣自得法究竟境界離言說妄想離字二趣緣者以心契之也自得法者謂默得於心不堪說示如禪者云如人飲水冷煖自知名自得法也以心契理理與智冥觀與謂合無緣之緣始可謂緣也若彼下謂自得法不從人得人亦不可授之與我是故諸佛可得我亦可得在佛無增於我無減故也緣自得究竟境界離言說相說所說相俱不可入故云離二趣也云何本住法謂古先聖道如金銀等性法界常住謂古下魏譯云本行路平坦譬如金銀珍珠等寶在於彼處大慧是名法性本住處古先聖道即魏譯所云本行路義謂古聖所行之道本然常住即法界實理無增無減不遷不易如金銀之性在鑛不減出鑛不增從古迄今其道常住無所變遷名本住法也若如來出世若不出世法界常住如趣彼城道謂法界常住之道如來出世不出世此道不易所謂如金銀之性本來常住出鑛不出鑛其性不遷也如趣彼城道者謂道路本然非因行與不行有所損益譬如士夫行曠野中見向古城平坦正道即隨入城受如意樂大慧於意云何彼作是道及城中種種樂耶答言不也於意下魏譯云彼人始作是道始作種種莊嚴耶士夫行曠野中喻諸眾生行於生死曠野之中也以生死喻曠野者謂生死茫茫無涯際故如曠野中行多生怖故見向古城平坦正道喻悟法界常住之理也即隨入城喻進趣涅槃也受如意樂喻證得稱性之樂也然彼法界道之與樂本然有之非行者始作故佛告大慧我及過去一切諸佛法界常住亦復如是合如上註是故說言我從某夜得最正覺乃至某夜入般涅槃於其中間不說一字亦不已說當說結前不說說意爾時世尊欲重宣此義而說偈言我某夜成道至某夜涅槃於此二中間我都無所說此重頌不說說意緣自得法住故我作是說彼佛及與我悉無有差別初句下住字即本住也法之一字通自得本住二義後二句謂諸佛及釋尊所得之法悉平等故爾時大慧菩薩復請世尊惟願為說一切法有無有相令我及餘菩薩摩訶薩離有無有相疾得阿耨多羅三藐三菩提世間心量多墮二見大慧故請有無二相令自及他離是二病得證阿耨菩提也佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧此世間依有二種謂依有及無墮性非性欲見不離離相墮性是有墮非性是無二見俱不離欲而作離欲相見大慧云何世間依有謂有世間因緣生非不有從有生非無有生此出有計也謂彼計云有世間因緣和合而生諸法非不有言非無也又牒上句云諸法從有生非從無生也大慧彼如是說者是說世間無因佛判有計墮無因生也謂從本已來求有性不可得則本無因矣以本無因故末亦無因故墮無因也大慧云何世間依無謂受貪恚癡性已然後妄想計著貪恚癡性非性此出無計也謂彼受貪等性已覓貪等不可得計為非性大慧若不取有性者性相寂靜故謂諸如來聲聞緣覺不取貪恚癡性為有為無謂彼因無見者以不取貪等有性則貪等性相寂靜以寂靜故便擬佛及二乘亦不取貪等性故計彼為無此所謂增上慢者之言耳今文為有為無者外道私謂佛及二乘不取貪等有無所不取者亦屬於無是知依無外道具增上慢為害非細由是下文斥為壞者大慧此中何等為壞者此中指上有無二見者佛問此二何者為壞壞者言如焦種破瓶無復用故大慧白佛言世尊若彼取貪恚癡性後不復取唐譯云大慧白言謂有貪嗔癡性後取於無名為壞者佛告大慧善哉善哉汝如是解大慧非但貪恚癡性非性為壞者於聲聞緣覺及佛亦是壞者此佛順大慧答意以明外道依無之過也謂據外道撥無之見者非但計貪等非性為壞而擬佛及二乘同彼所計則亦是壞者此極言墮無之過重也然佛以一言而兼明二意一斥外計之誤一辨佛及二乘壞者異乎撥無是故下文微釋壞義以明佛及二乘非是壞者所以者何謂內外不可得故煩惱性異不異故此徵明佛及二乘壞之所以也謂貪等性內外不可得故名之為壞以煩惱非異不異故非性似無由是彼擬同己之無也壞名雖同而壞之所以有以異也大慧貪恚癡若內若外不可得貪恚癡性無身故非佛聲聞緣覺是壞者佛聲聞緣覺自性解脫故縛與縛因非性故縛與縛因魏譯作能縛所縛因此明貪等無性以辯佛及二乘非同外計墮於無見而為壞者大慧下正辯非壞佛聲下出非壞所以謂佛及二乘不計貪等有無觀法如幻自性解脫縛與縛因俱非性故是以不同外計之無也縛謂縛事即陰界入自共相等縛因謂貪恚癡也以一切縛事因貪等起故今佛及二乘了彼性空得解脫故不名壞者大慧若有縛者應有縛是縛因故魏譯云若有能縛必有所縛若有所縛必有能縛縛者是所縛即所縛之事也縛因是能縛即貪恚癡也以所縛因貪等起故大慧如是說壞者是名無有相此結佛及二乘所有壞義是名為正影顯外道所有壞義是斷滅性故下文云我寧取人見如須彌山不起無所有增上慢空見大慧因是故我說寧取人見如須彌山不起無所有增上慢空見魏譯云我依此義餘經中說寧起我見如須彌山不言諸法是空無也因是故者牒承前文以依無外道墮增上慢故不取也寧取人見者人見著有猶可化故增上慢空見必不可化為過實深此警正修行者莫依無見也成唯識云撥無二諦是惡見空諸佛說為不可治者大慧無所有增上慢者是名為壞墮自共相見希望唐譯云若起此見名為壞者墮自共見樂欲之中希望即樂欲義謂增上慢空見之人墮自共見樂欲之中葢依自共相有無分別樂欲空性故稱壞者下文智識相中謂二乘人亦墮自共見希望須知二乘與外道空見雖同而邪正有異蓋二乘觀性空而得道故正外道因撥無而成解故邪不知自心現量見外性無常剎那展轉壞陰界入相續流注變滅離文字相妄想是名為壞者此出依無壞者之非也集註云不知自心現量見外法無常剎那之間展轉變壞及陰界入相續流注變滅悉歸於無謂已離文字相妄想分別亦墮無所有空見是名壞者爾時世尊欲重宣此義而說偈言有無是二邊乃至心境界淨除彼境界平等心寂滅前二句重頌有無及自心境界後二句重頌佛之正義也古注云淨除有無及妄心境界平等心自然寂滅無取境界性滅非無所有有事悉如如如賢聖境界古註云知貪愛境界性虗妄無可取即是體性寂滅非是無他所有始寂滅也觀諸有事悉平等無二即是賢聖境界無種而有生生已而復滅因緣有非有不住我教法無種有生者謂從無生有也所計勝性等是無種故生已復滅者謂作斷滅論也計有無因緣者不住如來教法中故非外道非佛非我亦非餘因緣所集起云何而得無誰集因緣有而復說言無邪見論生法妄想計有無古註云言生法非外道作又非佛作非神我作亦非餘者微塵四大等作但從妄想生故也既從因緣集會始得起者即無自體即明無此生法也生法本無何須更無之新說云四大五蘊中各無主誰集會之仍說因緣有生有既不有寧得復說破有為無明外道邪見故說有生法以妄想故計為有無若知無所生亦復無所滅觀此悉空寂有無二俱離此頌如來正義爾時大慧菩薩復白佛言世尊唯願為我及諸菩薩說宗通相若善分別宗通相者我及諸菩薩通達是相通是相已速成阿耨多羅三藐三菩提不隨覺想及眾魔外道佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧一切聲聞緣覺菩薩有二種通相謂宗通及說通三乘皆有二種通者俱有自行化他故宗通自行說通化他輔行云通舉二乘菩薩所證及說成共三乘理教之相宗鏡云內證自心第一義理住自覺地入聖智門以此相應名宗通相此是行時非是解時因解成行行成解絕則言說道斷心行處滅又曰宗通為菩薩說通為童蒙大慧宗通者謂緣自得勝進相遠離言說文字妄想趣無漏界自覺地自相遠離一切虗妄覺想降伏一切外道眾魔緣自覺趣光明輝發是名宗通相緣自得者如前註說勝進相者謂地地增勝進趣之相此自得勝進境界遠離言說文字二想趣上上無漏界中到自覺地自相境界一切虗妄覺想悉皆遠離然此自覺相者敵體親證不可說示若以奏泊擬議則愈趣愈遠因稱自覺以覺自光明暎蔽一切則能降伏魔冤破彼幽暗是名宗通之相云何說通相謂說九部種種教法離異不異有無等相以巧方便隨順眾生如應說法令得度脫是名說通相大慧汝及餘菩薩應當修學說通之義可知大慧下勉諸菩薩應學二通也爾時世尊欲重宣此義而說偈言宗及說通相緣自與教法緣自頌宗通教法頌說通善見善分別不隨諸覺想此謂善別二通不隨妄想覺觀非有真實性如愚夫妄想魏譯云實無外諸法如凡夫分別云何起妄想非性為解脫此承非有真實性意以破計無之想也謂諸法非實云何起諸妄想計非性為解脫耶法既非實有無皆妄矣觀察諸有為生滅等相續增長於二見顛倒無所知前二句破計有之想後二句總結有無之計皆顛倒無知耳一是為真諦無罪為涅槃觀察世妄想如幻夢芭焦魏譯云涅槃離於識唯此一法實觀世間虗妄如幻夢芭蕉一字應上二見謂有無二見既非則一真諦為是矣真諦無罪垢即為涅槃除涅槃而觀世者無非妄想如幻夢芭蕉耳今文無罪即魏譯離識義以識為罪者謂眾生識心是雜染業種諸罪業依而生故雖有貪恚癡而實無有人從愛生諸陰有皆如幻夢人魏譯云作者前從不隨諸覺想至此有十六句總明覺想之意葢長行中略明今偈中詳出爾時大慧菩薩白佛言世尊惟願為說不實妄想相古註云問妄想相不實妄想云何而生問妄想云何生說何等法名不實妄想問妄想體於何等法中不實妄想問妄想起處佛告大慧善哉善哉能問如來如是之義多所饒益多所安樂哀愍世間一切天人諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧種種義種種不實妄想古註云種種色聲香味觸人天諸法義是妄想相答上問妄想相計著妄想生古註云言妄計著人天等諸法義故答上問妄想云何生大慧攝所攝計著不知自心現量及墮有無見增長外道見古註云不知我我所是自心現量妄生計著墮有無見增長外道四句是妄想體答上問妄想體妄想習氣計著外種種義心心數妄想計著我我所生集註云上心字是八識心王下心數字是心法之名數此數有五十一種謂遍行五別境五善十一本煩惱六隨煩惱二十不定四心數或云心所此五十一種是心所有法皆屬能緣計著色等相應起時造善惡業古註云答上問妄想起處大慧白佛言世尊若種種義種種不實妄想計著妄想生攝所攝計著不知自心現量及墮有無見增長外道見妄想習氣計著外種種義心心數妄想我我所計著生世尊若如是外種種義相墮有無相離性非性離見相世尊第一義亦如是離量根分譬因相若如下唐譯云大慧白言若如是者外種種義性離有無起諸見相世尊第一義諦亦復如是離諸根量宗因譬喻此大慧牒前答語用張己難也若種下正牒答語若如下以離見擬同於佛謂若如是種種義墮有無相因令離諸性非性相見既以離相見者世尊第一義亦離根量譬因等相則世諦與第一義同以離相見云何世諦言妄第一義不言妄耶是故下文出難如是世尊何故一處妄想不實義種種性計著妄想生非計著第一義處相妄想生新說云明世尊何故偏於世諦離有無處言起妄想第一義離有無處不言起妄想耶將無世尊說邪因論耶說一生一不生古註云言世諦與第一義諦既同離有無何故一處生妄想一處不生妄想將無佛說是邪因論佛告大慧非妄想一生一不生古註云佛言我非計世諦處生妄想第一義諦處不生妄想所以者何謂有無妄想不生故外現性非性覺自心現量妄想不生此徵明非一生一不生義也謂覺自心現量故有無妄想不生及外現性非性相妄想亦不生也大慧我說餘愚夫自心種種妄想相故事業在前種種妄想性相計著生文中餘字是承上意謂除第一義餘諸愚夫由自心妄想故有諸事業現前此諸事業由種種妄想性相計著生故云何愚夫得離我我所計著見離作所作因緣過覺自妄想心量身心轉變究竟明解一切地如來自覺境界離五法自性事見妄想此亦承上意謂諸愚夫既墮性相計著何能得離我我所及作所作因緣過又何能覺自心現量身心轉變又何能究竟明解菩薩諸地及如來自覺境界又何能得離五法三自性一切事見妄想以是因緣故我說妄想從種種不實義計著生知如實義得解脫自心種種妄想以是下結前意也謂諸愚夫不覺自心現量以是因緣佛說妄想從不實義計著生知如下正明前文能知如實第一義者始得解脫自心妄想爾時世尊欲重宣此義而說偈言諸因及與緣從此生世間妄想著四句不知我所通謂以因緣生諸世間凡外妄想計著四句故不知如來所通第一如實之義世間非有生亦復非無生不從有無生亦非非有無諸因及與緣云何愚妄想此出如來所通之義謂世間義非有非無非非有無諸因及緣當體如如云何愚夫妄想計著以四句分別非有亦非無亦復非有無如是觀世間心轉得無我承上偈意以明無我第二句非有無應作非非有無蓋遣初句二非也後二句謂能離四句觀於世間則身心轉變得證法無我境界一切性不生以從緣生故一切緣所作所作非自有所作非自有者以不能自有要假能作方有所作所謂緣生之有也古註云從緣生者無自體故則知一切法無生事不自生事有二事過故無二事過故非有性可得謂緣生之事自不能生所作必假能作能所相依離則不成故云有二事過也能所無實其過何有非有性可得故云無二事過也觀諸有為法離攀緣所緣無心之心量我說為心量攀唐譯作能謂有為之法緣生既離證得無心無心之境未空亦是心量古德云莫道無心云是道無心猶隔一重關此之謂歟量者自性處緣性二俱離性究竟妙淨我說名心量性者量之性也緣者能緣所緣也緣之與性二俱遠離故究竟妙淨也若妙見未空世尊說此亦是心量施設世諦我彼則無實事諸陰陰施設無事亦復然前二句破世諦之我謂我相假設無實事故後二句破五陰之法亦假施設無實亦然例如我故故云亦復然也有四種平等相及因性生第三無我等第四修修者魏譯云有四種平等相因生無我如是四平等是修行者法唐譯云有四種平等相因及所生無我為第四修行者觀察按魏唐二譯知此偈以警行者依四平等而超諸心量也魏唐四等謂性相平等因果平等生所生平等我無我平等今經四等謂性相平等因果平等我無我平等能修所修平等令修行者當觀此四得平等而超心量也妄想習氣轉有種種心生境界於外現是世俗心量謂世俗心量由妄想習氣轉變故有種種心生不了自心見外境界名世俗心量外現而非有心見彼種種建立於身財我說為心量外現不實故非有妄心計著見彼種種由是建立身財為依正之具也身根身財器界如是建立世尊說名世俗心量離一切諸見及離想所想無得亦無生我說為心量非性非非性性非性悉離謂彼心解脫我說為心量如如與空際涅槃及法界種種意生身我說為心量此破出世名數以明實際理地不受一塵也前四句謂縱離一切能所想見乃至無得無生若離念未空亦是心量次四句謂觀諸性非性及雙亦雙非皆悉遠離心雖解脫若離念未空亦是心量次四句謂出世間一切名數未忘亦是心量宗鏡云量者是能緣心但有對俗說真因虗立實斥差別論平等遣異相建如如盡是對待得名破執說教爾時大慧菩薩白佛言世尊如世尊所說菩薩摩訶薩當善語義云何為菩薩善語義云何為語云何為義大慧因前屢聞言說之過實義之功蓋語非義而不顯義非語而不彰語義相依悟迷不遠今大慧於功過雖知常情未解故舉佛先所說語義以求其實耳佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧云何為語謂言字妄想和合依咽喉唇舌齒齗頰輔因彼我言說妄想習氣計著生是名為語第二經中大慧當問言說妄想心經世尊詳明言說所起之相今復問者蓋前以言說對妄想論一異故示言說之相今以語義對顯重明其相用彰語義之實故無重繁之過也大慧云何為義謂離一切妄想相言說相是名為義言說如指所顯義如月離指方能見月若以指體為月明性者指與月無所了故由是當離妄想言說乃名為義大慧菩薩摩訶薩於如是義獨一靜處聞思修慧緣自覺了向涅槃城習氣身轉變已自覺境界觀地地中間勝進義相是名菩薩摩訶薩善義菩薩能以所聞之義思惟觀察觸處洞然自始及終條理不忒是為緣自覺了向涅槃城也由是妄習身心漸得轉變得轉變已依於自覺觀察諸地勝進義相趣發無滯是名菩薩善義之相復次大慧善語義菩薩摩訶薩觀語與義非異非不異觀義與語亦復如是若語異義者則不因語辨義而以語入義如燈照色若語下辨異不異相也文中但辨非異其非不異相略也如燈下舉喻燈喻言說色喻於義古註云因燈見色而色非燈也因燈見色不得言異而色非燈故不得言一以譬因語入義不得言異而義非語故不得言一故云離異不異復次大慧不生不滅自性涅槃三乘一乘心自性等如緣言說義計著墮建立及誹謗見異建立異妄想如幻種種妄想現譬如種種幻凡愚眾生作異妄想非聖賢也承前語義以明計著之墮也不生不滅乃至心自性等皆言說也言之所顯是義若緣言說及義而計著者則墮建立誹謗二過矣異建立異妄想者謂諸外道建立非一而妄想亦非一差別多種故云異也如幻下引喻說譬如幻出種種事則有種種妄想現而諸凡愚於種種幻事作種種異想然非聖賢有此諸見爾時世尊欲重宣此義而說偈言彼言既妄想建立於諸法以彼建立故死墮泥棃中新說云言諸愚夫隨言取義建立諸法以計有法不免惡道誹謗亦爾陰中無有我陰非即是我不如彼妄想亦復非無我首楞嚴云外道有觀行陰動元於無盡流中生於計度發心顛倒或自固身云色是我或見我圓徧含國土云我有色或彼前緣隨我迴復云色屬我或復我依行中相續云我在色如是循環有十六相此皆計彼陰中有我而建立諸相也能知陰中無我陰非是我等則不墮外道妄立我中然於無我亦復非真行者知此即見真諦一切悉有性如凡愚妄想若如彼所見一切應見諦集註云如凡愚妄想見一切法悉皆有性即實有性於一切法應亦見實諦此明非有性也一切法無性淨穢悉無有不實如彼見亦非無所有法性既無安有淨穢即彼無性之見亦自不實然諸法性必非斷無故云亦非無所有此明非無性也復次大慧智識相今當說古註云如來因上菩薩當善語義相知語者是識知義者是智故次明智識相也若善分別智識相者汝及諸菩薩則能通達智識之相疾成阿耨多羅三藐三菩提此先明善智識之益大慧彼智有三種謂世間出世間出世間上上智云何世間智謂一切外道凡夫計著有無云何出世間智謂一切聲聞緣覺墮自共相希望計著云何出世間上上智謂諸佛菩薩觀無所有法見不生不滅離有無品如來地人法無我緣自得生大慧彼生滅者是識不生不滅者是智復次墮相無相及墮有無種種相因是識超有無相是智復次長養相是識非長養相是智彼生下以世出世間對簡謂世間智不離生滅生滅則是識非智也然則外道凡夫被簡矣復次下又以智之所趣對簡墮相無相及種種相因者是識非智謂一切相唯識現故超此因者乃名為智此簡外道二乘非智也又復次下長養相者長養即生生不絕之義外道所計生因是也此是邪解之識非正觀之智復次有三種智謂知生滅知自共相知不生不滅智體本一而知處有三種異者蓋約能知人邊知有廣狹邪正之異邪則雖智猶識耳今知生滅者外道智也知自共相者二乘智也知不生不滅者如來智也復次無礙相是智境界種種礙相是識此以礙無礙對簡明智識之相也復次三事和合生方便相是識無事方便自性相是智根塵識三名事和合生起名方便相由此三事生者是識無事方便自性靈明非起滅相者是智復次得相是識不得相是智得相者謂心境不忘是識能兩忘者是智也已上詳辨智識之相令諸菩薩依智勿依識故自得聖智境界不出不入故如水中月自得聖智在凡不出在聖不入上而諸佛下而羣品無增無減不去不來名不動智也如水中月者水喻心月喻智水清月現月無所來水濁月亡月無所去是名聖智境界無出無入爾時世尊欲重宣此義而說偈言採集業為識不採集為智採集執受義識能執受善惡種子故也詳如第一註中說智體亡我靈鑒豈私如鏡照物妍醜不爭何採集之有故名智也觀察一切法通達無所有逮得自在力是則名為慧縛境界為心覺想生為智無所有及勝慧則從是生覺想即覺照也由覺而生名智不為境所縛故肇師云造心分別謂之慧決定審理謂之智是則慧在於因智在於果矣今文云覺想生為智無所有及勝而生為慧是則智在於因慧在於果矣宗鏡又云般若者智慧也智則知也慧則見也是則知見自屬於因智慧唯稱於果蓋智慧因果不可定一而論此二必互通因果耳古註云為煩惱境界所縛者為妄想心覺煩惱境界從妄想生者為智無所有八地也勝佛地也心意及與識遠離思惟想得無思想法佛子非聲聞此頌不生不滅自得之智也謂遠離心意識生滅思惟之想而得不生滅無思想法者是菩薩之智非聲聞有也寂靜勝進忍如來清淨智生於善勝義所行悉遠離集註云仁王經中說有五忍謂伏信順無生寂滅各有下中上品地前但得伏忍三品九地如次配次三忍十地等覺及佛得寂滅忍故云寂靜勝進忍是如來清淨智也明佛忍淨智從勝義諦生妄想心識所行境界皆悉遠離我有三種智聖開發真實古註云如來隨機說法故有三種智言此三種智正欲開悟眾生令得真實離言說法於彼想思惟悉攝受諸性二乘不相應智離諸所有計著於自性從諸聲聞生超度諸心量如來智清淨集生云於彼妄想起思惟攝受諸生滅性者此世間智也二乘智能離諸所有不與諸生滅相應然計著自共相性謂從聲聞生者此出世間智也越彼凡愚二乘世聞出世間種種心量得如來清淨智者此乃出世間上上智也蓋總頌上二種三智復次大慧外道有九種轉變論外道轉變見生所謂形處轉變相轉變因轉變成轉變見轉變性轉變緣分明轉變所作分明轉變事轉變大慧是名九種轉變見一切外道因是起有無生轉變論第四成轉變魏譯作相應轉變第六性作物第九事作生古註云人天六道形狀不同名形處轉變五陰相生住異滅一念不住名相轉變因滅果起名因轉變因所成法壞名成轉變於一法上始見為是後見為非名見轉變萬物體性轉變名性轉變十二因緣生滅不住名緣分明轉變緣所作果壞名所作分明轉變有為法滅名事轉變諸外道因此九種轉變起有無見生轉變論云何形處轉變謂形處異見譬如金變作諸器物則有種種形處顯現非金性變一切性變亦復如是三界六道橫竪等殊故云形處異見如金造器有瓶盤釵釧之異金性本然非隨器變也一切變者指餘八變也皆如金性故云亦復如是外道依此轉變作種種論或有外道作如是妄想乃至事變妄想彼非如非異妄想故魏譯云大慧復有餘外道分別諸法依因轉變大慧而彼諸法亦非如是非不如是以依分別故別有外道不知前九是妄而於此中詳究其因佛故斥為非如非異總一妄想見耳按魏譯可了如是一切性轉變當知如乳酪酒果等熟外道轉變妄想彼亦無有轉變若有若無自心現外性非性新說云外道妄計一切性轉變者非一非異譬如乳酪酒果等熟也因乳得酪不得言異氣味不同不得言一彼實無有無法可轉變也言有無法是自心妄現外性無實故大慧如是凡愚眾生自妄想修習生大慧無有法若生若滅如見幻夢色生唐譯云皆是愚迷凡夫從自心分別習氣而起實無一法若生若滅如因幻夢所見諸色如石女兒說有生死此結明九變從妄想生也言妄想修習生者謂此九變皆邪謬熏習所生實無一法若生若滅應觀諸法如幻夢色等爾時世尊欲重宣此義而說偈言形處時轉變四大種諸根中陰漸次生妄想非明智新說云外道言形處時節四大作種諸根轉變二乘之人計有中陰漸續生陰悉是妄想最勝於緣起非如彼妄想然世間緣起如犍闥婆城最勝佛自稱也謂佛於緣起法中無所分別非如彼諸外道於緣起法生諸妄想然知世間緣起如犍闥婆城非性非非性也
