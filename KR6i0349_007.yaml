body:
  text: 劉宋天竺沙門求那跋陀羅譯皇明吳興後學沙門廣莫參訂夏官大夫擕李袁黃閲正一切佛語心品第一之四爾時大慧菩薩白佛言世尊惟願為說三藐三佛陀魏譯云唯願演說自身所證內覺知法以何等法名為法身唐譯云願為我說如來應正等覺自性覺梵語三藐譯云正等三佛陀譯云正覺者三譯語異義同蓋約能證人邊問所證法身我及餘菩薩摩訶薩善於如來自性自覺覺他大慧先敘所問之益也集注云如來自性法身自性也佛告大慧咨所欲問我當為汝隨所問說大慧白佛言世尊如來應供等正覺為作耶為不作耶為事耶為因耶為相耶為所相耶為說耶為所說耶為覺耶為所覺耶如是等辭句為異為不異魏譯為作耶句上加法身字事作果相作見覺作智此問如來法身於諸句中為何所屬即此諸句為異不異耶蓋前文所明涅槃即是如來法身故大慧次涅槃後遂問法身將欲如來融會能所故下文云法身者即是自性涅槃佛告大慧如來應供等正覺於如是等辭句非事非因所以者何俱有過故法身之義於迷者如大火聚四句解之則夭傷慧命於悟者如清涼池四門可入沃之潤之而長養道種今大慧隨順迷者以作非作等為問而不知法身非作非不作非相非非相非因果法非不因果法所以下徵釋有過也大慧若如來是事者或作或無常無常故一切事應是如來我及諸佛皆所不欲此牒釋上義也古注云若言如來是果事者即同作法無常過若同無常者一切世間果事悉應是如來故魏譯云不許此法若非所作者無所得故方便則空同於兔角槃大之子以無所有故唐譯云若非作法則無體性所修方便悉空無益同於兔角石女之子非作因成故大慧若無事無因者則非有非無若非有非無則出於四句四句者是世間言說若出四句者則不墮四句不墮四句故智者所取一切如來句義亦如是慧者當知若無下遣計明正謂事之與因是凡愚妄計今云無者蓋遣之也事因既遣則非有非無非有非無則超出四句然四句者是世間言說若超出四句則離世間不墮四句此不墮四句之義智者所取以顯四句是凡愚計著耳然此超義非唯釋尊如是一切諸佛義亦如是具智慧者當去邪而歸正可也如我所說一切法無我當知此義無我性是無我一切法有自性無他性如牛馬大慧譬如非牛馬性非馬牛性其實非有非無彼非無自性魏譯云我說一切諸法無我汝當諦聽無我之義夫無我者內身無我是故無我大慧一切諸法自身為有他身為無如似牛馬大慧譬如牛身非是馬身馬亦非牛是故不得言有言無而彼自體非是無也此承上以起下也上文非有非無出四句者即無我義無我義者非作故無我本然自性具無我義故云性是無我也一切法有自性無他性者一向說法無自性今云有自性者謂非直斷無無而恆有蓋所謂妙有也於此無彼於彼無此故云無他性也譬如下舉喻明有自性無他性謂如牛中無馬馬中無牛然彼彼非無自性故其實非有非無者如云求馬性於牛實非有也求牛性於牛實非無也彼彼各有自性求他性則無故如是大慧一切諸法非無自相有自相但非無我愚夫之所能知以妄想故如是一切法空無生無自性當如是知此結牒上喻以明諸法有自相也但非下按魏唐二譯愚夫字上無無我二字若從今文釋之亦有旨存焉涅槃經云佛說有真我佛性之理諸菩薩皆申懺悔我等從無量劫來常被無我之所漂流又云無我者名為生死我者名為如來無我愚夫此為明證也如是一切下以空無生無自性例無我義謂空而不空無生而無所不生無自性見前如是如來與陰非異非不異如來指法身也陰謂五陰也如來法身湛然清淨衆生陰身膿血所聚以實相觀之染淨無二異不異相一俱非故若不異陰者應是無常若異者方便則空若二者應有異如牛角相似故不異長短差別有異一切法亦如是古注云若言法身與陰一者應是無常若言法身與陰異者則同虛空無有益物方便若言法身與陰二者應有異相如牛二角相似不得言異二角長短不同黑白差別不得言不異故魏譯云如是一切諸法應無異相而有異相大慧如牛右角異左角左角異右角如是長短種種色各各異大慧如來於陰界入非異非不異如牛下承上若二者應有異之言以明如來與陰等非異非不異也如是如來解脫非異非不異唐譯云如來者依解脫說如來解脫非異非不異如來是能證之人解脫是所證之德蓋以能所辨非一異也此約出世淨法辨非一異如是如來以解脫名說承上文意以明如來依解脫名說也若如來異解脫者應色相成色相成故應無常若不異者修行者得相應無分別而修行者見分別是故非異非不異此釋前文能所非一異也如是智及爾𦦨非異非不異此約能知所知辨非一異大慧智及爾𦦨非異非不異非常非無常非作非所作非有為非無為非覺非所覺非相非所相非陰非異陰非說非所說非一非異非俱非不俱非一非異非俱非不俱故悉離一切量此謂名數性空法身斯顯是以牒拂大慧所問之語謂離如是一切心量法身當現故槩言非也離一切量則無言說無言說則無生無生則無滅無滅則寂滅寂滅則自性涅槃自性涅槃則無事無因無事無因則無攀緣無攀緣則出過一切虗僞出過一切虗僞則是如來如來則是三藐三佛陀大慧是名三藐三佛陀佛陀以離心量故能致如來由是歷顯如來覺際至第十句牒歸大慧初問之語末句大慧下結答所問而重言佛陀者示具此德之人也集注云佛陀大論云秦言知者知過去未來現在衆生非衆生數有常無常等一切諸法故名佛陀後漢郊祀志云漢言覺也佛地論云具一切智一切種智離煩惱障及所知障於一切法一切種相能自開覺亦能開覺一切有情故名為佛大慧三藐三佛陀佛陀者離一切根量集注云躡前重釋結酬所問明如來法身正遍知覺者永離一切諸根境界不可以識情虗妄測度爾時世尊欲重宣此義而說偈言悉離諸根量無事亦無因已離覺所覺亦離相所相集注云自此七偈頌法身離念超過二見此總明悉離也陰緣等正覺一異莫能見若無有見者云何而分別集注云若五陰諸緣與正覺既無一異可見云何更有所分別義非作非不作非事亦非因非陰不在陰亦非有餘雜非陰不在陰者外道計我與陰循環有十六相見前注中有餘雜者如首楞云外道具有四種不死矯亂遍計虗論計云各各生處名之為有互互亡處名之為無以理都觀用心別見又云有人來問唯答一字但言其無除無之餘無所言說又云是人有無俱見其境枝故其心亦亂詳如彼說是為餘雜之類也亦非有諸性如彼妄想見當知亦非無此法法亦爾以有故有無以無故有有若無不應受若有不應想謂上諸性皆妄想見也破其所計故皆言非此法既非有無彼法亦爾言諸法皆離有無性故以有下言有無相待而生也末二句出有無之過謂若無不應受有是無者之過也若有不應想無是有者之過也或於我非我言說量留連沉溺於二邊自壞壞世間集注云言愚夫不知如來法身體離有無計著我非我等言說量溺於一切二邊過患則自壞壞他流轉生死解脫一切過正觀察我通是名為正觀不毀大導師集注云言離有無一切過患則能正見如來法身自通不毀導師所說法要爾時大慧菩薩復白佛言世尊如世尊說修多羅攝受不生不滅又世尊說不生不滅是如來異名云何世尊為無性故說不生不滅為是如來異名集注云大慧因上言如來法身無有生滅又如佛昔修多羅中分別攝取不生不滅說此即是如來異名故舉此二教相違請佛會通異名及無性二義佛告大慧我說一切法不生不滅有無品不現集注云一切法生則墮有滅則墮無不生不滅則超有無品類故曰不現大慧白佛言世尊若一切法不生者則攝受法不可得一切法不生故若名字中有法者惟願為說大慧問言若一切法不生則無法可攝既云不生不滅是如來異名則如來名字中疑應有法願為我說佛告大慧善哉善哉諦聽諦聽善思念之吾當為汝分別解說大慧白佛言唯然受教佛告大慧我說如來非無性亦非不生不滅攝一切法亦不待緣故不生不滅亦非無義佛答云如來名體非是無性不生不滅之名亦非攝一切生滅之法自覺因成不待緣而故有雖云不生不滅必非斷無之義大慧我說意生法身如來名號彼不生者一切外道聲聞緣覺七住菩薩非其境界大慧彼不生即如來異名集注云佛說不生不滅即是如來意生法身別異之名也凡愚外道昧劣二乘七地菩薩心量未滅非其境界是皆不能了耳大慧譬如因陀羅釋迦不蘭陀羅不蘭之不以富音呼之華嚴鈔譯云降伏以能降伏阿修羅故此舉帝釋千名以例如來衆多名號也華嚴十二經如來名號品云如來於此娑婆世界或名一切義成或名圓滿月如是等其數十千十方世界亦各具足十千乃至云有無量百千名號大矣哉世尊一體而多名應緣以立號耳集注云或云釋迦提婆因陀羅又云富蘭陀及憍尸迦皆帝釋異名如是等諸物一一各有多名亦非多名而有多性亦非無自性唐譯云譬如帝釋地及虗空乃至手足隨一一物各有多名非以名多而有多體亦非無體此謂非唯佛與帝釋而有多名抑即諸物各有衆多名字處處不同然非多名即有多體亦非無自體性也如月印千江月非多體然而千江月影不可云無有亦無實世尊多名之性有無之論亦復如是不可言有不可言無有無是二邊語敵體稱性即第一義故如是大慧我於此婆呵世界有三阿僧祇百千名號集注云娑呵舊曰娑婆亦曰索訶譯云能忍阿僧祇譯云無數愚夫悉聞各說我名而不解我如來異名唐譯云諸凡愚人雖聞雖說而不知是如來異名大慧或有衆生知我如來者有知一切智者有知佛者有知救世者有知自覺者有知導師者有知廣導者有知一切導者有知仙人者有知梵者有知毗紐者有知自在者有知勝者有知迦毗羅者有知真實邊者有知月者有知日者有知主者有知無生者有知無滅者有知空者有知如如者有知諦者有知實際者有知法性者有知涅槃者有知常者有知平等者有知不二者有知無相者有知解脫者有知道者有知意生者大慧如是等三阿僧祇百千名號不增不減此及餘世界皆悉知我如水中月不出不入梵語迦毗羅輔行譯云黃頭上古仙名也若云迦毗羅皤窣都皤宰都譯云所依處蓋城名也謂黃頭仙依此修道城因仙名耳今文但云迦毗羅是仙非城謂佛金色如彼仙故集注以城解者非也集注云如上略舉或有知者三十三種名以例多數也毗紐譯云大力迦毗羅城名以佛生彼城因名迦毗羅仙如是等滿三無數百千名號稱謂不同然其體唯一無有增減此方餘界有利根者能知如來法身隨衆生心現實無去來譬如皎月影現衆水何有出入哉彼諸愚夫不能知我墮二邊故然悉恭敬供養於我而不善解知辭句義趣不分別名不解自通計著種種言說章句於不生不滅作無性想不知如來名號差別如因陀羅釋迦不蘭陀羅謂諸凡愚不知如來句義墮於二邊雖不解了然亦恭敬供養於佛但於如來名義及自通相不善解知計著種種言說章句於不生不滅作無性想是故不知如來名號無量差別如因下重舉前例令易解故不解自通會歸終極於一切法隨說計著集注云終極之旨不善會歸故於一切法隨言說計著大慧彼諸癡人作如是言義如言說義說無異所以者何謂義無身故言說之外更無餘義唯止言說謂愚癡人執言說即義離言說無別義故何者義無體性故言說之外求義性不可得由是唯止言說悲夫止於言說忘於義趣執筌為魚觀指亡月得非誤哉大慧彼惡燒智不知言說自性不知言說生滅義不生滅惡燒智者謂凡愚人惡智如火燒菩提芽不知言說自性從妄想起以音聲齒吻和合而成亦復不知言說是生滅法義不生滅大慧一切言說墮於文字義則不墮離性非性故無受生亦無身義則下唐譯云義則不墮離有離無故無生無體故大慧如來不說墮文字法文字有無不可得故除不墮文字謂如來說而無說不令聞者墮於文字是謂無說無聞也何以故文字性空有無不可得故除不墮文字法墮即不說大慧若有說言如來說墮文字法者此則妄說法離文字故是故大慧我等諸佛及諸菩薩不說一字不答一字所以者何法離文字故非不饒益義說言說者衆生妄想故謂佛所說法隨機建立法無定名理何所說若人謂佛有所說法則為謗佛何以故法離文字言說性空是故如來說無所說於諸聞者聞無所聞然則諦理寂然無說無聽故法華云諸法寂滅相不可以言宣此之謂也所以下重顯法離文字以彰不說之說究竟饒益一切有情非不饒益之義也蓋言說者衆生妄想故大慧若不說一切法者教法則壞教法壞者則無諸佛菩薩緣覺聲聞若無者誰說為誰壞即滅也若直謂不說一切法則教法滅盡教法既滅則三乘聖人悉無成矣若無諸佛誰為說者若無三乘行者為誰說法是故大慧菩薩摩訶薩莫著言說隨宜方便廣說經法以衆生希望煩惱不一故我及諸佛為彼種種異解衆生而說諸法令離心意意識故不為得自覺聖智處是故下明結勸之意隨宜下示廣說之由謂以衆生樂欲之心所生煩惱非一種故是故諸佛為彼異解衆生廣說諸法令離心意識著若有衆生即得自覺聖智處者則不為多說但直示一乘而已大慧於一切法無所有覺自心現量離二妄想諸菩薩摩訶薩依於義不依文字謂有諸菩薩知一切法無所有覺自心現量離有無能所性相二邊妄想者則依於義不依文字若善男子善女人依文字者自壞第一義亦不能覺他墮惡見相續而為衆說不善了知一切法一切地一切相亦不知章句謂諸行者若不解義趣誤墮文字不了自心自壞第一義亦不能以第一義覺人墮惡見中相續不斷乃為衆人說諸惡法以惡見故不善了知如來所有一切諸法菩薩所有一切諸地世出世間所有一切諸相然亦不知如來一切權實章句若善一切法一切地一切相通達章句具足性義彼則能以正無相樂而自娛樂平等大乘建立衆生謂諸行者若能善解如來一切法菩薩一切地世出世間一切相又能通達一切權實章句則能具足自性第一義諦乃以中道無相之樂而自娛樂復以平等大乘建立一切衆生大慧攝受大乘者則攝受諸佛菩薩緣覺聲聞攝受諸佛菩薩緣覺聲聞者則攝受一切衆生攝受一切衆生者則攝受正法攝受正法者則佛種不斷佛種不斷者則能了知得殊勝入處此承上文以敘得正無相樂者之益也謂能得是無相樂故則攝受大乘以攝受大乘故上則攝受諸聖下則攝受羣生生佛既攝正法自具正性自具則二利兼行佛種不斷以佛種不斷故心能了知得殊勝入處殊勝入處者謂入自覺聖處也知得殊勝入處菩薩摩訶薩常得化生建立大乘十自在力現衆色像通達衆生形類希望煩惱諸相如實說法如實者不異如實者不來不去相一切虗僞息是名如實謂得殊勝入處菩薩常以意生身化生一切衆生中建立大乘令修如實法義也十自在力者大論二十四云一知是處非處智力二知過現未來業報智力三知諸禪解脫三昧智力四知諸根勝劣智力五知種種解智力六知種種界智力七知一切至處道智力八知天眼無礙智力九知宿命無漏智力十知永斷習氣智力然以任運無礙名自在也菩薩乘此十力現衆色像外達衆生形類內達衆生煩惱上契於理下契於機如實說法令諸衆生因聞而達道也謂如實者不異也說法無差別故此約事說又如實者無去來相也顯理無去來相故此約理說以事理如實故令諸衆生一切虗僞息滅是名如實說也大慧善男子善女人不應攝受隨說計著真實者離文字故此重誡行者莫著言說當依真實以真實義離文字故大慧如為愚夫以指指物愚夫觀指不得實義如是愚夫隨言說指攝受計著至竟不捨終不能得離言說指第一實義此復舉喻以明著言說者不得實義也謂如以指指物示彼愚夫而彼愚夫因指當應觀物既不觀物復執能指以為物者則不得所指之物矣如是下法合指喻言說物喻實義謂彼愚夫隨言說指攝受計著畢竟不捨終不能得離言說指之實義也大慧譬如嬰兒應食熟食不應食生若食生者則令發狂不知次第方便熟故大慧如是不生不滅不方便修則為不善此喻為諸行者依於文字而不善於法者設也謂如嬰兒以穀粟之食當炊令熟然後乃食若復食生則發諸疾以其不知次第熟故如是下法合謂依文字者計著不生不滅之食不以次第方便修治則為不善如彼嬰兒食生者同也是故應當善修方便莫隨言說如視指端此結前意誡令當捨於指是故大慧於真實義當方便修此結次前不善修意誡令當善方便真實義者微妙寂靜是涅槃因言說者妄想合妄想者集生死此以真妄合明用彰實義之德言說之咎意令行者捨妄而趣真也大慧真實義者從多聞者得大慧多聞者謂善於義非善言說善義者不隨一切外道經論身自不隨亦不令他隨是則名曰大德多聞此明實義所從得之門也謂開多聞之門示真實之義然多聞之德在義不在言在義者善在言者不善佛故擇其善者勉令從之其不善者誡令遠之善義下謂善於如來第一實義非善外道所計之義也故云不隨一切外道經論自身不隨亦不令他隨則自覺覺他人人返正不亦為大德多聞乎嗟夫今之世有沙門者稍得小慧便逞多聞或內亡實義外騖清談依附老莊縱橫嵇阮滑稽之言流利渾厚之風渺茫以至題篇造論讚詠外書雖為探玄者之貴寧無擇善者之慚凡吾釋子當以今經為鑑依於義無隨於言為如來所讚乃名大德不亦善乎奚以區區小慧為自多耶是故欲求義者當親近多聞所謂善義與此相違計著言說應當遠離此結勸行者當親近善義之師遠離著言之教如來法誨學者遵行庶幾為法門之良導也爾時大慧菩薩復承佛威神而白佛言世尊世尊顯示不生不滅無有奇特所以者何一切外道因亦不生不滅世尊亦說虗空非數緣滅及涅槃界不生不滅集注云因上佛說不生不滅之義大慧謂外道亦說諸因不生不滅故曰無有奇特與世尊說三無為法不生不滅無有異也世尊外道說因生諸世間世尊亦說無明愛業妄想為緣生諸世間彼因此緣名差別耳外物因緣亦如是世尊與外道論無有差別問謂外道計微塵等因生諸世間佛說無明愛業為緣生諸世間彼因此緣名雖異而義實同也外物下例上意蓋無明愛業是內識故今以外物因緣與內識同故亦如是然則佛與外道論義何別微塵勝妙自在衆生主等如是九物不生不滅世尊亦說一切性不生不滅有無不可得新說云此出外道不生滅義九物之體也一時二方三虗空四微塵五四大種六大梵天七勝妙天八大自在天九衆生主謂諸外道計此九物不生不滅能與生死諸法作因通名作者與佛大乘說一切性本非生滅若有若無悉不可得亦無異外道亦說四大不壞自性不生不滅四大常是四大乃至周流諸趣不捨自性世尊所說亦復如是是故我言無有奇特惟願世尊為說差別所以奇特勝諸外道大慧以如上因緣及今四大常義對佛校論世尊於彼初無奇特然而世尊屢勝外道外道常有所屈今大慧欲知世尊勝之所以然者願為說之若無差別者一切外道皆亦是佛以不生不滅故謂佛與外道所見無別則諸外道亦皆是佛何以故彼此皆以不生不滅見故而世尊說一世界中多佛出世者無有是處如向所說一世界中應有多佛無差別故集注云大慧意謂世尊當說一世界中無有多佛出世若向所說法果與外道無別則一世界中應有多佛出世何以故彼此說法無差別故佛告大慧我說不生不滅不同外道不生不滅所以者何彼諸外道有性自性得不生不變相我不如是墮有無品所以下出不同外道之意謂彼外道計有外性分別得不生不滅之相然而分別得者非真不生滅有相待故是以世尊所說不同外計墮有無品也大慧我者離有無品離生滅非性非無性佛謂我所說者離有無生滅非性非非性是真不生不滅如種種幻夢現故非無性一切法性如幻夢現無實故非有有相故非無非彼斷無見故故云非無性也云何無性謂色無自性相攝受現不現故攝不攝故上文既明非無性今復徵明非性之義也無性即上文非性句故謂色無自性現即不現攝即不攝如幻夢故以是故一切性無性非無性但覺自心現量妄想不生安隱快樂世事永息愚癡凡夫妄想作事非諸賢聖以是下結上無性之意謂一切性性即無性然非斷無性也但覺自心所現外境非性全體虗妄知虗妄故妄想不生妄想不生則貪欲不起故得安隱快樂世事永息也夫舉世若夢而凡愚妄想執著作諸事業到頭空手獨赴死門此是愚夫妄有實非賢聖不實妄想如犍闥婆城及幻化人大慧如犍闥婆城及幻化人種種衆生商賈出入愚夫妄想謂真出入而實無有出者入者但彼妄想故不實妄想是法如犍下舉喻以明妄想不實之意大慧下先明犍城非實衆生出入是犍城所現者愚夫見有實非有也妄想故爾如是大慧愚癡凡夫起不生不滅惑彼亦無有有為無為如幻人生其實無有若生若滅性無性無所有故如是二字合上喻意謂彼犍城本無自性無出無入愚夫妄分別見例彼外道愚癡於性無性上妄起不生不滅惑然彼惑見亦無自性故於彼中無有有為無為之相類如幻人生即不生無自體故是故無有若生若滅何以故以性無性無所有故一切法亦如是離於生滅愚癡凡夫墮不如實起生滅妄想非諸賢聖一切下下重合幻喻幻人喻一切法法非性故離於生滅而彼凡愚墮不如實見起生滅妄想法體非性生滅何有凡愚妄想非聖賢事不如實者不爾如性自性妄想亦不異若異妄想者計著一切性自性不見寂靜不見寂靜者終不離妄想不如實不爾者承上諸聖賢意以明凡夫不如聖賢離生滅見也謂以如實不如實相例如實者離於生滅諸聖賢是也不如實者起生滅見愚癡凡夫是也故云不如實者不爾如性下明如實意謂妄想如性自性現同一虗妄故云不異此如實見也若異下明不如實意謂外性與內妄想異者由計著性自性相內外流動不見寂靜不見寂靜者終不離於妄想此不如實見也是故大慧無相見勝非相見相者受生因故不勝此結上文如實不如實意以明相無相之勝劣也無相見者是如實義故勝相本非相以相見者是不實義故不勝大慧無相者妄想不生不起不滅我說涅槃此牒無相見者得如實義故妄想不生無起滅相即此佛說是涅槃義大慧涅槃者如真實義見離先妄想心心數法逮得如來自覺聖智我說是涅槃承上涅槃明見如實義者妄想心滅自覺智圓佛說是涅槃義爾時世尊欲重宣此義而說偈言滅除彼生論建立不生義我說如是法愚夫不能知如來滅彼生論建立不生對機權說豈有定名愚夫迷倒不能知此一切法不生無性無所有揵闥婆幻夢有性者無因不生無自性前二句承上不生義明其所由也謂一切法本不生相性不實故即無性也以無性故謂無所有復頌喻義言如犍城幻夢非實有也有性下判外道生性是無因也為除生論立不生義生論既除不生亦無自性也何因空當說以離於和合覺知性不現是故空不生我說無自性佛意謂不生既明當說空義何因而空由離根塵和合覺知識體不現三緣既離即此名空空即不生不生即無自性法名有三義意無別謂一一和合性現而非有分析無和合非如外道見承上離和合翻明和合非性也一一指諸法而言謂諸和合妄想假設性雖現而非有也以智分析本無和合非如外道見有和合夢幻及垂髮野馬揵闥婆世間種種事無因而相現集注云夢幻垂髮等喻世間諸事妄現其相初無有因野馬即陽焰遊氣折伏有因論申暢無生義申暢無生者法流永不斷熾然無因論恐怖諸外道外道計勝妙微塵等因為有佛故申暢無生而折伏之無生既申有因自破是故正法流傳永世不斷無生即無因以無因破有因熾然如火燒彼邪見稠林莫能遏絶失彼所計故恐怖也爾時大慧以偈問曰此下兩重問答魏唐二譯通為一偈云何何所因彼以何故生於何處和合而作無因論大慧躡前熾然無因之論為問意謂云何名無因若無因者復何所因彼諸外道何故有生既屬無因更於何處和合而得生耶故以四何疊問爾時世尊復以偈答觀察有為法非無因有因彼生滅論者所見從是滅集注云佛言應觀有為一切諸法非無因生非有因生故說無生則外道生滅所見之論自此毀滅矣爾時大慧說偈問曰云何為無生為是無性耶為顧視諸緣有法名無生名不應無義惟為分別說顧視按唐譯是待義唐譯云為無故不生為待於衆緣為有名無義願為我宣說大慧問云何為無生為無性名無生耶為待諸緣別有一法名無生耶既有無生之名不應無無生之義名義不無則墮於有何謂無生爾時世尊復以偈答非無性無生亦非顧諸緣非有性而名名亦非無義一切諸外道聲聞及緣覺七住非境界是名無生相答謂非無性名無生亦非待緣別有法既名無生豈云無義大哉無生二乘罔攝一切外道知見非分然則二乘但盡生滅非實無生七性分得非究竟也直至佛果始證無生實際遠離諸因緣亦離一切事唯有微心住想所想俱離其身隨轉變我說是無生微心魏唐二譯作唯心今文上有唯字故變為微亦唯字義耳集注作微妙心解於義雖合觀本偈意秪是唯義無外性無性亦無心攝受斷除一切見我說是無生如是無自性空等應分別非空故說空無生故說空夫無生也者外無性非性內無攝受心斷除諸異見佛說是無生也如是下別以無自性及空等義例應分別謂空非斷空應機巧說是故非空而說空也空即無生無生即空故說為空而言等者攝取餘名所謂真如佛性解脫等耳因緣數和合則有生有滅離諸因緣數無別有生滅古注云有十二因緣數轉變故說名生滅離此數外更無有生法也捨離因緣數更無有異性若言一異者是外道妄想有無性不生非有亦非無除其數轉變是悉不可得集注云若離妄緣更無異生性除十二數轉變則生性有無等四句悉不可得但有諸俗數展轉為鈎鎖離彼因緣鎖生義不可得集注云諸俗數謂因緣十二支新說云凡夫不能了諸妄緣是故長劫為之鈎鎖連環不斷故目因緣為鈎鎖若離妄緣無別生法生無性不起離諸外道過但說緣鈎鎖凡愚不能了集注云生無自性故生而不生起即生義故唐譯云生無故不生不生故離外道生法之過我但說因緣為鈎鎖而愚夫不能知緣中無生也若離緣鈎鎖別有生性者是則無因論破壞鈎鎖義謂離鈎鎖因緣別有生性者此性無本妄以為因故佛判為無因論也外計此因能生諸法而諸法不能自生由是破壞因緣鈎鎖之義得非過歟如燈顯衆像鈎鎖現若然是則離鈎鎖別更有諸性此承前設喻以明生性無因也外道計謂由生性故鈎鎖得現若然者則如燈能顯像燈喻生性衆像喻鈎鎖諸法謂如暗中諸像由燈故顯例彼因緣諸法由生性而成是則離鈎鎖外別有諸性矣觀夫燈者但能顯而不能生若云能生衆像則不可也何者像各有體燈何以生是故佛判無因良有以也無性無有生如虗空自性若離於鈎鎖慧無所分別魏譯云生法本無體自性如虗空離鈎鎖求法愚人無所知無性無生者謂生性非真故無性也無性則無能生能生自性既無則同虗空不能生物矣若離鈎鎖生性如空縱有智慧何所分別復有餘無生賢聖所得法彼生無生者是則無生忍承上離鈎鎖意正明無生也謂離鈎鎖自有無生為三乘賢聖所得之法蓋因緣所生生即無生是為無生法忍若使諸世間觀察鈎鎖者一切離鈎鎖從是得三昧集注云若使諸世間人觀察鈎鎖義者了知一切諸法本離鈎鎖從此得解脫三昧癡愛諸業等是則內鈎鑽鑽燧泥團輪種子等名外癡魏唐二譯作無明無明是過去二支因中之一愛是現在三支因中之一於十二緣中略舉過現二因以該餘十總為內鈎鎖也鑽燧泥團輪等為外鈎鎖例同諸法也鑽燧世人取火之具泥團輪陶家造器之緣種子是為正因水土是為助緣內外一切諸法同是鈎鎖義略舉三法例彼鈎鎖因緣和合而有由此內外鈎鎖世間諸法得成就故若使有他性而從因緣生彼非鈎鎖義是則不成就魏譯云若更有他法而從因緣生離於鈎鎖義彼不住聖教此言因緣之外無別有法以明展轉相生之義也若因緣外別有他性從彼因緣生者是無因性彼非此義鈎鎖不成矣若生無自性彼為誰鈎鎖展轉相生故當知因緣義初二句破外道生性無實不能作鈎鎖生因也謂能生因性非實如何與鈎鎖作因彼性既空為誰鈎鎖次二句明如來正義當知必以無明行識乃至老死等展轉相生是為如來鈎鎖因緣也堅濕暖動法凡愚生妄想離數無異法是則說無性一切諸法不離堅濕暖動之性凡愚於此法中執為實有故生種種妄想然離堅濕暖動名數之外別無異法可得是故諸法說為無性如醫療衆病無有若干論以病差別故為設種種治我為彼衆生破壞諸煩惱知其根優劣為彼說度門前四句喻也後四句法也喻中可知法中末云度門者謂六度也度有出凡入聖之義故喻為門有世間出世間出世間上上三等不同隨根優劣而說也非煩惱根異而有種種法唯說一乘法是則為大乘此明為實施權之意也佛能順機說法權布三車既出火宅白牛等賜非謂煩惱根異說法亦異也善哉世尊對病權施病消則廢返本之教一而已矣故云唯說一乘爾時大慧菩薩摩訶薩復白佛言世尊一切外道皆起無常妄想世尊亦說一切行無常是生滅法此義云何為邪為正為有幾種無常大慧前聞不生不滅是常義今因常而問無常別其邪正然無常之名復有幾種佛告大慧一切外道有七種無常非我法也何等為七彼有說言作已而捨是名無常有說形處壞是名無常有說即色是無常有說色轉變中間是名無常無間自之散壞如乳酪等轉變中間不可見無常毀壞一切性轉有說性無常有說性無性無常有說一切法不生無常入一切法唐譯云何等為七謂有說始起即捨是名無常生已不生無常性故有說形處變壞是名無常有說色即無常有說色之變異是名無常一切諸法相續不斷能令變異自然歸滅猶如乳酪前後變異雖不可見然在法中壞一切法有說物無常有說物無物無常有說不生無常遍住一切諸法之中魏譯標有八種無常與今經不對故不録其中或有可解處亦取釋之今文七有說下列七無常名也泐公注中云七種無常皆是外計先列次釋列中惟色轉變無常稍涉釋義色言四大造色轉變謂生住異滅無間自之散壞等者謂相續不斷能令變異自然歸滅也如乳酪之轉變雖不可見然在法中自然變壞一切法也餘皆下文具釋釋中或兼破計或但釋義仍不次第不出色性也大慧性無性無常者謂四大及所造自相壞四大自性不可得不生唐譯云物無物無常者謂能造所造其相滅壞大種自性本來無起此破第六性無性無常也性唐譯作物蓋萬物之體性也萬物皆以四大能造所造成體相故其相不實畢竟滅壞相既滅壞求其自性不可得不可得故云不生也物性無體故云性無性即於不生立無常名耳此中全陳彼計不顯破語蓋佛破意謂彼既見不生是依無立見屬斷滅論耳此過易顯雖不詳破明如指掌彼不生無常者非常無常一切法有無不生分析乃至微塵不可見是不生義非生是名不生無常相若不覺此者墮一切外道生無常義唐譯云不生無常者謂常與無常有無等法如是一切皆無有起乃至分析至於微塵亦無所見以不起故說名無生此是不生無常相若不了此則墮外道生無常義此破第七不生無常也此外道計見彼常無常有無諸法本不生故何者謂分析至於微塵終不可見以不可見故是不生非生也依此不生立無常名是為不生無常相彼立意云若不覺此不生意者則墮餘外道生無常義生異不生非此見故蓋此外道計不生邊論無常義餘外道計生法邊論無常義故不同也前標文謂不生無常入一切法入者謂遍入一切生法見不生也因生見不生相待而立所立自壞按唐譯直徑可解今文非常無常非字稍晦義不通暢蓋謂不生無常非彼常無常有無一切法數何者自體不生故一切法字應置有無字下文始順如唐譯說前性無性者依性立無此不生者依相立無性相雖別破意同前大慧性無常者是自心妄想非常無常性所以者何謂無常自性不壞大慧此是一切性無性無常事除無常無有能令一切法性無性者如杖瓦石破壞諸物唐譯云有物無常者謂於非常非無常處自生分別其義云何彼立無常自不滅壞能壞諸法若無無常壞一切法法終不滅成於無有如杖槌瓦石能壞於物而自不壞此亦如是此破第五性無常也此外道計性無常者佛判云此計是自心妄想非彼常無常等一切法之性也所以下出其無常妄想之意謂此無常自性不壞故豈離一切性外別有一無常性為不壞耶此蓋遍計所執妄想性耳佛又召大慧云此無常者是一切性無性無常之果事耳何者一切性以無常為果故除無常下重出邪計謂除無常自性之外更無有物能令一切性無性者以無常能壞一切性故喻云如杖瓦石能壞諸物而杖等不壞無常亦然此計無常性常法性無常也現見各各不異是性無常事非作所作有差別此是無常此是事作所作無異者一切性常無因性唐譯云大慧現見無常與一切法無有能作所作差別云此是無常此是所作無差別故能作所作應俱是常不見有因能令諸法成於無故此引現見所作證無無常也各各指一切法而言不異謂無能破所破之異然今現前見者是性無常所壞之事而非見能作所作差別相故以無常為能作一切法為所作一切法中不見能作與所作有差別一切法外別無無常性也若以能所可別此是無常此是所作事分明指點許有汝計又若能所無異者則一切性皆常何者汝計無常性常故是知彼計一切法外別有無常性者是無因也大慧一切性無性有因非凡愚所知此承上意釋其無因之疑也蓋此外道計無常能壞一切性故令一切性無性也然則以無常為因矣佛故判云一切性非因無常始無性也其無性者自有正因獨非邪計凡愚所知耳非因不相似事生若生者一切性悉皆無常是不相似事作所作無有別異而悉見有異唐譯云大慧異因不應生於異果若能生者一切異法應並相生彼法此法能生所生應無有別現見有別云何異因生於異果此明常因不能生無常果也非因非字是遣義不相似是異義謂異因不能生異果事即果也必有如是之因而生如是之果因果不相似果則不生此破無常性常法性無常之異計也若生下承上反顯不能生意謂若不相似因能生不相似果者則一切性悉皆無常何以故所作事從因生故常亦無常矣例如虗空能生瓶等可乎虗空是無作因瓶等是有作果無作因豈生有作果無作是常有作是無常若空生瓶等則虗空亦是無常如是推廣一切無作之常悉為有作之無常矣故云一切性悉無常也是不下謂此不相似事既從因生則能作是常所作亦常作所作無異方許能生而世間所見悉有別異何謂能生是知不相似因不能生於不相似果也若性無常者墮作因性相若墮者一切性不究竟唐譯云若無常性是有法者應同所作謂若無常性離一切法外別有體性能破一切法者則墮作因性相若墮有作則自性應滅安知一切性壞與不壞故曰一切性不究竟一切性作因相墮者自無常應無常無常無常故一切性不無常應是常唐譯云自是無常自無常故所無常法皆應是常此牒上文作因相意以明所立不成也謂墮一切性作因相者無常自性應是無常何以故墮作因相故以自性無常故所破一切性不無常應是常何以故謂無常自性既墮作因若為常者則所作一切性雖是作因亦應是常若無常入一切性者應墮三世彼過去色與壞俱未來不生色不生故現在色與壞相俱色者四大積集差別四大及造色自性不壞離異不異故一切外道一切四大不壞一切三有四大及造色在所知有生滅離四大造色一切外道於何所思惟性無常四大不生自性相不壞故唐譯云大慧若無常住諸法中應同諸法墮於三世與過去色同時已滅未來不生現在俱壞一切外道計四大種體性不壞色者即是大種差別大種造色離異不異故其自性亦不壞滅大慧三有之中能造所造莫不皆是生住滅相豈更別有無常之性能生於物而不滅耶按唐譯明顯可解今文破謂若無常入一切法者應墮三世則無常自性亦壞矣安得為常哉色者下出一切外道離識色體謂外計色是四大積集差別能造所造性不壞故能所造性相依有故異不異性離分別故蓋彼一切外道妄計不壞而未得真不壞性由妄見故然此四大在所知心中皆屬生住滅法而此外道何所思惟計有性無常謂四大不生無常自性為不壞也此蓋自心妄想非實有無常自性已上破性無常竟離始造無常者非四大復有異四大各各異相自相故非差別可得彼無差別斯等不更造二方便不作當知是無常唐譯云始造即捨無常者非大種互造大種以各別故非自相造以無異故非復共造以乖離故當知非是始造無常此破第一作已而捨無常也今文離字即捨義此外道計謂四大能造始起造所造已其能造即捨以捨處名無常也此中須識計意其意不離能造所造二相故佛宛轉立三種造相破之謂互造自造共造也非四下破互造也非字即遣義破云若計能所互造者非有四大復造異四大以彼此相為能所乃名互造既無異四大則互造不成出不成所以云能所各各異故以彼此因不相似果則不成也今文各各異相下少一故字故難解耳自相下破自造也破云若計四大能所各以自相造者自相非差別可得造義不成必以二法和合乃名為造既無和合自造不成也彼無下破共造也彼無差別一句是承上起下之辭破云若自相既無別者斯等能所互自性乖離故不更造也更讀平聲更即共義出不共所以云能所互自二方便乖離不相作故三相既不能造則諸能造所造皆空安有始造而捨者是知計始造者妄矣故結云當知始造而捨是無常義唐譯直徑可解今注多從之讀者當以唐譯合看其義自明彼形處壞無常者謂四大及造色不壞至竟不壞大慧竟者分析乃至微塵觀察壞四大及造色形處異見長短不可得非四大四大不壞形處壞現墮在數論唐譯云形狀壞無常者此非能造及所造壞但形狀壞其義云何謂分析色乃至微塵但滅形狀長短等見不滅能造所造色體此見墮在數論之中此破第二形處壞無常也彼計四大能造所造色性不壞但形處壞故云形處壞無常也竟者下竟者承上至竟字謂竟可壞者以形處分析乃至微塵觀察必壞何故以四大及造色性上求其形處異見長短不可得故非四大壞也然則四大不壞形處現壞壞與不壞墮在數論色即無常者謂色即是無常彼則形處無常非四大若四大無常者非俗數言說世俗言說非性者則墮世論見一切性但有言說不見自相生此破第三即色無常也此外道計謂四大造色即是無常以非性故佛判云彼計形處無常者則墮數論非四大性壞形處壞故此計四大色性無常者非性屬世故曰非俗數言說是世俗言說也出其墮世所以云彼見一切性但有言說不見色之生相故轉變無常者謂色異性現非四大如金作莊嚴具轉變現非金性壞但莊嚴具處所壞如是餘性轉變等亦如是此破第四色轉變中間無常也色異性者謂色中間變異之性也前標文云如乳酪等轉變中間不可見蓋謂乳與酪無二禮故色性不壞但以轉變中間不可見處立名無常如人少而壯壯而老少壯轉變必不可見令身自然歸滅故以轉變處為無常也今云如金作莊嚴具金性不壞但嚴具處壞與乳酪同耳一切色性亦復如是如是等種種外道無常見妄想古注云總結外道七種無常火燒四大時自相不燒各各自相相壞者四大造色應斷新說云外道謂火燒四大時而不能燒諸大自相言若能燒者能造所造後應斷滅以見不斷故計大種性常大慧我法起非常非無常所以者何謂外性不決定故唯說三有微心微唐譯作唯佛謂我說諸法從緣所起非常非無常也所以下徵明非常無常所以謂外性虗妄無實體故不決定即不實義外性既妄更依何法論常無常但知三有之法唯心所現世尊恆以此義為衆生說不說種種相有生有滅四大合會差別四大及造色故妄想二種事攝所攝知二種妄想離外性無性二種見承上唯說之意謂佛但說唯心而不說種種相及生滅和合四大造色妄想攝所攝等然知攝所攝二種妄想非實因離外境有性無性二種妄見覺自心現量妄想者思想作行生非不作行離心性無性妄想世間出世間出世間上上一切法非常非無常集注云覺自心現量者謂妄想從思想作行而生非不思想作行既知妄想生處離心分別性有性無妄想善解世間出世間出世間上上一切法非常非無常不覺自心現量墮二邊惡見相續一切外道不覺自妄想此凡夫無有根本謂世間出世間出世間上上從說妄想生非凡愚所覺此不覺自心承上覺自心說謂諸外道不覺自心故墮二邊惡見相續以不覺自心妄想故無有根據妄謂如來所說世出世間三種正法亦從言說妄想生起然此三法是佛如實所說非彼凡愚所能覺知爾時世尊欲重宣此義而說偈言遠離於始造及與形處異性與色無常外道愚妄想頌上七種無常是諸外道愚見妄想諸性無有壞大大自性住外道無常想沒在種種見諸大自性不壞故得安住也外道依此有七無常想然皆沒在種種見中彼諸外道等無若生若滅大大性自常何謂無常想一切唯心量二種心流轉攝受及所攝無有我我所唐譯云彼諸外道衆皆說不生滅諸大性自常誰是無常法能取及所取二種從心現一切唯是心無有我我所一切外道皆依四大立無常名然而大性既常何謂無常而作想耶是故佛說彼諸所計皆出妄想於其法中本無若生若滅法本既妄生滅何有後四句明其妄本也梵天為樹根枝條普周遍如是我所說唯是彼心量如是二字指上二句而言謂諸外道計梵天能造衆生遍於六道樹根喻梵天枝條喻衆生佛說彼等是妄想心量爾時大慧菩薩復白佛言世尊唯願為說一切菩薩聲聞緣覺滅正受次第相續若善於滅正受次第相續相者我及餘菩薩終不妄捨滅正受樂門不墮一切聲聞緣覺外道愚癡大慧問意從前世出世間三法中來以請三乘所得正受通相蓋又欲知次第真妄故也滅正受是九次第定最上頂法言次第相續者按下答文指菩薩地中次第相續非謂世間九次第定也今問中以滅正受兼諸地次第請者意謂滅定通三乘故若善下大慧自敘所問之益佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言世尊惟願為說佛告大慧六地菩薩摩訶薩及聲聞緣覺入滅正受成唯識第七云有從初地即能永伏一切煩惱如阿羅漢彼十地中皆起此定又引塢陀夷經說菩薩前六地中亦能現起滅盡定故又天台四教儀云通教菩薩正使斷盡與二乘同又別教中云有處說初地斷見從二地至六地斷思與羅漢齊然則斷惑既齊證果必入此耳第七地菩薩摩訶薩念念正受離一切性自性相正受非聲聞緣覺諸聲聞緣覺墮有行覺攝所攝相滅正受是故七地非念正受魏譯云大慧諸菩薩摩訶薩於七地中念念入滅盡定以諸菩薩悉能遠離一切諸法有無相故大慧聲聞辟支佛不能念念入滅盡定墮在可取能取境界上文六地未離有作故所證與二乘同今七地極盡有作邊際雖未入無功用位於有作中為最勝矣故華嚴云七地菩薩如轉輪王雖未入天位於人中最勝也今言念念正受者是無相之念非如二乘有行覺念故云離一切性自性相也以二乘有行覺故墮攝所攝故七地非念正受者謂非二乘有念正受也得一切法無差別相非分得種種相性覺一切法善不善性相正受是故七地無善念正受唐譯云二乘有作墮能取所取不得諸法無差別相了善不善自相共相入於滅定是故不能念念恆入得一切法無差別相非分者按唐譯謂二乘不得無差別相今云非分謂二乘非分也得種下謂二乘得種種相覺善不善相是有善不善念正受今七地善惡都捐故云無善念正受大慧八地菩薩及聲聞緣覺心意意識妄想相滅謂八地菩薩不唯三界心滅於二乘心意識亦滅矣是故前文七地但云攝所攝相滅而未及二乘心意識今登八地更能超脫初地乃至七地菩薩摩訶薩觀三界心意意識量離我我所自妄想修墮外性種種相愚夫二種自心攝所攝向無知不覺無始過惡虗僞習氣所熏謂初地至七地能觀三界心量相滅故得離我我所也餘諸外道愚夫依自妄想修習墮外性相背般若向無知皆由不覺無始過惡習氣所熏故耳大慧八地菩薩摩訶薩聲聞緣覺涅槃菩薩者三昧覺所持是故三昧門樂不般涅槃若不持者如來地不滿足棄捨一切為衆生事佛種則斷唐譯云大慧八地菩薩所得三昧同諸聲聞緣覺涅槃以諸佛力所加特故於三昧門不入涅槃若不持者便不化度一切衆生不能滿足如來之地亦則斷絶如來種性三乘得失如文可解因知八地雖與二乘同證而度生願力二乘所不及也覺所持覺字是菩薩大智願力苟無此覺則墮二乘大小優劣天壤若此諸佛世尊為示如來不可思議無量功德聲聞緣覺三昧門得樂所牽故作涅槃想唐譯云是故諸佛為說如來不可思議諸大功德令其究竟不入涅槃聲聞緣覺著三昧樂是故於中生涅槃想承上文意以明菩薩功深二乘智淺大慧我分部七地善修心意意識相善修我我所攝受人法無我生滅自共相善四無礙決定力三昧門地次第相續入道品法分部言佛所說十二分部諸經也我佛經中說七地菩薩善修心意識相善修我我所二種無我及生滅五陰自共相善修四無礙智得決定力於諸三昧次第相續證入諸地深明三十七種菩提分法此蓋總明七地善修得果之相也不令菩薩摩訶薩不覺自共相不善七地墮外道邪徑故立地次第此承上文以明建立諸地之端也言如來分部中令諸菩薩善知七地行相及覺自共等法不令不覺不善墮於外道有無邪徑是故諸地之相所由立也大慧彼實無有若生若滅除自心現量承上立地之意以明方便權施非實有也意謂為令菩薩善修習故建立如是於如實理中本無地相起滅若了唯心不妨建立故云除自心現量若執實有便成外見所謂地次第相續及三界種種行愚夫所不覺愚夫所不覺者謂我及諸佛說地次第相續及說三界種種行楊彥國纂云世尊及諸佛以對治衆生病故說有諸地次第及三界種種行相愚夫不覺而有執著殊不知佛所說法未嘗說也復次大慧聲聞緣覺第八菩薩地滅三昧門樂醉所醉不善自心現量自共相習氣所障墮人法無我法攝受見妄想涅槃想非寂滅智慧覺謂二乘與八地菩薩同證滅三昧門樂二乘為樂所醉不善自心為自共習氣所障及無我法執不忘妄想見有涅槃之想此是二乘灰斷之愚非菩薩寂滅之智大慧菩薩者見滅三昧門樂本願哀愍大悲成就知分別十無盡句不妄想涅槃想彼已涅槃妄想不生故離攝所攝妄想覺了自心現量一切諸法妄想不生不墮心意意識外性自性相計著妄想非佛法因不生隨智慧生得如來自覺地集注云八地菩薩雖見滅三昧門樂為本願哀愍大悲成就滿十大願度脫衆生不起妄想涅槃之想彼已於涅槃妄想不生故離攝所攝妄想則能覺了自心現量等非佛法正因不生唯隨智慧而生如是故得入如來自覺地也如人夢中方便度水未度而覺覺已思惟為正為邪非正非邪餘無始見聞覺識因想種種習氣種種形處墮有無想心意意識夢現唐譯云如人夢中方便度河未度便覺覺已思惟向之所見為是真實為是虗妄覆自念言非實非妄如是但是見聞覺知曾所更事分別習氣離有無念意識夢中之所現耳華嚴八地經云譬如有人夢中見人墮在大河為欲度故發大勇猛施大方便以大勇猛施方便故即便覺寤既覺寤已所作皆息菩薩亦爾見衆生身在四流中為救度故發大勇猛起大精進以勇猛精進故至此不動地既至此已一切功用靡不皆息二行相行悉不現前與今經同餘無下如唐譯可解下文法合大慧如是菩薩摩訶薩於第八菩薩地見妄想生從初地轉進至第七地見一切法如幻等方便度攝所攝心妄想行已作佛法方便未得者令得魏譯云大慧菩薩亦復如是於八地中見分別心初地七地諸法同相如夢如幻平等無差離諸功用可取能取分別之心見心心數法為於未得上上佛法修行者令得故謂第八地菩薩見前初地至七地種種行相皆妄想生及見一切法如幻夢等以無作方便度脫攝所攝心及諸妄想心數行已更起無作之作成上上佛法方便善巧度生乃至第七地未得此法者咸令得之此合前喻故魏譯有亦復如是之句今文如是二字即是合語大慧此是菩薩涅槃方便不壞離心意意識得無生法忍此結上文以明八地涅槃為深二乘涅槃為淺也集注云見法如幻等已即證無功用行是名菩薩所得涅槃不壞方便之相故能離心意意識得無生法忍大慧於第一義無次第相續說無所有妄想寂滅法新說云第一義中言思路絶唯自覺智所證相應不得說有十地對治次第相續相此則強名寂滅法也爾時世尊欲重宣此義而說偈言心量無所有此住及佛地去來及現在三世諸佛說心量地第七無所有第八二地名為住佛地名最勝二地指上第七第八二地也以第七名有心住第八名無所有二俱名住耳新說云住亦地也言七地以還總名心量未滅八地已上無所有十地已去方言佛也自覺智及淨此則是我地自在最勝處清淨妙莊嚴照曜如盛火光明悉遍至熾𦦨不壞目此明如來自證之地光明遍照勝自在處下地莫及古注云如毒龍放光即損人目如來放光不損人目周輪化三有化現在三有或有先時化於彼演說乘皆是如來地此明說法度生之儀也先時對上現在說謂佛或於先時於彼說漸於此說頓或於現在於此說漸於彼說頓隨方演說權實不同即天台所謂祕密不定之教也此皆如來地中自證利他之相十地則為初初則為八地第九則為七七亦復為八第二為第三第四為第五第三為第六無所有何次此頌第一義中無次第相續之說也新說云如來方便隨情說法即有諸乘第一義中何有次第故思益經云得諸法正性者不從一地至於一地是知以實映權方便相盡皆無所有爾時大慧菩薩復白佛言世尊如來應供等正覺為常為無常如來常無常義前三佛陀章中已明今復問者蓋大慧因諸外道計常者非一種或計作者常或計虗空常或計無生常如是等常俱有過故因發此問意欲如來顯示其過令諸未來行者不墮其計是故不與前章同也佛告大慧如來應供等正覺非常非無常謂二俱有過若常者有作主過常者一切外道說作者無所作是故如來常非常非作常有過故楊彥國纂云如來之常非無因而常亦非作主而常常與作常皆不免有過故若如來無常者有作無常過陰所相相無性陰壞則應斷而如來不斷集注云言無常者則同世間有為有作無常等過五陰能相所相無性若陰實壞如來法身亦應斷不斷故不同作者無常大慧一切所作皆無常如瓶衣等一切皆無常過一切智衆具方便應無義以所作故一切所作皆應是如來無差別因性故是故大慧如來非常非無常新說云若言如來是無常即同瓶衣一切作法無常過也所修正因福慧莊嚴皆空無益然佛如來功流萬世而常存道通百劫而彌固又一切世間有所作法皆應是如來以同是作因生故而言如來是常無常者有如上過復次大慧如來非如虗空常如虗空常者自覺聖智衆具無義過謂太虗無作亦稱為常而如來非太虗之常何以故太虗是斷無義自覺聖智具一切功德衆具故大慧譬如虗空非常非無常離常無常一異俱不俱常無常過故不可說是故如來非常上文明如來非如虗空之常今文復以虗空顯離諸過虗空若爾如來亦然故以虗空譬如來也集注云前云非如虗空常者謂具聖智故此云如虗空者謂如虗空之性無所變動非常非無常離常無常不墮一異俱不俱等一切諸過故不可說常無常也復次大慧若如來無生常者如兔馬等角以無生常過故方便無義以無生常過故如來非常集注云若言如來是無生常者則如兔馬等角本來不生若同兔馬等角言常則無方便廣大益物之義以無生常有過故是故如來不同無生常也復次大慧更有餘事知如來常所以者何謂無間所得智常故如來常前文既遣虗空無生等常離諸過故然如來更有無過之常從自覺無間法中所得智常是如來所證真常故常大慧若如來出世若不出世法畢定住聲聞緣覺諸佛如來無間住不住虗空亦非愚夫之所覺知唐譯云大慧諸佛如來所證法性法住法位如來出世若不出世常住不易在於一切二乘外道所得法中非是虗空然非凡愚之所能知無間住者謂如來住持中道融通一切與一切法無間然故不住虗空者謂二乘厭有著空則住於空以如來無間故不住於空也如來之妙不可思議豈凡愚所能測知大慧如來所得智是般若所熏大慧如來非心意意識彼諸陰界入處所熏言如來之智是般若所熏非心意識也彼心意識者由陰界入處妄習所熏故非智也大慧一切三有皆是不實妄想所生如來不從不實虗妄想生以二法故有常無常非不二不二者寂靜一切法無二生相故謂三有之法皆是不實妄想所生如來不從妄想生也然諸衆生執一切法有二相故起常無常見非不二也能觀諸法不二相者則內心寂靜諸見不生諸見不生者了一切法無二生相故是故如來應供等正覺非常非無常結答前問大慧乃至言說分別生則有常無常過分別覺滅者則離愚夫常無常見不寂靜集注云分別覺覺想也覺想滅則離常無常不寂靜也慧者永離常無常非常無常熏謂具實慧者則永離常無常見其所修行與般若相應非為常無常異見所熏爾時世尊欲重宣此義而說偈言衆具無義者生常無常過若無分別覺永離常無常此頌虗空無生常有過也若以如來例二常則如來方便衆具悉成無義遂有常無常過若無一切分別覺者則永離常無常見從其所立宗則有衆雜義等觀自心量言說不可得從諸外道所立宗者則有一切衆雜之義若以平等觀察彼之雜義是自心現量一切唯有言說求其實義悉不可得
