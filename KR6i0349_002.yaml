body:
  text: 劉宋天竺沙門求那䟦陀羅譯皇明吳興後學沙門廣莫參訂夏官大夫擕李袁黃閱正一切佛語心品第一之一爾時大慧菩薩摩訶薩知大菩薩眾心之所念名聖智事分別自性經承一切佛威神之力而白佛言世尊惟願為說聖智事分別自性經百八句分別所依前經所顯是聖智所破是業識業識敵體與聖智非異不異故乃依聖智分別名聖智事也諸菩薩念言前百八義中八識雖明而未知何名自性等法作念希欲如來說此自性經義大慧具他心智知其所念代請世尊而說是經也承佛力而發請者意明此經深妙自力不堪必承佛力始發起故百八句分別所依者謂百八句是能依聖智是所依離聖智無別有法諸法依聖智而得起故故云百八所依也今文自性即三自性遙應後文故如來應供等正覺依此分別說菩薩摩訶薩入自共相妄想自性依此者此指聖智也自共相者新說云五陰不同名自相共成人身名共相界處亦爾乃至一切諸法各各自有自相共相也五陰是妄想自性法華玄義云五陰是實法人身是假名人身由五陰共成故葢自相為實共相為假以分別說妄想自性故則能善知周徧觀察人法無我淨除妄想照明諸地超越一切聲聞緣覺及諸外道諸禪定樂謂因說妄想自性故能令行者得信解行證之位超越二乘及外道諸定也則能下屬解知即解故周徧觀察是能觀智人法無我是所觀境解由信起故兼信言淨除妄想屬行照明諸地屬證超越下可知觀察如來不可思議所行境界畢定捨離五法自性諸佛如來法身智慧善自莊嚴起幻境界昇一切佛剎兜率天宮乃至色究竟天宮逮得如來常住法身謂由觀察如來不思議境故乃能畢定捨離五法三自性等也諸佛下謂以佛智自嚴也起幻下謂此菩薩登歡喜地已如華嚴所謂現諸天王身脩法界行說究竟法上上地昇進寄位天身自下而上逮得如來法身故云昇兜率乃至色究竟也梵語兜率譯云知足已上三節是大慧自敘所請之益也佛告大慧有一種外道作無所有妄想計著覺知因盡兔無角想如兔無角一切法亦復如是覺知因盡兔無角想唐譯作一切法隨因而盡生分別解覺知因盡者覺知計度義因盡諸法本因無也謂此外道計度諸法本無其因故作兔無角想兔無角是喻諸法無所有是法言諸法本無徒得法名如兔無角空標角想此是計無外道也大慧復有餘外道見種求那極微陀羅標形處橫法各各差別見已計著兔無角橫法作牛有角想求那陀羅驃輔行云梵語優樓僧佉譯云鵂鶹仙其人晝藏山谷以造經書夜則遊行說法教化猶如彼鳥故得此名說論有十萬偈名衛世師此云無勝以六諦為宗一陀羅驃諦此云主諦謂五大及時方神意此九為萬物所依故名為主二者求那此云依諦謂色等五塵一異離合數量好醜愚智愛憎苦樂勤惰此二十一種依前九法故名依諦餘繁不錄今云種者即四大種也極微對種字看謂大種麤質依極微為主諦也言此外道橫計麤細塵質形處之法各各差別見差別已乃因兔角之無而計牛角之有蓋此外道計大種求那終成斷滅故作兔無角想極微主諦常住不滅故作牛有角想因無待有有無之法皆橫計也故雙標橫法之言此是計有外道也大慧彼墮二見不解心量自心境界妄想增長身受用建立妄想根量唐譯云大慧彼墮二見不了唯心但於自心增長分別大慧身及資生器世間等一切皆唯分別所見二見指上有無二外道見也妄想根量言妄想六根及諸心量此結上文兩節之意餘如唐譯可解大慧一切法性亦復如是離有無不應作想此因有無以例一切皆是妄想根量故云亦復如是離有下警謂諸法本離有無於離有無處不應作想大慧若復離有無而作兔無角想是名邪想彼因待觀故兔無角不應作想乃至微塵分別自性悉不可得此承上文之意以明離有無處不可作無想也謂離有無處若又作兔無角想者是名邪想何者謂離有無處靈鑒虗涵難容擬議若作無想非邪而何彼因下出相待之因也謂離有無處所作無想因離而有故此無想不應成立何者此離有無處所作兔無角想乃至微細分別求其自性不可得故大慧聖境界離不應作牛有角想上於離有無處無想既破世尊恐彼轉謂既非無想還成有見故此防云聖境界處四句百非一切悉離於此不應重起牛有角想爾時大慧菩薩摩訶薩白佛言世尊得無妄想者見不生想已隨比思量觀察不生妄想言無耶前文世尊疊破有無離有無處計著大慧因重問云有諸眾生聞前義已於有無離有無處得無妄想者其或見不生想已隨於不生想處比度思量觀察不生妄想重計言無否佛告大慧非觀察不生妄想言無所以者何妄想者因彼生故非觀下世尊答謂非觀不生妄想處言無也所以下徵明妄想相待之因謂不生妄想因彼有無角上生故依彼角生妄想以依角生妄想是故言依因故離異不異故非觀察不生妄想言無角此重躡前例以破不生之無也謂依有無之角生於妄想則有無為妄想所依是故言依因也想依角有則彼此非實以彼此非實故離異不異相是故非觀不生妄想更言無角大慧若復妄想異角者則不因角生若不異者則因彼故乃至微塵分析推求悉不可得不異角故彼亦非性二俱無性者何法何故而言無耶此釋上文離異不異之言以明妄想有無二俱非性也妄想指依有無所生者角指有無也異角者可知若不下謂妄想若不異角者則無能因所因今因彼所生若非不異乃至下微塵言微細也謂以妄想微細推求悉不可得以妄想不異角故妄想亦非性也能因所因二俱無性更有何法汝何故於此而言無耶大慧若無故無角觀有故言兔無角者不應作想大慧不正因故而說有無二俱不成無故無角指計無見者而言也觀有故言兔無角指計有見者而言也謂見此有故因知彼無故云觀有故言兔無角也佛誡此二見者不應作想不正下出上二見之過謂有無二見非正因故二俱不成也大慧復有餘外道見計著色空事形處橫法不能善知虗空分齊言色離虗空起分齊見妄想唐譯云復有餘外道見色形狀虗空分齊而生執著言色異虗空起於分別此外道見色空處差別事法橫計為實而不善知色空無二言色離空別有實法因起色空分齊見妄想然其但知色空離義未解色空即義又安知其不即不離之義乎下文顯者此也大慧虗空是色隨入色種大慧色是虗空持所持處所建立性色空事分別當知彼執色空離義佛今約即義而破即義尚破況其離乎蓋顯不即不離以明中道也謂若空是色者虗空隨入色種空無本位未有見色而不見空者則虗空是色非矣又若色是空者能持所持建立宛然色有定名未有見空而不見色者則色是虗空非矣當知色空二事本體元妄不即不離分齊安在具正眼者當如是分別大慧四大種生時自相各別亦不住虗空非彼無虗空不壞相故不住虗空相無實故非彼無空不住虗空意明不即也非彼無空意明不離也不即不離是中道故如是大慧觀牛有角故兔無角大慧又牛角者析為微塵又分別微塵剎那不住此言外道因色之有計虛空之無故云觀牛有角故兔無角然彼牛角析至微塵有不可得又析微塵剎那不住色何從有以此而知色即空也空即色也色空二法全體虗妄故下偈云色等及心無此之謂也彼何所觀故而言無耶若言觀餘物者彼法亦然謂牛角之有非實有既非實無亦是妄更何所觀而言兔角是無耶若言下例餘物也餘物者指一切時事因果等法亦如此破故云彼法亦然蓋言一切皆妄也爾時世尊告大慧菩薩摩訶薩言當離兔角牛角虗空形色異見妄想汝等諸菩薩摩訶薩當思惟自心現妄想隨入為一切剎土最勝子以自心現方便而教授之此總結前文以勸行者當離有無形處及色空異見之想也汝等下勉諸菩薩當觀自心復以自心教授於人爾時世尊欲重宣此義而說偈言色等及心無色等長養心身受用安立識藏現眾生心意及與識自性法有五無我二種淨廣說者所說初句心字即長行有無色空等妄想也初句順顯色心無性次句逆顯外道不悟色等無性而反依色等長養妄心也身受用至二無我述前法數之名淨之一字通上諸數謂能知色等無性則異見心滅異見心滅則諸數清淨也廣說者佛自稱也佛能廣說三乘故又屬集家語下同此長短有無等展轉互相生以無故成有以有故成無微塵分別事不起色妄想心量安立處惡見所不樂長短即形處差別也有無即色空牛兔之角也展轉下謂由色顯空因無明有故云無成有有成無也微塵分別者頌析至微塵剎那不住之義以分別色性無故不起色妄想也心量下二句謂有無色空等見皆由自心現量安立而諸外道各執己見迷而不覺故於自心安立之處所不樂也覺想非境界聲聞亦復然救世之所說自覺之境界覺想指外道也執諸惡覺妄想故救世佛自稱也此四句結前偈意謂諸數清淨唯心境界非外道聲聞所知即此唯心是佛自覺境界故爾時大慧菩薩為淨除自心現流故復請如來白佛言世尊云何淨除一切眾生自心現流為頓為漸耶大慧悟前有無異見妄想皆是自心現行流注獨未知此流為頓除耶為漸除耶故發此問下文答意謂所淨現流則漸所顯不思議智則頓如首楞云理雖頓悟乘悟氷消事須漸除因次第盡義也佛告大慧漸淨非頓如菴羅果漸熟非頓如來淨除一切眾生自心現流亦復如是漸淨非頓譬如陶家造作諸器漸成非順如來淨除一切眾生自心現流亦復如是漸淨非頓譬如大地漸生萬物非頓生也如來淨除一切眾生自心現流亦復如是漸淨非頓譬如人學音樂書畫種種技術漸成非頓如來淨除一切眾生自心現流亦復如是漸淨非頓上四喻明所淨現流須漸如文菴羅或云菴羅婆利譯云難分別其果似桃非桃似奈非奈大經云如菴羅果生熟難分別故華嚴第四鈔以此四漸喻如次配十信十住十行十迴向謂此四漸約脩行未證理者說也譬如明鏡頓現一切無相色像鏡現無相像者謂鏡之光也鏡光本無相故非謂所照之像無相也喻如來自心智光亦無相故如來淨除一切眾生自心現流亦復如是頓現無相無有所有清淨境界如日月輪頓照顯示一切色像如來為離自心現習氣過患眾生亦復如是頓為顯示不思議智最勝境界一切眾生因迷故即自心不思議智體翻為識情流注若能悟本自心無如是虛妄起滅即識情流注轉為不思議智矣悲夫迷悟之關係非輕也譬如藏識頓分別知自心現及身安立受用境界彼諸依佛亦復如是頓熟眾生所處境界以修行者安處於彼色究竟天依佛魏唐二譯作報佛以報為依者謂依法佛起故又依因所起故此中藏識喻佛頓知自心現喻頓熟眾生安立受用境界喻安處於彼色究天安處色究竟天義出成唯識見前註譬如法佛所作依佛光明照耀自覺聖趣亦復如是彼於法相有性無性惡見妄想照令除滅此中復以依佛光明為喻藉顯自覺聖趣光明破諸惡覺亦如佛光徧照也佛光指身光非謂智光此上四喻明所顯不思議智頓義如文頓漸八喻配法可知鈔云此之四頓約已證理者說也初明鏡喻喻初地至七地二日月喻喻八地已上三藏識喻喻報佛四佛光喻喻法報謂前喻報成此喻頓照又云上四漸四頓多依地位古今同為此釋然今疏意但順消文不委他配若從玄解當如鈔說故錄之以備尋討大慧法依佛說一切法入自相共相自心現習氣因相續妄想自性計著因種種不實如幻種種計著不可得法依佛魏譯作法佛報佛唐譯作法性所流佛法依即法性所流言化佛也一切法入自共相等者謂一切法不離自共種子現行二因故蓋自共等法皆以自心所現習種及現行相續計著展轉為因所起此法不實如幻妄有種種計著即此計著亦不可得化佛所說不外乎此復次大慧計著緣起自性生妄想自性相大慧如工幻師依草木瓦石作種種幻起一切眾生若干形色起種種妄想彼諸妄想亦無真實妄想緣起二者緣起即三性中依他起也謂自無實體從緣所起故妄想即徧計所執也謂周徧計度執為實有故攝大乘論云是依他起遍計心等所緣緣故是知依他屬所緣徧計屬能緣今文計著緣起生妄想者謂依所緣境生能緣心也成唯識第八云遍計所執其相云何與依他起復有何別有義三界心及心所由無始來虗妄熏習雖各體一而似二生謂見相分即能所取如是二分情有理無此相說為遍計所執二所依體實託緣生此性非無名依他起虗妄分別緣所生故云何知然諸聖教說虗妄分別是依他起二取名為遍計所執又慈恩云三性中依他起必是所緣有法徧計心等以此為緣親相分者必依他故如工下舉喻顯妄合法應云幻師喻妄心也依草下喻緣起性也謂依他草木幻作眾生若干形色形色非真從緣起故起種下喻徧計性也謂由緣起生妄想自性彼諸妄想亦無真實如是大慧依緣起自性起妄想自性種種妄想心種種相行事妄想相計著習氣妄想大慧是為妄想自性相生大慧是名依佛說法唐譯云此亦如是由取著境界習氣力故於緣起性中有妄計性種種相現是名妄計性生大慧是名法性所流佛說法相此言依緣起而生徧計以明徧計有種種相也種種妄想心者唯識云由彼彼徧計徧計種種物品類眾多說為彼彼彼彼即今種種也行事妄想相者謂行陰妄遷之相下文云行顯現事相是也然此妄想心相是計著習氣所現之妄想耳是為下結妄想自性生相是名下結前法依佛所說之義如此大慧法佛者離心自性相自覺聖所緣境界建立施作離心自性相者心謂八識也性謂八識之自性也相謂八識轉現之相也法佛所說之法離此性相而建立施作自覺聖智所緣境界故大慧化佛者說施戒忍精進禪定及心智慧離陰界入解脫識相分別觀察建立超外道見無色見說之一字貫下諸句謂說六度說離陰界入法等也觀察下可知大慧又法佛者離攀緣攀緣離一切所作根量相滅非諸凡夫聲聞緣覺外道計著我相所著境界自覺聖究竟差別相建立此明前文法佛所說未盡之意故加又字也謂法佛所說離諸乘緣以攀緣離故三乘一乘根量相滅三一根量滅處非二乘外道著我相者境界然此三一緣滅則自覺究竟無建立而建立也是故大慧自覺聖差別相當勤修學自心現見應當除滅此結上文法佛所說之意勉諸當學復結依佛所說自心現見勉令除滅復次大慧有二種聲聞乘通分別相謂得自覺聖差別相及性妄想自性計著相通分別相者謂二種同名聲聞故云通所修異故乃有分別此標名下釋義云何得自覺聖差別相聲聞謂無常苦空無我境界真諦離欲寂滅息陰界入自共相外不壞相如實知心得寂止心寂止已禪定解脫三昧道果正受解脫不離習氣不思議變易死得自覺聖樂聲聞是名得自覺聖差別相聲聞此先釋聖智聲聞之義也無常苦空無我境界是二乘所修四念處之法一觀身不淨二觀受是苦三觀心無常四觀法無我今文易不淨為空者蓋不淨在因空自屬果何者以四大本空故也詳如法界次第中說真諦離欲寂滅者謂離世欲繁動得真諦寂滅故能息陰界入自共相也外不壞相如實知者外指自共相之外也自共之相剎那不住故壞世相之外湛然空寂以空寂故不壞也此聲聞如實知不壞境界故心得寂止心寂止故諸禪解脫悉皆現前由所知未破不離變易死也不想議變易死者成唯識云謂諸無漏有分別業由所知障緣助勢力所感殊勝細異熟果由悲願力改轉身命無定劑限故名變易無漏定願正所資感妙用難測名不思議也得自覺樂住者謂此聲聞住寂滅樂無度生心故是名下結前大慧得自覺聖差別樂住菩薩摩訶薩非滅門樂正受樂顧憫眾生及本願不作證大慧是名聲聞得自覺聖差別相樂菩薩摩訶薩於彼得自覺聖差別相樂不應修學此菩薩所得樂者是大悲自覺之樂簡非聲聞滅門之樂及彼空相應正受之樂也集註云前之是名等結得差別相之聲聞此之是名等結聲聞得差別相之樂誡諸菩薩於此樂中不應修學以彼聲聞所得之樂非究竟故大慧云何性妄想自性計著相聲聞所謂大種青黃赤白堅濕煖動非作生自相共相先勝善說見已於彼起自性妄想性妄想性字據結文云見已於彼起自性妄想則此性字是定中所觀色性為性妄想也此聲聞計著小乘觀法世尊以大抑小故責云性妄想自性計著相也所謂下出其觀相言大種青黃等者即彼聲聞能觀十一切處以定中觀此青黃等故十一切處者法界次第初門云一青一切處二黃一切處三赤一切處四白一切處五地一切處六水一切處七火一切處八風一切處九空一切處十識一切處皆言一切處者謂一一觀徧十方故堅等即四大之性也非作生自共相者謂不由造作而生由觀想得故此先佛所說依之而修也定中見此相已於彼即起自性妄想此二種聲聞前是得果住者此是觀成就者菩薩摩訶薩於彼應知應捨隨入法無我想滅人無我相見漸次諸地相續建立集註云菩薩於自性妄想應知應捨了我法空漸入諸地到如來境是名諸聲聞性妄想自性計著相此結第二聲聞所修之名也凡聲聞所修類不出此故加諸言爾時大慧菩薩摩訶薩白佛言世尊世尊所說常不思議自覺聖趣境界及第一義境界世尊非諸外道所說常不思議因緣耶大慧因聞自覺常不思議境界故引外道所見常不思議難同異也自覺聖趣三乘其有第一義境如來自到故問分為二佛告大慧非諸外道因緣得常不思議世尊告以常因非同外道所見也集註云如來所說常不思議以自覺聖相為相第一義智因為因外道所說常不思議計神我為因以無常為常故言非也所以者何諸外道常不思議不因自相成此徵外道常因有過也不因自相成者謂彼別有作者異因為因故也若常不思議不因自相成者何因顯現常不思議此辨不因自相而依異因不得為常也復次大慧不思議若因自相成者彼則應常此世尊以正顯邪也由作者因相故常不思議不成出彼異相結不成常大慧我第一義常不思議第一義因相成離性非性得自覺相故有相第一義智因故有因離性非性故依第一義為因相者有無性離譬如無作虗空涅槃滅盡故常古註云如三無為法離有無相故常以譬第一義因相離有無故常如是大慧不同外道常不思議論結前問語如是大慧此常不思議諸如來自覺聖智所得如是故常不思議自覺聖智所得應當修學此常下明如來所得由自覺故常如是故下以如來之常誡令脩學復次大慧外道常不思議無常性異相因故非自作因相力故常此重明外所計常是無常性異因成故非自下謂外道常依異因故非自作因相之力而橫計為常則計常者妄也復次大慧諸外道常不思議於所作性非性無常見已思量計常此出外道計常之由也所作性非性者謂見彼色等諸法由所作故性即非性見無常已妄自思量計作者以為常耳如首楞云見遷流處名無常性見相續處名之為常以作者能相續故大慧我亦以如是因緣所作者性非性無常見已自覺聖境界說彼常無因如來就彼所計而破也謂計所作無常似是思量常處實非計異因為常故然如來亦以所作為無常見無常已則知所作如幻而悟真常真常即自覺境界彼計所作無常常由作者故說彼常無因大慧若復諸外道因相成常不思議因自相性非性同於兔角此常不思議但言說妄想此顯外道因相不成常也推其因之自相性非性故同於兔角空得因名則彼常不思議但言說妄想耳諸外道輩有如是過所以者何謂但言說妄想同於兔角自因相非分此牒明外過以顯如來自因非其分也大慧我常不思議因自覺得相故離所作性非性故常非外性非性無常思量計常此重明如來真常因自覺得相離性非性過非如外道計外性非性無常思量橫計為常也大慧若復外性非性無常思量計常不思議常而彼不知常不思議自因之相去得自覺聖智境界相遠彼不應說此明外道但知分別無常思量計常不知所計常因非自因相故去自覺之因遠矣由是彼不應說常復次大慧諸聲聞畏生死妄想苦而求涅槃不知生死涅槃差別一切性妄想非性此因外道帶破聲聞也謂諸聲聞但知畏生死苦求涅槃樂而不知生死涅槃猶如昨夢二俱非性也未來諸根境界休息作涅槃想非自覺聖智趣藏識轉唐譯云妄計未來諸根境滅以為涅槃不知證自智境界轉所依藏識為大涅槃此明聲聞但滅根境作涅槃想然非自覺聖智藏識轉依之大涅槃也是故凡愚說有三乘說心量趣無所有是故大慧彼不知過去未來現在諸如來自心現境界計著外心現境界生死輪常轉初是故下結前凡小所執也謂彼不達權實執有三乘而說心量趣無所有為其極也次是故下明其不知如來自心境界計著心外現境故為生死所轉復次大慧一切法不生是過去未來現在諸如來所說所以者何謂自心現性非性離有非有生故一切法即有無諸法也有無俱妄本不生故三世如來所說同也所以下徵釋不生所以謂有無之法皆自心現有無生相悉遠離故大慧一切性不生一切法如兔馬等角愚癡凡夫不覺妄想自性妄想故一切性即有無性也一切法即有無性之質也謂一切性不生則一切法如兔馬等角非實有也蓋言性既不生法亦叵得而諸凡愚妄想不實計有一切性生此特妄想所計耳大慧一切法不生自覺聖智趣境界者一切性自性相不生非彼愚夫妄想二境界自性身財建立趣自性相魏譯云大慧一切諸法自體相不生是內身證聖智境界故非諸凡夫自體分別二境界大慧是阿黎耶識身資生器世間去來自體相故一切法不生是自覺聖智趣境界也此一切性相不生境界非彼愚夫有無生滅二境界故彼愚夫有無生滅二境界者是八識自性身財建立所趣識自性相故大慧藏識攝所攝相轉愚夫墮生住滅二見希望一切性生有非有妄想生非贒聖也大慧於彼應當修學此承上文識性身財建立之意以明愚夫二見從是而生也謂愚夫因藏識能攝所攝相轉乃有生住滅相三見然而性本不生凡愚妄執一切性生有非有想紛然亂起此是凡愚妄計非聖賢有是故勉諸當學復次大慧有五無間種性五無間種性魏譯作五種乘性證法此文生起由前自覺境界各計不同故今標明有五性差別此標數下列名集註云無間者謂佛及眾生同一法性初無有間以機緣有異故分為五宗鏡云種性者相似曰種體同曰性云何為五謂聲聞乘無間種性緣覺乘無間種性如來乘無間種性不定種性各別種性此列名下釋義云何知聲聞乘無間種性若聞說得陰界入自共相斷知時舉身毛孔熈怡欣悅及樂修相智不脩緣起發悟之相是名聲聞乘無間種性斷知時者謂小乘人初聞三轉法輪自稱已知已斷之時也因聞四諦初得解名故舉身欣悅也樂修相智者天台以見思為取相惑今言相智者是破相惑之智也聲聞智有八種一苦法智二苦類智三集法智四集類智五滅法智六滅類智七道法智八道類智詳如天台四教儀集註中說不修緣起發悟之相者緣起即十二緣起也發悟謂緣覺乘人觀十二緣起發悟無生之理今聲聞但修四諦不觀緣起故云不修也聲聞無間見第八地起煩惱斷習氣煩惱不斷不度不思議變易死度分段死正師子吼我生已盡梵行已立不受後有如實知修習人無我乃至得般涅槃覺見第八地者謂無所有境三乘同證但所見有異故分大小耳第四經云八地菩薩及聲聞緣覺心意意識妄想相滅此三乘斷惑處同矣又云八地菩薩聲聞緣覺涅槃此三乘所證處同矣是則聲聞豈通菩薩八地乎此必有旨非相濫也天台四教義約通教明三乘共位有十一乾慧地二性地三八人地四見地五薄地六離欲地七已辦地八辟支佛地九菩薩地十佛地菩薩從乾慧至菩薩地皆行皆學而不取證佛地亦學亦證故言三乘通位又用別教別位名別而義通者配上通教十地十信即乾慧地三十心即性地通八人地見地即別初歡喜地薄地向果向即離垢果即發光阿那含向果向即燄慧果即難勝阿羅漢向果向即現前果即遠行辟支佛地即第八不動地菩薩地即善慧佛地即法雲此用別教位名辨通教位也今文見第八地者即是見通教第八辟支佛地也聲聞未侵習氣望辟支佛尚劣故但云見又通教第八辟支佛地與別教第八不動地斷惑見諦同然則此經意屬通教乎起煩惱斷習氣煩惱不斷者起即正使動故名起乃現行斷也不能侵習故不斷也變易死解見前文分段死者成唯識云謂諸有漏善不善業由煩惱障緣助勢力所感三界麤異熟果身命長短隨因緣力有定劑限故名分段也正師下四句師子吼表無畏說謂聲聞人已度生死證得涅槃故於大眾中能無畏說也我生下三句是無畏說義涅槃經云羅漢有四智謂我生已盡梵行已立所作已辦不受後有今文闕第三句魏唐二譯四句全此必譯場誤略也我生已盡者大明法數云謂阿羅漢斷見思惑盡更不受三界生死故梵行已立者謂阿羅漢由戒定慧行成就得此果故所作已辦者謂阿羅漢本求出離三界修諸梵行生死既盡梵行既立所作辦故不受後有者謂阿羅漢生死惑業既盡更不受後世之身故如實下謂聲聞人如實知五陰無我證得人空逮得涅槃也大慧各別無間者我人眾生壽命長養士夫言各別者謂我人眾生壽命等種種法相各別見故長養士夫即神我別名以生育萬物名長養也士夫又云丈夫亦生育成立之義然此見雖各別妙性恒通亦名無間彼諸眾生作如是覺求般涅槃彼諸眾生指各別見者復有異外道說悉由作者見一切性已言此是般涅槃此計諸法由作者生見此謂是涅槃作如是覺法無我見非分彼無解脫唐譯云彼無解脫以未見法無我故作如是覺者指上聲聞各別及外道三種見者作如是覺不見法無我義故非分也大慧此諸聲聞乘無間外道種性不出出覺為轉彼惡見故應當修學此總結聲聞各別外道二種見者之非也不出出覺者謂未出生死作出離想菩薩乘人為欲轉彼不出出覺惡見故應修學大慧緣覺乘無間種性者若聞說各別緣無間舉身毛竪悲泣流淚不相近緣所有不著種種自身種種神通若離若合種種變化聞說是時其心隨入若知彼緣覺乘無間種性已隨順為說緣覺之乘是名緣覺乘無間種性相不相近緣唐譯作離憒閙緣若知下謂依十二因緣師徒訓化轉相授受說此乘法如楞嚴云辟支無學并其初心者是也集註云言若知因緣各別不和合而不近諸緣不著所有或時聞說種種身或離一身為多身或合多身為一身及於神通變化心有所得是為緣覺乘種性大慧彼如來乘無間種性有四種謂自性法無間種性離自性法無間種性得自覺聖無間種性外剎殊勝無間種性集註云妙體圓明曰自性法無間不守自性曰離自性法無間匪從外得曰自覺聖無間平等法界曰外剎殊勝無間大慧若聞此四事一一說時及說自心現身財建立不思議境界時心不驚怖者是名如來乘無間種性相謂諸眾生聞說四事及聞說身上從自心現而不驚怖者是如來乘也建立身財不思議境界者如佛現種種身種種剎種種化相種種殊勝莊嚴依正交徹理事互融無出一心名身財不思議境也大慧不定種性者謂說彼三種時隨說而入隨彼而成三種即聲聞緣覺如來三種也集註云此不定人隨說而入順學而成其性可移故言不定大慧此是初治地者謂種性建立為超入無所有地故作是建立此結上文五乘建立之意也謂彼初治修行地者建立種性欲令超入無所有地故作是建立也無所有直指如來實際非止第八無所有故下偈云第一義法門遠離於二教住於無所有何建立三乘新說以此文局於不定性中非也彼自覺藏者自煩惱習淨見法無我得三昧樂住聲聞當得如來最勝之身唐譯云彼住三昧樂聲聞若能證知自所依識見法無我淨煩惱習畢竟當得如來之身自覺藏者藏藏識也謂能證知自覺所起藏識者則淨自性煩惱見法無我即彼三昧樂住聲聞能覺此者亦當得於如來最勝之身也爾時世尊欲重宣此義而說偈言須陀槃那果往來及不還逮得阿羅漢是等心惑亂須陀槃那金剛疏譯云入流入八聖道流故此初果也果之一字通下句三人往來或云一往來是人從此死一往天上一來人間得盡眾苦入涅槃故此二果也不還或云不來是人欲界中死生色無色界於彼漏盡不復來生此三果也阿羅漢大智度論云阿羅名賊漢名破一切煩惱賊破故又云應供一切漏盡堪應人天供養故又阿名不羅漢名生後世中更不生故含此三義故存梵名此四果也是等心惑亂者言其見思雖破無明全在故云心惑亂也三乘與一乘非乘我所說愚夫少智慧諸聖遠離寂集註云如來為凡愚少智聲聞趣寂說三乘一乘復立非乘一對三說三既不存一亦非有遠離寂言離欲寂滅也第一義法門遠離於二教住於無所有何建立三乘第一義門中若三若一皆悉遠離即非乘也然於非乘本無所有何有三一之殊哉諸禪無量等無色三摩提受想悉寂滅亦無有心量集註云諸禪無量等謂四靜慮四無量心也無色三摩提即無色界四空處定也受想悉寂滅謂聲聞滅盡定也言如來說諸禪三昧等法亦無有實為妄想心量愚夫作如是說故云亦無有心量大慧彼一闡提非一闡提世間解脫誰轉魏譯大慧下有何者無性乘一句此文生起亦由五性而來故魏譯有無性乘之句一闡提大經云一闡名信提名不具信不具故名一闡提蓋信不具即譯語也今文意含二種彼一闡提是實行闡提非一下明菩薩依一闡提成就本願者也謂非彼闡提則不能成就菩薩願於諸世間解脫從誰而轉故云非一闡提世間解脫誰轉大慧一闡提有二種一者捨一切善根及於無始眾生發願云何捨一切善根謂謗菩薩藏及作惡言此非隨順修多羅毗尼解脫之說捨一切善根故不般涅槃魏譯云大慧一闡提者有二種何等為二一者焚燒一切善根二者憐愍一切眾生作盡一切眾生界願大慧云何焚燒一切善根謂謗菩薩藏作如是言彼非隨順修多羅毗尼解脫說捨諸善根是故不得涅槃此非下正是謗語二者菩薩本自願方便故非不般涅槃一切眾生而般涅槃魏譯云大慧憐愍眾生作盡眾生界願者是為菩薩大慧菩薩方便作願若諸眾生不入涅槃者我亦不涅槃是故菩薩摩訶薩不入涅槃此釋第二菩薩發願者二者字當作云何字始應上文非不下謂菩薩非實不般涅槃為令一切捨善根眾生而般涅槃故示不般涅槃相大慧彼般涅槃是名不般涅槃相此亦到一闡提趣魏譯云是名二種一闡提無涅槃性以是義故決定取一闡提行彼般涅槃者彼指上一切眾生也謂彼眾生般涅槃即是菩薩不般涅槃相涅槃不涅槃二性平等故此亦到一闡提趣者謂菩薩示同其事亦以平等性類一闡提趣故大慧白佛言世尊此中云何畢竟不般涅槃佛告大慧菩薩一闡提者知一切法本來般涅槃已畢竟不般涅槃而非捨一切善根一闡提也此中指二種闡提也謂此二種中何者畢竟不般涅槃佛告以菩薩一闡提者不般涅槃也何者謂菩薩善知一切法本涅槃相故無涅槃可入然非捨善根實一闡提也大慧捨一切善根一闡提者復以如來神力故或時善根生所以者何謂如來不捨一切眾生故以是故菩薩一闡提不般涅槃言佛大慈雖彼至惡猶以四攝神力方便引導令種善根也所以下徵釋善根生之所以意謂非彼自力能生實由如來不捨一切眾生故如鴦崛摩羅等是也以是下結明菩薩不涅槃意復次大慧菩薩摩訶薩當善三自性前自大慧請說自性經已來世尊初章廣破有無妄想次章大慧問自心現流世尊以八喻酬之又明三佛說法之相其中略顯三自性義義且未備遂明二種聲聞及常不思議五性等今第三章世尊無問自說一闡提義至此始示三自性名以圓前所請意然而世尊雖答三性義收五法故後結顯五法之名也既前廣破外計總是妄想自性云何三自性謂妄想自性緣起自性成自性此三自性與攝大乘論中立名大同小異彼謂徧計依他圓成實也今妄想即徧計緣起即依他成自性即圓成實耳大慧妄想自性從相生相即緣起自性也緣起是所緣相故謂妄想從緣起生也大慧白佛言世尊云何妄想自性從相生佛告大慧緣起自性事相相行顯現事相相事相相者以因緣和合能攝所攝為事以形處長短為相下相字謂事相之相也行顯現相者行行陰也謂從行陰顯現之相此二相牒妄想從相生句蓋緣起事相屬所緣行顯現相即法處所攝之色也言從相生者從依也顯揚聖教論第六云依他起性能作五種業其第三業謂能為徧計所執性及圓成實性所依故今文先明妄想自性從緣起相生之意下文正明妄想自性之體計著有二種妄想自性如來應供等正覺之所建立建立唐譯作演說以計著上文所說二種相故遂有二種妄想性也謂名相計著相及事相計著相名相計著相者謂內外法計著事相計著相者謂即彼如是內外自共相計著名相者名字之相屬非色四陰也謂從行顯現相生計著故行陰所顯者不出內心外境二法故事相者屬所緣也謂從緣起事相生計著故緣起事相者不出內外自共相故離此自共別無法故是名二種妄想自性相此結二種妄想名也若依若緣生是名緣起此承上文二種妄想即明緣起性謂彼妄想所依所緣是緣起性故是名下結云何成自性謂離名相事相妄想聖智所得及自覺聖智趣所生境界是名成自性如來藏心成即圓成實也謂自性無偏曰圓自性無漏曰成自性無妄曰實今文意云離名事二想則無妄矣聖智所得則無漏矣聖趣所生則無偏矣故名成自性也如來藏心是果體圓成實是果德由是結顯其名也爾時世尊欲重宣此義而說偈言名相覺想自性二相正智如如是則成相名相即五法之二也覺想言妄想也及正智如如具足五法之名即此五法之名若忘是成自性也二相者指名相及事二相也此偈非獨重頌長行而復會明三性即五法故大慧是名觀察五法自性經自覺聖智趣所行境界趣猶種類也謂菩薩乘人依自覺聖智所修故指菩薩為自覺種類也結名可知汝等諸菩薩摩訶薩應當修學勉諸菩薩應當學此此節猶屬前章以偈後始結所問故也復次大慧菩薩摩訶薩善觀二種無我相古注云既能修學五法三自性已更當觀察人法二無我相云何二種無我相謂人無我及法無我入無我者人謂五陰假合之名也於此身中一一推之皆無有我何者更為人耶故云人無我此破陰界入之共相耳法無我者法謂陰界入諸實法也前以假名為人今正明實法人執狹故易斷法執寬故難除故大乘百法明門論註云我狹法寬蓋迷人必迷法迷法未必迷人故也然於此法一一推之不見我體故云法無我此破陰界入之自相耳下文依智明無我義故於人法之名未顯今略明之此標下釋云何人無我按下法無我文此句下應有一智字謂離我我所陰界入聚無知業愛生眼色等攝受計著生識一切諸根自心現器身等藏自妄想相施設顯示此依智明人無我義也言五陰之身眾惡所聚妄想施設非真實義離我我所者謂身不實故離我我所此句即明人空之智也陰界入下正明共相之義言陰界入法聚集成身無知即無明也業有三謂善惡不動也愛欲愛也謂由無明業愛生眼等六根色等六塵以攝受計著生眼等六識也一切下器形器也身等藏者等指支分藏指身藏一切焦腑腸胃也言諸根身藏等皆因自心所現妄想施設顯示耳如河流如種子如燈如風如雲剎那展轉壞此承上舉喻以明陰身剎那壞也謂如河流奔逝不返不逾如種子抽芽漸成漸敗如燈炷燒心焰焰灰燼如風性無恒剎那不住如浮雲變幻起滅非常陰身變壞亦復如是壞故無我故云人無我也上五喻總顯陰身展轉壞相展轉言非頓壞也下文五喻別顯陰身習氣不同故各喻中上半句明習氣下半句以喻顯人文可解躁動如猨猴言身多掉舉躁動無恒如猨猴之無暫息也樂不淨處如飛蠅言身是貪愛之本恒樂與染污同處如飛蠅之集臭腐也無厭足如風火言是身貪求無厭足故如風火之燎原野亦無厭足也無始虗偽習氣因如汲水輪生死趣有輪言身是虗偽習氣之因生死流轉苦樂昇降如汲水之輪互為上下也生死趣有輪一句合上水輪之喻種種身色如幻術神呪機發像起唐譯云種種色身威儀進止譬如死屍呪力故行亦如木人因機運動謂是身本以四大合成死屍無異由識心運轉喻如木人藉幻呪力機關發而木像起也然上總別十喻一一發明陰身之過都從妄想執著而起本無實我故下文云善彼相知名人無我智善彼相知是名人無我智結名可知云何法無我智前標人無我無智字謂覺陰界入妄想相自性覺是能覺之智陰等是所覺之法如陰界入離我我所陰界入積聚因業愛繩縛展轉相緣生無動搖無動搖唐譯云無能作者此以人例法明無我義也如陰下引陰身共相為例謂人既無我法亦如之故下文合云諸法亦爾諸法亦爾離自共相不實妄想相妄想力是凡夫生非聖贒也心意識五法自性離故此以法合人明無我義故云諸法亦爾離自下由陰等自共相法是凡夫妄想所現以妄想種現熏習力故相續不斷是凡夫生非聖賢有也心意下謂諸聖賢能離心意識五法三自性故也法無我義上已例明下復廣顯法無我益相大慧菩薩摩訶薩當善分別一切法無我以法無我義勉令善知善法無我菩薩摩訶薩不久當得初地菩薩無所有觀地相觀察開覺歡喜不久者謂善法無我故隣於聖位顯其行之高也初地無所有觀者華嚴初地文云人一切菩薩平等性無所有即平等義也開覺歡喜者覺佛知見也開者謂諸眾生於佛知見為無明所閉今登初地始開佛覺故生歡喜華嚴廣明歡喜因相言成就多歡喜故名歡喜地也又天台云此地無功用位百界作佛八相成道利益眾生今無所有觀即彼無功用行也蓋此地創得無功用名此名通上下地故次第漸進超九地相得法雲地第十地名法雲者華嚴疏引莊嚴論第十三云於第十地中由三昧門及陀羅尼門攝一切聞熏習因徧滿阿黎耶識中譬如浮雲徧滿虗空能以此聞熏習雲於一一剎那於一一相於一一好於一一毛孔雨無量無邊法雨充足一切所化眾生由能如雲雨法雨故故名法雲地也於彼建立無量寶莊嚴大寶蓮華王像大寶宮殿幻自性境界修習生於彼而坐唐譯云住是地已有大寶蓮華王眾寶莊嚴於其華上有寶宮殿狀如蓮華菩薩往修幻性法門之所成就而坐其上華嚴十地文云菩薩入受職位已百萬阿僧祇三昧皆現在前此三昧現在前時有大寶蓮華忽然出生其華廣大量等百萬三千大千世界以眾妙寶間錯莊嚴出世善根之所生起知諸法如幻性眾行所成與今經同按彼可了同一像類諸最勝子眷屬圍繞同一像類者謂同行菩薩也從一切佛剎來佛手灌頂如轉輪聖王太子灌頂華嚴十地文云爾時十方一切諸佛及諸菩薩知某世界中某菩薩能行如是廣大之行到受職位是時無量無邊乃至九地菩薩眾皆來圍繞恭敬供養爾時十方一切諸佛從眉間出清淨光明名增益一切智神通無數光明以為眷屬普照十方一切世界現種種莊嚴之事現是事已從大菩薩頂上而入當爾之時此菩薩得先所未得百萬三昧名為已得受職之位入佛境界具足十力墮在佛數如轉輪聖王所生太子母是正后其轉輪土令此太子坐白象寶妙金之座取四大海水置金瓶內王執此瓶灌太子頂是時即名受王職位墮在灌頂剎利王數菩薩受職亦復如是諸佛智水灌其頂故名受職位今經全同彼義但彼廣此略耳超佛子地到自覺聖智法趣當得如來自在法身見法無我故如上之益皆結歸見法無我之功是名法無我相結前法無我名汝等諸菩薩摩訶薩應當修學勉令修學法無我義爾時大慧菩薩摩訶薩復白佛言世尊建立誹謗相唯願說之古註云因上觀二無我能離有無斷常二見故請說建立誹謗相也非有說有名建立非無說無名誹謗令我及諸菩薩摩訶薩離建立誹謗二邊惡見疾得阿耨多羅三藐三菩提覺已離常建立斷誹謗見不謗正法古註云覺知有無惡見過已能離建立常見誹謗斷見令於正法不生毀謗蓋正法離有無若說有無即是誹謗正法也爾時世尊受大慧菩薩請已而說偈言建立及誹謗無有彼心量建立誹謗妄想所成初無真實故云無彼心量也身受用建立及心不能知愚癡無智慧建立及誹謗身受用建立魏唐二譯作身資生所住身受用建立句中所云建立是資生立業之意非執常之建立也及心不能知者反心二字連上句意來謂身之與心皆無實體各不相知蓋言其妄也由愚癡無智於一切法起建立誹謗之相爾時世尊於此偈義復重顯示偈義雖明略而未廣故重顯示使知其詳告大慧言有四種非有有建立云何為四謂非有相建立非有見建立非有因建立非有性建立是名四種建立非有有建立者謂本來非有橫立有名故云非有有也四種建立解見下文又誹謗者謂於彼所立無所得觀察非分而起誹謗是名建立誹謗相謂即於上文所立四種觀察無所得則彼建立非分非分言其無實遂生誹謗是名下總結上文兩節之意復次大慧云何非有相建立相謂陰界入非有自共相而起計著此如是此不異是名非有相建立相此如是此不異者出其固執之相執守不移故云此如是此不異也此非有相建立妄想無始虗偽過種種習氣計著生出其妄因也大慧非有見建立相者若彼如是陰界入我人眾生壽命長養士夫見建立是名非有見建立相長養士夫魏譯作作者受者我人眾生壽命等是外道所計之見也諸見本無從妄想起故云非有見建立金剛疏云執取自體為我計我展轉趣於餘趣為人計我盛衰變異相續為眾生計我一報命不斷而住為壽者長養士夫見前註大慧非有因建立相者謂初識無因生後不實如幻本不生眼色明界念前生生已實已還壞是名非有因建立相眼色明界念魏譯作眼色空明念初識無因生者識了別義初生之始也謂了別諸法始本無因而生也以本無因故後雖生而知不實如幻後生之末也本不生者結二上句謂從本以來求生相不可得故眼色明界念者示眼識四緣生也謂因空因明因心因眼界即空義念即心義前生下承上眼識生意謂前念雖生生已而實實已還壞是名非有因建立蓋舉眼識以例餘法皆不實也大慧非有性建立相者謂虗空滅般涅槃非作計著性建立此離性非性一切法如兔馬等角如垂髮現離有非有是名非有性建立相謂虗下破無作法離性非性也一切下破有作法離性非性也是故建立性者過矣新說云言外道於三無為無作法而建立有性佛言此三法離性非性類明一切諸法離於有無猶如毛輪垂髮由瞖目而生兔馬等角本自無有建立及誹謗愚夫妄想不善觀察自心現量非贒聖也是故離建立誹謗惡見應當修學此結二見以明愚夫不知自心現量妄生建立誹謗二相非賢聖事也是故下勉離二見之謗復次大慧菩薩摩訶薩善知心意意識五法自性二無我相趣究竟為安眾生故作種種類像如妄想自性依於緣起此總攝前經心意識等更明自利利他之益也如妄下舉例類明謂如妄想自性依緣起而生菩薩現像亦依眾生而有此例依生現像下復舉喻以明現像不同譬如眾色如意寶珠普現一切諸佛剎土一切如來大眾集會悉於其中聽受經法所謂一切法如幻如夢光影水月於一切法離生滅斷常及離聲聞緣覺之法譬如下喻善知心意識等菩薩教化眾生隨機現像也普現下明其現形塵剎聽受經法也所謂下示所受法義於一下明離外道二乘之法得百千三昧乃至百千億那由他三昧得三昧已遊諸佛剎供養諸佛生諸天宮宣揚三寶示現佛身聲聞菩薩大眾圍繞以自心現量度脫眾生分別演說外性無性悉令遠離有無等見得百下示善知心意識等菩薩所得三昧之多也得三下明此菩薩既得正定遊剎供佛也生者天宮者示此菩薩所生之處也宣揚三寶者明其讚歎不忘之意也示現下明其現形說法三乘繞聽也以自下明其以唯心之法教化眾生也分別下明其外性非實令離諸過也爾時世尊欲重宣此義而說偈言心量世間佛子觀察種類之身離所作行得力神通自在成就心量世間蓋語倒也即心意識等為世間心量佛子觀察心意識等善知其妄也種類之身頌意可知離所作者頌此菩薩得力通自在無作妙力之所成就離有作行故爾時大慧菩薩摩訶薩復請佛言惟願世尊為我等說一切法空無生無二離自性相大慧因聞諸法空無生等意恐行者於空無生等處復生計著故重間之以破眾生之執也一切法貫下空等三句謂一切法空一切法無生一切法無二一切法離自性也我等及餘諸菩薩眾覺悟是空無生無二離自性相已離有無妄想疾得阿耨多羅三藐三菩提此大慧自述所問之益也爾時世尊告大慧菩薩摩訶薩言諦聽諦聽善思念之今當為汝廣分別說大慧白佛言善哉世尊唯然受教佛告大慧空空者即是妄想自性處空空者魏唐二譯少一空字今云空空者蓋是能空所空之義耳妄想自性處者謂妄想無實自性本空空即自性處也大慧妄想自性計著者說空無生無二離自性相謂愚癡者妄想計著故說一切法空無生等若妄想不生則空無生等俱為剩語故上文云空空者是妄想處也大慧彼略說七種空謂相空性自性空行空無行空一切法離言說空第一義聖智大空彼彼空此七種空精麤兼舉邪正互陳以明所證廣狹邪正之相也此總標下別釋云何相空謂一切性自共相空觀展轉積聚故分別無性自共相不生自他俱生無性故相不住是故說一切性相空是名相空謂一下出相空之體也觀展下釋成相空之因也謂一切相觀察其因是展轉所起積聚相故緣會而生緣散則滅故云空也分別諸相本自無性無性故自共相不生也自他俱性無性者破四性也自自然性也他因他勝性微塵作者等生為他性也俱自他共性也無因性略也觀諸相無相故說一切相空云何性自性空謂自己性自性不生是名一切法性自性空是故說性自性空自己性者指一切法之自性也謂一切法各各自性不生不生則空矣云何行空謂陰離我我所因所成所作業方便生是名行空陰魏唐二譯作諸陰行空者行行陰也舉一陰空則諸陰皆然以離我我所故然此諸陰因緣所成過去所作業和合方便之所生故離緣無性故空也大慧即此如是行空展轉緣起自性無性是名無行空集註云前以離我我所性為行空此以行空性無性故為無行空云何一切法離言說空謂妄想自性無言說故一切法離言說是名一切法離言說空一切法離言說者謂一切法妄想所起故由妄想起則自性空自性空故無言說可說故名一切法離言說空云何一切法第一義聖智大空謂得自覺聖智一切見過習氣空是名一切法第一義聖智大空此空於七種中是精是正是廣最勝最妙故加大言云何彼彼空謂於彼無彼空是名彼彼空於彼無彼空者如於甲之彼無乙之彼乙之彼無甲之彼故云於彼無彼空也集註云於彼無此於此無彼展轉俱空故大慧譬如鹿子母舍無象馬牛羊等非無比丘眾而說彼空非舍舍性空亦非比丘比丘性空非餘處無象馬舉鹿子母舍例明彼彼空也鹿母舍中無象馬牛羊故云彼空彼指牛羊等也舍中非無比丘眾亦非舍舍性空亦非比丘比丘性空蓋言舍中獨無象馬牛羊故云彼空非餘處無象馬然則餘處無比丘眾亦云彼空故稱彼彼空也新說云鹿子人名也其母即毗舍佉優婆夷深重三寶造立精舍安止比丘於中不畜象馬等象馬無故言空舍及比丘不名空若餘處有象馬亦不說象馬空是名一切法自相彼於彼無彼是名彼彼空彼於彼無彼如初文註中說是名七種空總結可知彼彼空者是空最麤汝當遠離彼彼空是邪是麤是狹外道所計故應遠離大慧不自生非不生除住三昧是名無生離自性即是無生離自性剎那相續流注及異性現一切性離自性是故一切性離自性不自下釋無生也謂自性不生非直不生防墮斷無故唯住空定者則觀一切皆空故除住空定者說非不生耳離自下釋離自性也文義可知云何無二謂一切法如陰熱如長短如黑白唐譯云云何無二相大慧如光影如長短如黑白皆相待立獨則不成陰熱者陰對熱言則陰是涼義如唐譯以光對影則影是陰義此約二法以顯無二也以相待為二獨不成故如云因涼有熱因短有長因黑有白若離熱無涼離長無短離黑無白二皆虗妄相待無成故無二也集註以日體對陰熱等無二謂陰等雖殊而日體無異今文自立六種對論無二何得混以日體此非經意且又與唐譯相違大慧一切法無二非於涅槃彼生死非於生死彼涅槃彼即別義謂非於涅槃外別有生死非於生死外別有涅槃涅槃生死二性叵得故云無二異相因有性故是名無二如涅槃生死一切法亦如是異相因有性故者釋生死涅槃異相之妄也謂涅槃生死二相異者以有性故能知二相無性即名無二如涅下以二相例一切法皆無二也前大慧所問空無生無二離自性等蓋是妄想生處耳故佛先答云空等者即是妄想自性處若離空等則妄想自息是故空無生無二離自性相應當修學此總結四義勉諸修學爾時世尊欲重宣此義而說偈言我常說空法遠離於斷常生死如幻夢而彼業不壞宗鏡云以性空故不壞業道因果歷然虗空及涅槃滅二亦如是愚夫作妄想諸聖離有無以三無為各對有法說二者謂以空對有滅對生涅槃對生死皆以二法對顯無二故云虗空及涅槃滅二亦如是此是愚夫有作妄想諸聖則了如幻故離有無絕諸過矣爾時世尊復告大慧菩薩摩訶薩言大慧空無生無二離自性相普入諸佛一切修多羅凡所有經悉說此義修多羅譯云契經新說云言空等義普入諸經無有一法不含斯理諸修多羅悉隨眾生希望心故為分別說顯示其義而非真實在於言說如鹿渴想誑惑羣鹿鹿於彼相計著水性而彼無水希望即樂欲義謂諸所說隨眾生樂欲心起為彼分別顯示空等之義令離其著然空等義非實在於言說也如鹿下舉喻顯法言如羣鹿為渴所逼見於陽燄而作水想彼陽燄者實非是水以例眾生計著言說為空等義而彼言說實非空等此章以誡得意忘言始通聖智如是一切修多羅所說諸法為令愚夫發歡喜故非實聖智在於言說是故當依於義莫著言說發歡喜者謂隨機演說令得法喜而生善也非實下謂言說者如標月之指聖智如所指之月離指方識月體執言不得聖智前空無生等即聖智之義趣也是故行者當依於義莫執於言
