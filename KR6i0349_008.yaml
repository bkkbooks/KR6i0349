body:
  text: 劉宋天竺沙門求那䟦陀羅譯皇明吳興後學沙門廣莫參訂夏官大夫檇李袁黃閱正一切佛語心品第一之四爾時大慧菩薩復白佛言世尊惟願世尊更為我說陰界入生滅彼無有我誰生誰滅愚夫者依於生滅不覺苦盡不識涅槃不覺唐譯作不求陰界入生滅之相前文具明今復問者蓋大慧重起疑情疑謂雖知陰界入等是生滅法然彼等法中既無主宰無我相可得誰為生滅且彼愚夫不知生滅無主更反依之不求盡苦之要不識涅槃之名有悲愍意故發此問嗟夫今之世不求盡苦不識涅槃者充滿兩間而達道者有幾佛言善哉諦聽當為汝說大慧白佛言唯然受教佛告大慧如來之藏是善不善因能徧興造一切趣生譬如伎兒變現諸趣離我我所上文大慧所問生滅法中誰為主宰今佛答如來藏是善不善因為之主也謂如來藏性一切心善惡之法因之而有蓋以生滅不生滅和合成諸趣耳譬如下舉喻明變現之主伎兒即幻師喻如來藏也所現幻事喻變現諸趣也然所現事皆幻故離我我所不覺彼故三緣和合方便而生外道不覺計著作者為無始虗偽惡習所熏名為識藏生無明住地與七識俱如海浪身常生不斷離無常過離於我論自性無垢畢竟清淨諸凡愚者不覺諸識皆幻妄依三緣和合方便而生諸趣彼外道輩以不覺故計為作者生於諸法此總為無始虗偽惡習所熏名為藏識生相即此藏識為無明住地也住地即根本義此無明與前七識俱俱者不離也如海浪身長生不斷者海喻藏識浪喻七識浪不離海離海無浪故喻如前七不離藏識離藏識無前七故從無始來相續不斷以惡習熏故如來藏體翻為藏識本性不易故離無常及我等過以無過故自性無垢以無垢故畢竟清淨其餘諸識有生有滅意意識等念念有七因不實妄想取諸境界種種形處計著名相藏識無垢本然常住其餘七識則有生滅何以故謂意意識等念念攀緣七體不斷以依不實妄想取諸境界長短大小種種形處計著名相故有生滅不覺自心所現色相不覺苦樂不至解脫名相諸纏貪生生貪若因若攀緣承上不實妄想取外境界由不覺自心現相依貪生著著故生貪不覺貪欲為苦不知解脫為樂念念塵勞恒受繫縛是故不能至於解脫隨順因緣相續長劫彼諸受根滅次第不生餘自心妄想不知苦樂入滅受想正受第四禪善真諦解脫修行者作解脫想言諸受根者受有三種謂苦樂不苦不樂也違情則苦順意則樂平常則無苦無樂此三種受從六根起故云諸受根也若諸受根滅則次第不生次第即相續義言不生者但是相續麤相已滅尚餘自心微細妄想此微細妄想正是捨念清淨境界故云不知苦樂乃至入於滅受想定其間或於第四禪或善真諦道解脫修行者於此作解脫想不離不轉名如來藏識藏七識流轉不滅所以者何彼因攀緣諸識生故非聲聞緣覺修行境界不覺無我自共相攝受生陰界入此承上文修行者出其未了之過也謂彼修滅定者即依此定作解脫想而實不離不轉如來藏中識藏之名何以故滅盡定中未離識故若住滅定七識應滅今文何言七識不滅蓋通指未及滅定者說故兼第四禪也成唯識引契經說住滅定者根無變壞識不離身此指眼等轉識不離身故由是成唯識廣破其說謂此定眼等轉識非不離身不離身者但第八識耳又云由未永斷第七種子故從滅盡定起已此復現行又云第七差別有三種一數取趣我見相應二法我見相應三平等性智相應蓋滅定但滅初相故知今文七識不滅之言指第七識耳然此定中染污末那雖滅無染末那猶在法我見未空故今文與唯識相符故詳出於此蓋藏識因緣甚深微細如楞嚴所謂如急流水望如恬靜流急不見非謂無流二乘不了作解脫想是故此識非其境界不覺下謂二乘不盡覺知無我法故猶故攝受自共相及諸陰界入等言其法執未破故也見如來藏五法自性人法無我則滅地次第相續轉進餘外道見不能傾動古註云若見如來藏五法三自性人法無我等法數則滅以見如來藏故復得入地轉進至八地外道惡見不能傾動是名住菩薩不動地得十三昧道門樂三昧覺所持觀察不思議佛法自願不受三昧門樂及實際是名下結前法空進地之樂三昧下更明菩薩自願度生之意楊彥國纂云以觀察佛法自願則能顧愍眾生不滯空寂故於三昧門樂及實際皆不受向自覺聖趣不共一切聲聞緣覺及諸外道所修行道得十賢聖種性道及身智意生離三昧行是故大慧菩薩摩訶薩欲求勝進者當淨如來藏及識藏名謂不動地菩薩不受三昧門樂顧愍眾生向自覺聖趣不與二乘外道所共得十地聖道及法身真智如意受生遠離七地已還有功用定是菩薩自願無作行相也四教儀云十住名習種性十行名性種性十迴向名道種性十地名聖種性今云十賢聖種性謂得十地種性也彼文又云地前三十位為三賢登地名十聖今文賢聖並舉而以十數標名者意以十地望上等妙為賢望下三十位名聖耳是故下結勸勝進之要大慧若無藏識名如來藏者則無生滅此明無漏藏性則無生滅也或問前經屢言藏識常住不生不滅今文何言藏識滅耶答曰此識通有漏無漏元以生滅不生滅和合為體生滅是有漏不生滅是無漏今所滅者但滅有漏業相耳生滅既滅其體本真故無生滅大慧然諸凡聖悉有生滅修行者自覺聖趣現法樂住不捨方便魏譯云一切凡夫及諸聖人依彼阿黎耶識故有生滅以依阿黎耶識故諸修行者入自內身聖行所證法樂行而不休息此明凡聖修行者未易離此藏識生滅也何者謂藏識淵深至不動地始捨藏名金剛道後始空異熟是故今文意云雖住現法而不捨方便即微細生滅未忘也故成唯識云七地已前猶有俱生我見愛等又云但地上菩薩所起煩惱皆由正知不為過失大慧此如來藏識藏一切聲聞緣覺心想所見雖自性清淨客塵所覆故猶見不淨非諸如來唐譯云大慧此如來藏藏識本性清淨客塵所染而為不淨一切二乘及諸外道憶度起見不能現證此明藏識本淨而諸聲聞以所知心妄見此識謂為不淨然由客塵覆故非諸如來有淨不淨也大慧如來者現前境界猶如掌中視阿摩勒果此承前藏識之意直明如來切見反顯二乘不了也視如掌中果者謂於此識切近曉了無纖疑故無淨不淨異二乘故阿摩勒見第一註大慧我於此義以神力建立令勝鬘夫人及利智滿足諸菩薩等宣揚演說如來藏及識藏名七識俱生聲聞計著見人法無我唐譯云我為勝鬘夫人及餘深妙淨智菩薩說如來藏名藏識與七識俱起令諸聲聞見法無我佛以方便神力建立藏識名義乃令勝鬘夫人及利智滿足諸菩薩等宣演此義謂以藏識不滅七識俱生而諸聲聞依於此識證得涅槃見思惑破但得人空法執全在猶稱計著今示此義令見法無我故文中闕略會意可知勝鬘夫人是匿王正后優婆夷也佛舉在家一眾及出家利智菩薩者意明此義不簡在家出家若男若女但解此旨盡得宣揚故也故勝鬘夫人承佛威神說如來境界非聲聞緣覺及外道境界如來藏識藏唯佛及餘利智依義菩薩智慧境界勝鬘既奉佛旨演說如來藏境自力不及必承佛威乃可說也餘文可解是故汝及餘菩薩摩訶薩於如來藏識藏當勤修學莫但聞覺作知足想佛以此義結勸修學復勉依義深修莫但從聞覺解便以為得作知足想爾時世尊欲重宣此義而說偈言甚深如來藏而與七識俱二種攝受生智者則遠離如來藏非二乘所知故稱甚深也直以識體即如來藏離如來藏無識體故是故識藏與七識俱生之時全體即如來藏也二種者承上二句謂如來藏真也七識妄也真妄和合而有生滅攝受即和合義愚者執之智者則離如鏡像現心無始習所熏如實觀察者諸事悉無事古注云如鏡因前境故有像現以譬如來藏心鏡因七轉識無始妄習薰故乃有三界依正妄法現如實觀者一切悉無耳如愚見指月觀指不觀月計著名字者不見我真實新說云智者見指必知有月愚夫反是故但觀文字之指不得真實法也心為工伎兒意如和伎者五識為伴侶妄想觀伎眾新說云言如來藏識藏受熏持種變起根身器界如工伎兒染污末那執我法故如和伎者前五轉識取塵相資譬之伴侶第六意識虗妄了別類彼觀人爾時大慧菩薩白佛言世尊惟願為說五法自性識二種無我究竟分別相我及餘菩薩摩訶薩於一切地次第相續分別此法入一切佛法入一切佛法者乃至如來自覺地大慧因前聞說見如來藏則五法自性識等滅因知如來藏中一切法數悉不可得何故復有五法三自性等種種差別究竟諸相何所攝屬又前文但標總名未明其相今請別顯故發此問我及下大慧自敘所問之益佛告大慧諦聽諦聽善思念之大慧白佛言唯然受教佛告大慧五法自性識二種無我分別趣相者謂名相妄想正智如如若修行者修行入如來自覺聖趣離於斷常有無等見現法樂正受住現在前次佛告下牒問語謂名下示五法名若修下明所修益謂修行者能行此法乃能入於如來自覺聖趣既入聖趣則離斷常等見因得正受法樂現在其前大慧不覺彼五法自性識二無我自心現外性凡夫妄想非諸聖贒此明不覺五法等從自心現者是凡非聖也大慧白佛言世尊云何愚夫妄想生非諸聖贒上文佛謂五法等數皆是凡愚妄想所生非聖賢有大慧躡此生疑謂正智如如豈非聖賢所有然其名數雖知義意未了故發此問佛告大慧愚夫計著俗數名相隨心流散流散已種種相像貌墮我我所見希望計著妙色計著已無知覆障故生染著染著已貪恚癡所生業積集積集已妄想自纏如蠶作繭墮生死海諸趣曠野如汲井輪以愚痴故不能知如幻野馬水月自性離我我所起於一切不實妄想離相所相及生住滅從自心妄想生非自在時節微塵勝妙生愚痴凡夫隨名相流唐譯云佛言大慧凡愚不知名是假立心隨流動見種種相計我我所染著於色覆障聖智起貪瞋痴造作諸業如蠶作繭妄想自纏隨於諸趣生死大海如汲井輪循環不絕不知諸法如幻如燄如水中月自心所見妄分別起離能所取及生住滅謂從自在時節微塵勝性而生隨名相流答謂由著名相妄事隨生依妄生妄無窮已也文中流散已計著已染著已積集已此四已句即牒上義生下妄情展轉積妄墮生死海如汲井輪循環上下莫知遇絕以愚下明其愚故不知妄所由生而異計也末二句結牒妄因此按下文相等皆有釋文然無釋名一節大約依相攝名故略之耳大慧彼相者眼識所照名為色耳鼻舌身意意識所照名為聲香味觸法是名為相本文可知釋相竟大慧彼妄想者施設眾名顯示諸相如此不異象馬車步男女等名是名妄想如此不異者謂以妄想計著名相堅執不移如計象等名言非謬非以象作馬等馬作象等畢竟不異即此堅計是名妄想釋妄想竟大慧正智者彼名相不可得猶如過客諸識不生不斷不常不墮一切外道聲聞緣覺之地集註云正智者觀彼名相不實如過客客非住義故不可得以不可得故諸識不生蓋以智為主人以名相為客也此智既不斷不常則不墮凡夫二乘之地釋正智竟復次大慧菩薩摩訶薩以此正智不立名相非不立名相捨離二見建立及誹謗知名相不生是名如如謂以正智觀察法數不可得故名相不立非不下防難也或謂名相滿前何云不立故此通云非不立名相但捨離有無二見則建立誹謗二過不生也了知名相不生處即如如故大慧菩薩摩訶薩住如如者得無所有境界故得菩薩歡喜地得菩薩歡喜地已永離一切外道惡趣正住出世間趣法相成熟分別幻等一切法自覺法趣相離諸妄想見性異相以住如如故得無所有無所有境上通妙覺下及初地見無所有境即得初地得初地已永離世間一切外道邪趣住持出世正趣正趣法相成熟分別幻等諸法即自覺趣相以悟自覺趣相故則能離諸妄想所見一切性之異相也次第乃至法雲地於其中間三昧力自在神通開敷依前初歡喜地次第乃至第十法雲地於其十次第中三昧神力自在成就開敷一切神通變化入如來地也得如來地已種種變化圓照示現成熟眾生如水中月善究竟滿足十無盡句為種種意解眾生分別說法法身離意所作是名菩薩入如如所得菩薩得入如來地已覺行滿足乃能種種變化現身圓照一切成熟眾生然所現身如水中月無出無入是故善得究竟滿足十無盡句為種種心意識解眾生分別說法而此菩薩意生法身離意所作所謂無行作意生身也是名菩薩入如如所得之相從前住如如者至此獨明得如如者之益爾時大慧菩薩白佛言世尊云何世尊為三種自性入於五法為各有自相宗佛告大慧三種自性及八識二種無我悉入五法大慧彼名及相是妄想自性新說云大慧前舉四門而問如來但約五法一門而答故此再問為三自性入五法中為三自性別有自相宗耶佛答言餘三法門悉入五法中者以但修一門則諸門備攝餘三亦爾謂其中名相生妄想自性此妄想自性入五法名相也大慧若依彼妄想生心心法名俱時生如日光俱種種相各別分別持是名緣起自性唐譯云以依彼分別心心所法俱時而起如日與光是緣起性按唐譯謂緣起性依彼分別心心所法而生分別心入五法中妄想也葢妄想與緣起相因有故俱時顯現而不相離故如日光俱者蓋日喻心王日之光喻心所有法光所照相喻緣起性故文可了大慧正智如如者不可壞故名成自性集註云正智如如非有作法故不可壞名成自性入五法正智如如也已上明三自性入五法竟復次大慧自心現妄想八種分別謂識藏意意識及五識身相者不實相妄想故我我所二攝受滅二無我生是故大慧此五法者聲聞緣覺菩薩如來自覺聖智諸地相續次第一切佛法悉入其中前文以三自性會入五法此復以八識二無我會入五法也是故下結前五法是三乘諸地世出世間一切佛法之本由是一切悉入其中復次大慧五法者相名妄想如如正智大慧相者若處所形相色像等現是名為相五法數相前文已明今重出者蓋前文以三自性會入五法故先明五法之相次會三性也今復以八識二無我等會入五法故亦先陳五法次會入之經家敷演之緒如此若彼有如是相名為瓶等即此非餘是說為名施設眾名顯示諸相瓶等心心法是名妄想謂施名顯相即能顯心心所法者名為妄想彼名彼相畢竟不可得始終無覺於諸法無展轉離不實妄想是名如如謂彼名相妄想始終非覺當體虗寂無展轉生相是名如如真實決定究竟自性不可得彼如是相我及諸佛隨順入處普為眾生如實演說施設顯示於彼隨入正覺不斷不常妄想不起隨順自覺聖趣一切外道聲聞緣覺所不得相是名正智真實下先明所入如相我及下佛云所如者是我及諸佛隨順入處又能普為眾生如實演說開示於彼令彼隨入正覺不令著於斷常則妄想不起隨順自覺聖趣不向外馳一切外道二乘所不得之相是名正智也大慧是名五法三種自性八識二種無我一切佛法悉入其中此總結一切名數悉入五法中也前則單約三性會入五法今則總會一切悉入其中故重釋其義也是故大慧當自方便學亦教他人勿隨於他此誡行者當學五法圓融一切自覺覺他無令隨他外道爾時世尊欲重宣此義而說偈言五法三自性及與八種識二種無有我悉攝摩訶衍謂五法等數普能攝入摩訶衍中摩訶衍譯語見前註名相虗妄想自性二種相正智及如如是則為成相謂名相及妄想屬三性中妄想緣起二種相也正智如如屬三性中圓成實相也前經大慧總別諸問皆不出五法等數今文收攝顯示此中甚明爾時大慧菩薩復白佛言世尊如世尊所說句過去諸佛如恒河沙未來現在亦復如是云何世尊為如說而受為更有餘義惟願如來哀愍解說大慧嘗聞世尊稱三世佛如恒沙之多在三世一多之間疑滯未通故引此為問蓋謂三世佛興若此之多則違平等真如故問為如說而受耶為有別義耶佛告大慧莫如說受三世諸佛量非如恒河沙所以者何過世間望非譬所譬如如虗寂無說無受以度生故方便有所說受耳今佛據如實義答故云莫如說受也若以事說則無始劫來諸佛興世無量無邊筭莫能及強以恒沙而喻其多也然恒沙雖多不出數量諸佛出興固未可測也若以理說則諸佛法身湛然無相無出無沒故云非如恒沙也出過世間知見一切譬喻所不能及故徵釋云過世間望非譬所譬以凡愚計常外道妄想長養惡見生死無窮欲令厭離生死趣輪精勤勝進故為彼說言諸佛易見非如優曇鉢華難得見故息方便求世尊說法巧觀人根此以計常外道長養惡見長淪生死欲令彼等捨生死輪精勤勝進故為彼言應捨生死當求涅槃諸佛能證此道應往求之現在某處而易見也非如優曇鉢華難得見故以難見故息方便求優曇鉢譯云瑞應般泥洹經云閻浮提內有尊樹王名優曇鉢有實無華若優曇鉢樹有金華者世乃有佛今以此樹實而不華故難得見佛乃機感相應顯現則易非如此華之難見也有時復觀諸受化者作是說言佛難值遇如優曇鉢華世尊又復有時觀懈怠機說佛難遇如優曇鉢華上文說易此復說難世尊說法如走盤珠也優曇鉢華無已見今見當見如來者世間悉見不以建立自通故說言如來出世如優曇鉢華大慧自建立自通者過世間望此謂優曇三世必無見者佛興世間眾生悉見是故前云非如彼華然而佛雖易見若不建立自通則遇如不遇由是告以如來出世如優曇華難值遇故於此見時當如說行若寶山空返再遇誠難是故建立自通者超過世間而世人仰之如天之高也彼諸凡愚所不能信自覺聖智境界無以為譬真實如來過心意意識所見之相不可為譬彼凡愚者邪謬異見種種不一顛倒之惑深廣無涯於自覺聖智境界所不能信者非譬可及蓋言其多也如來真實境界超過心意識見甚深微妙亦不可以譬喻顯也凡愚言自覺如來言心意自覺與心意影帶顯故蓋謂凡愚著心意識而不信自覺故為眾生如來證自覺而超心意識相故為如來迷悟迢然皆難以譬喻明其迷悟之深且廣也大慧然我說譬佛如恒河沙無有過咎此成前無過以起下文之餘義也初大慧問云為如說而受為更有餘義已上佛所答者先明恒沙喻佛之多言無過也下文次答更有餘義之問以顯恒沙無我不壞等即所謂餘義耳大慧譬如恒沙一切魚鱉輸收摩羅師子象馬人獸踐踏沙不念言彼惱亂我而生妄想自性清淨無諸垢污輸收摩羅譯云殺子魚又云鱷魚善見律云鱷魚長二丈餘有四足齒至利禽鹿入水齧腰即斷昔韓潮州所伏者是此類也餘文可解如來應供等正覺自覺聖智恒河大力神通自在等沙一切外道諸人獸等一切惱亂如來不念而生妄想如來寂然無有念想如來本願以三昧樂安眾生故無有惱亂猶如恒沙等無有異又斷貪恚故合上喻也集註云如來自覺聖智如恒河力通自在等如恒河中沙諸外道等來相惱亂如來未嘗起一念恚彼而生憎愛分別譬如恒沙是地自性劫盡燒時燒一切地而彼地大不捨自性與火大俱生故其餘愚夫作地燒想而地不燒以火因故恒沙自性即地大也劫火雖燒地性不壞縱令燒至極微終不捨自性何以故地大火大同本生故同本生者如楞嚴所謂同一妄明生諸大故諸凡愚人妄見燒相實地性不燒也何以故以地為火之因故如楞嚴所謂風金相磨故有火光為變化性金即地大故大意火以風金為因風金之因出自妄明則其體本妄本因既妄而因所生者亦妄矣如實性中更何所燒如是大慧如來法身如恒沙不壞結合可知此合如來法身德也大慧譬如恒沙無有限量如來光明亦復如是無有限量為成熟眾生故普照一切諸佛大眾此合如來般若德也光明屬般若德故大慧譬如恒沙別求異沙永不可得如是大慧如來應供等正覺無生死生滅有因緣斷故恒河所有純是金沙其沙細甚如麵別無瓦礫麤質故云別求異沙永不可得此合如來解脫德也生死因緣斷是解脫故大慧譬如恒沙增減不可得知如是大慧如來智慧成熟眾生不增不減非身法故身法者有壞如來法身非是身法恒沙自性本然靜故彼增此減俱不我知如來自性亦復如是雖承智慧願力現身說法成熟眾生而自性法身不增不減非如色身有相之法色身有壞如來法身湛然虛寂非有相法故如壓恒沙油不可得如是一切極苦眾生逼迫如來乃至眾生未得涅槃不捨法界自三昧願樂以大悲故如是下魏譯云大慧諸佛如來為諸眾生苦惱所壓嗔不可得不捨自法界相不捨自法昧相不捨本願與眾生樂以得具足大慈大悲我若不令一切眾生入涅槃者我身亦不入於涅槃恒沙喻如來油不可得喻如來嗔不可得壓喻眾生苦惱逼迫如來謂假使眾生以種種苦惱逼迫如來而如來不為眾生所逼迫故退捨大悲而反令其獲諸功德然彼眾生乃至未得涅槃如來終不捨離法界三昧度生智願何以故如來以大悲之心深故大慧譬如恒沙隨水而流非無水也如是大慧如來所說一切諸法隨涅槃流是故說言如恒河沙如來不隨諸去流轉去是壞義故非無水也一句魏譯作終不逆流恒沙喻如來所說諸法水喻涅槃如是下法合謂如來所說諸法皆隨順涅槃而流終不逆也如沙隨水不逆流故隨涅槃流者流即不流非去義也是故如來不隨世間生滅諸法流轉以世間諸去是壞義故大慧生死本際不可知不知故云何說去大慧去者斷義而愚夫不知生死本際者謂究竟生死無實本際是空故不可知不知則空空即實相故不可以說去也而諸愚夫說去者是斷滅義如來去即不去愚夫不知大慧白佛言世尊若眾生生死本際不可知者云何解脫可知此因生死不可知故問解脫云何可知也古注云若眾生生死本際始時不可知者云何後時得解脫終時可知耶佛告大慧無始虗偽過惡妄想習氣因滅自心現知外義妄想身轉解脫不滅是故無邊非都無所有為彼妄想作無邊等異名謂解脫者何即彼無始過惡妄想習氣因滅名為解脫此習因滅者為了知外境界義由自心現知唯自心於外不著於內則空自此習因滅而解脫現矣由是妄想之身轉為法身妄想雖滅解脫不滅不滅則常常則為實實故可知也是故下出解脫異名謂解脫即真空也以真空徧故因稱無邊然此無邊非都無所有名無邊也為彼妄想有量而解脫無量故作無邊等異名耳觀察內外離於妄想無異眾生智及爾𦦨一切諸法悉皆寂靜不識自心現妄想故妄想生若識則滅此承上解脫之意以明妄想不生也謂由解脫故以智觀察內心外境二俱非實因離妄想妄想既離即無差別體相也眾生即體相義是故能所諸法悉皆寂靜然由不識妄想依自心現故妄想生若識自心現者妄想則滅爾時世尊欲重宣此義而說偈言觀察諸導師猶如恒河沙不壞亦不去亦復不究竟是則為平等頌上三世佛量及諸性德等義觀察諸如來猶如恒沙等悉離一切過隨流而性常是則佛正覺頌上佛所說法隨涅槃流無所去壞而影括長行全義爾時大慧菩薩復白佛言世尊惟願為說一切諸法剎那壞相世尊云何一切法剎那集註云因上佛言身法者有壞即是說陰界入無常故舉一切諸法剎那壞相以請問佛告大慧諦聽諦聽善思念之當為汝說佛告大慧一切法者謂善不善無記有為無為世間出世間有罪無罪有漏無漏受不受大慧略說心意意識及習氣是五受陰因是心意意識習氣長養凡愚善不善妄想善不善等是一切法之名也此諸法中有漏者是剎那無漏者非剎那略說下先舉有漏法明剎那義謂一切法以五受陰為體心意識習氣為五受陰因凡愚不了心意識習氣故長養善不善妄想大慧修三昧樂三昧正受現法樂住名為賢聖善無漏次舉無漏法明非剎那義也初大慧但問剎那壞相今世尊因剎那兼明非剎那意令擇其善者而從之也大慧善不善者謂八識何等為八謂如來藏名識藏心意意識及五識身非外道所說謂如來藏為無明所熏即轉名識藏意意識等可知此出善不善等之本所謂萬法唯識也大慧五識身者心意意識俱善不善相展轉變壞相續流注不壞身生亦生亦滅謂五識身與心意意識同時俱起所造善不善相展轉變壞即剎那法也此剎那法相續長劫流注不壞以相續故不壞身生非真不壞生已復滅滅已復生故云亦生亦滅不覺自心現次第滅餘識生形相差別攝受古注云此明五識不覺諸法自心現故取種種塵隨取即滅故言次第滅隨次第滅處即六識生故言餘識生餘識生記五識所取形相差別法意識五識俱相應生此明餘識生意也餘識指第六意識蓋謂意識與前五識和合取塵相應俱起攝受差別形相即唯識所謂同時意識也剎那時不住名為剎那此結前文心意識等所造諸法剎那不住名剎那義也大慧剎那者名識藏如來藏意俱生識習氣剎那無漏習氣非剎那非凡愚所覺計著剎那論故此牒明剎那非剎那意也謂如來藏是八識果體若如來藏與有漏識相應名為藏識生諸識習氣名剎那也若如來藏與無漏習氣相應名如來藏無漏習氣非剎那也凡愚不覺此義故計剎那言論不覺一切法剎那非剎那以斷見壞無為法凡愚不覺善不善等諸法即剎那非剎那遂因剎那壞法作斷滅論計著斷見故不知無為非剎那之常亦以斷見壞之大慧七識不流轉不受苦樂非涅槃因謂前七識念念生滅無自性故不能作生死涅槃之因意顯藏識不滅能為漏無漏之本也宗鏡云七識從緣本無自性尚不能為生死苦樂之本豈復與涅槃作因大慧如來藏者受苦樂與因俱若生若滅此承上文以明如來藏識藏能為生死涅槃之因故云受苦樂與因俱也由是長劫若生若滅四住地無明住地所醉凡愚不覺剎那見妄想熏心四住及無明者為五住地惑也華嚴鈔云一一切見住地惑二欲愛住地惑三色愛住地惑四有愛住地惑五無明住地惑蓋凡愚以此五惑醉心不覺如來藏義作剎那見種種妄想熏心復次大慧如金金剛佛舍利得奇特性終不損壞謂如來藏性如金金剛佛舍利等一任鎔冶槌擊體性不壞有奇特義以喻如來藏性恒受苦樂生死不為彼所淪滅也大慧若得無間有剎那者聖應非聖而聖未曾不聖集注云謂得如來所證無間之法非剎那不住若有剎那不住者則聖應非聖以非剎那不住故而聖未嘗不聖也如金金剛雖經劫數稱量不減云何凡愚不善於我隱覆之說於內外一切法作剎那想承前得無間法者如金剛等經劫不滅言不壞也然佛有時說諸生滅流轉等法是如來隱覆之說非真實義諸凡愚人不善了知於內外法作剎那想殊不知生即不生滅即不滅如來藏性無所增減大慧菩薩復白佛言世尊如世尊說六波羅蜜滿足得成正覺何等為六大慧前聞諸去流轉是壞滅義故有剎那之問也今剎那既明復從建立自通義中演出六波羅蜜為問雖不明指自通義意所自來者然或遠從總問偈中抽繹問耳佛告大慧波羅蜜有三種分別謂世間出世間出世間上上梵語波羅蜜譯云到彼岸大論又翻事究竟天竺國人凡作事畢謂為到彼岸也謂施戒忍進禪定智慧此六俱稱到彼岸者各得究竟實際故雖云究竟亦有淺深權實之不同稱機巧說自分三種大慧世間波羅蜜者我我所攝受計著攝受二邊為種種受生處樂色聲香味觸故滿足檀波羅蜜戒忍精進禪定智慧亦如是凡夫神通及生梵天世間六度謂世善究竟也世善有為三輪不空著我我所攝受施者受者二邊依此行施求生未來善處貪樂彼處五欲樂故得生彼已為施事究竟名世間波羅蜜也餘戒等五亦復如是修世度者得凡夫神通及生梵天為究竟處凡夫神通有五種一天眼通二天耳通三他心通四宿命通五身如意通未離生死所以不得第六漏盡通也得漏盡者乃名聖人大慧出世間波羅蜜者聲聞緣覺墮攝受涅槃故行六波羅蜜樂自己涅槃樂新說云出世間波羅蜜者是二乘人厭捨生死欣趣涅槃求於自度修習六種劣無漏行故不得作佛出世間上上波羅蜜者覺自心現妄想量攝受及自心二故不生妄想於諸趣攝受非分自心色相不計著為安樂一切眾生故生檀波羅蜜起上上方便出世上上六度者是大乘菩薩所修之行能覺自心現量及外所攝并內自心了達內外二法無實性故不生妄想故於諸趣受生非其分矣自心證得殊勝色相無所計著但為安樂一切眾生故修行檀度三輪既空四攝巧作超過二乘起出世上上方便即於彼緣妄想不生戒是尸波羅蜜即彼妄想不生忍知攝所攝是羼提波羅蜜初中後夜精勤方便隨順修行方便妄想不生是毗黎耶波羅蜜妄想悉滅不墮聲聞涅槃攝受是禪波羅蜜自心妄想非性智慧觀察不墮二邊先身轉勝而不可壞得自覺聖趣是般若波羅蜜於彼外緣妄想不生不生即無生無生即戒是名戒度不生有忍義知攝所攝非性是無生忍名忍度精勤方便而無勤行之著雖終日行而未嘗行者為上上方便是名進度妄想悉滅不墮二乘見處是名禪度自心現量妄想非性以智觀察不墮有無先所證得離妄想身展轉增勝而不可壞自覺聖趣由此滿足是名智度前文檀是梵語具云檀那譯云施尸具云尸羅譯云滅惡羼提譯云忍辱毗黎耶譯云精進禪具云禪那譯云靜慮又云思惟修般若譯云智慧蓋即一心而具六度故今文中皆稱自心宗鏡云檀因心施圓清淨之施門戒因心持成自性之淨律辱因心受具無生之大忍勤因心作備牢強之進門能觀心性名為上定則禪因心發般若靈鑒窮幽洞微則智心起故經云空心不動具足六波羅蜜爾時世尊欲重宣此義而說偈言空無常剎那愚夫妄想作如河燈種子而作剎那想集註云世尊常以如河流如種子如燈等喻破彼妄想有為作法皆是空無常剎那凡愚不善此隱覆之說計作剎那想也剎那息煩亂寂靜離所作一切法不生我說剎那義集註云說剎那者息愚夫妄想計著煩亂然煩亂性本寂靜離作所作法一切下新說云以一切法剎那流轉必無自性無自性故即是無生若非無生則不流轉契無生者方見剎那初生則有滅不為愚者說無間相續性妄想之所熏世間萬物有生有滅智者即於生滅了悟無生愚者因觀代謝計為斷滅由是不為愚者說耳如來藏性與有漏和合相續長劫無有間斷為妄想之所熏故無明為其因心則從彼生乃至色未生中間有何分以無明為因生彼識心賴耶心體未涉六麤心無初相中何可分蓋言其妄耳相續次第滅餘心隨彼生不住於色時何所緣而生前二句頌長行次第滅餘識生義後二句言其妄體無依也故魏譯云色不一念住觀於何法生斯可知矣以從彼生故不如實因生云何無所成而知剎那壞承前次第滅餘心生者謂從不如實因所生念念不住無自體性無自體性則無所成無所成則剎那非實是故微云云何無所成而知剎那壞修行者正受金剛佛舍利光音天宮殿世間不壞事前長行中但有金剛舍利之言而無光音宮殿此天劫壞時水灾所及今云不壞者蓋用長阿含經意謂世界初成光音天人下生此間為人之始似不壞故金及金剛亦是可壞經意但取堅久於萬物者用為喻耳唯佛舍利實為不壞至劫壞時沉金輪下終不磨滅住於正法得如來智具足比丘得平等云何見剎那此頌得無間法者非剎那也住於正法得如來智具足二句語倒置應云得住於正法具足如來智語始順也集註云如來智滿足比丘得八地平等云何有剎那之見捷闥婆幻等色無有剎那於不實色等視之若真實集註云色等諸法如犍城幻夢無有剎那生住異滅之相於不實色相計著剎那視犍城等若實有也爾時大慧菩薩復白佛言世尊世尊記阿羅漢得成阿耨多羅三藐三菩提與諸菩薩等無差別此問從前三種波羅蜜及剎那非剎那義中來也蓋今羅漢得菩提記出自三種波羅蜜下文一切眾生法不涅槃出自非剎那化佛說法出自剎那不施本際出自次前恒沙章中生死本際諸業果報出自隱覆之說按經文義秪發五問集註列而為十其言似枝今乃順文疏釋殊為妥當幸諸達者校焉今文起第一問羅漢得記與菩薩無別者夫法華以前未經開顯蓋密記也非與法華義同詳如輔行中辨引見下註一切眾生法不涅槃誰至佛道從初得佛至般涅槃於其中間不說一字亦無所答如來常定故亦無慮亦無察此第二問也諸法本然無起滅相生佛平等誰至道者所以從初得佛乃至涅槃於其中間何所說示亦無問者答者所以終日說示而未嘗說示也如法華云諸法寂滅相不可以言宣此之謂歟如來常寂光定無慮無察然則東涌西沒何嘗非定談天論人一何非寂如肇論云旋嵐偃嶽而常靜江湖競注而不流法乃如斯非作故爾經初偈云一切無涅槃無有涅槃佛無有佛涅槃遠離覺所覺義同於此化佛化作佛事何故說識剎那展轉壞相金剛力士常隨侍衛此第三問也第一經云法佛所說離心意識相然則心意識相剎那壞滅一切權乘佛事悉由化佛所作故今問謂法佛本然無慮無察云何復有化佛作事無威德力假借侍衛耶金剛護法神名梵語跋闍羅波膩譯云金剛手謂手執金剛杵以立名也正法念經云昔有國王夫人生千子欲試當來成佛次第拘留孫探得第一籌釋迦得第四籌乃至樓至得末籌第二夫人生二子一願為梵王請千兄轉法輪次願為密迹金剛神護千兄教法此金剛護法之由也何不施設本際此第四問也前恒沙章中云生死本際不可知不可知即不施設今問何故不施設本際中論云大聖之所說本際不可知生死無有始亦復無有終若無有始終中間云何有蓋以虗妄故不施設也現魔魔業惡業果報旃遮摩納孫陀利女空鉢而出惡業障現云何如來得一切種智而不離諸過此第五問也不示本然全彰隱覆大意明宿業必報無可忘者故維摩經云無我無造無受者善惡之業亦不亡理之然也現魔魔業者上魔字言外魔也魔業者言自造魔業也梵語魔羅譯云能奪命謂能作奪命因緣外則奪乎身命內則奪乎慧命故也輔行云古譯經論魔字從石自梁武來謂能惱人字宜從鬼觀佛三昧海經云佛坐道樹肌骨枯槁以成佛道有魔名波旬欲往征之乃興天神地祗精魅妖怪一切鬼部莫不畢至殊形異狀惡獸火雷擎山持杵弓弩鎗戟如雲如雨死人膿血穢污不淨嬈害於佛佛以慈心三昧力一一對之刀兵悉變蓮華不能加害此外魔也佛本行經捔術爭婚品云悉達調達及諸王子爭婚瞿夷種種捔術瞿夷爾時在高樓上觀其捔試乃至彎弓徹鼓納妃生子此為自造魔業也惡業果報等者謂佛宿生惡業報不可忘今雖成佛宿業必酬大聖尚爾吾儕豈為因錄其詳以備觀者知有所警也旃遮摩納出曜經作旃摩那祗興起行經乃作旃沙蓋旃遮是名摩納是婆羅門姓也西域風俗先名後姓故婆羅門具云婆羅賀摩拏今云摩納即摩拏字形稍差又略上三字偏稱摩納耳興起行經云佛為六師等諸比丘及諸王臣清信士女說法之時以宿業故旃沙多舌童女繫盂起腹來於佛前謗曰瞿曇沙門何以不說家事乃說他事今汝自樂不知我苦汝先共我通使我有身今當臨月事須酥油以養小兒盡當給我爾時眾會皆低頭默然時釋提桓因化作一鼠入其衣裏嚙盂繫斷忽然落地眾等見已皆大歡喜孫陀利未詳譯語準孫陀羅譯云好愛又云端正疑孫陀利即孫陀羅梵音稍異是婆羅門女名也佛言往昔波羅奈城有博戲人名淨眼時有婬女名鹿相淨眼誘此女人共車出城至樹園中相為娛樂時彼園中有辟支佛修行道法淨眼待辟支佛入城乞食遂殺鹿相埋辟支佛廬中後累辟支佛將至死地淨眼見已即起悲心我所造作白當受故自說罪因國王即殺淨眼時彼淨眼則我身是彼鹿相者孫陀利女是又寶積經去來方便會中云諸婆羅門殺婆羅門女孫陀利埋祗洹園塹中爾時如來知孫陀利女命根將盡必為他殺以此方便令諸外道不善障露墮不如意處令多眾生生清淨心增善根故空鉢而出者大智度論云佛昔一時於舍婆提國受歲竟阿難從佛遊行欲到婆羅門城彼城有王知佛神德今來到此誰復樂我便作制限若有與佛食者輸五百金錢制已佛到其國將阿難持鉢入城乞食眾人皆閉門不應佛因空鉢而出此諸問意總謂佛得一切種智超諸心量云何不離諸過耶佛告大慧諦聽諦聽善思念之當為汝說大慧白佛言善哉世尊唯然受教佛告大慧為無餘涅槃故說誘進行菩薩行者故此及餘世界修菩薩行者樂聲聞乘涅槃為令離聲聞乘進向大乘化佛授聲聞記非是法佛將酬前問且立答意謂五問中義若權若實若事若理皆為無餘涅槃誘進修菩薩行者故又為怖大樂小者令離著故又明化佛授聲聞記非是法佛輔行云大慧問佛如來何故授聲聞記佛言三意故記一為入無餘界者密勸修菩薩行故二為此界他土菩薩樂求聲聞涅槃者勸捨此心修大行故三變化佛授聲聞記非法性佛然授聲聞記與菩薩不異此是秘密說也又云若聞法華是顯露記不同方等隱密與記若據斯理淨名大品皆應有之何獨楞伽又云當知大慧發起密說是故問授記之事大慧因是故記諸聲聞與菩薩不異大慧不異者聲聞緣覺諸佛如來煩惱障斷解脫一味非智障斷大慧智障者見法無我殊勝清淨煩惱障者先習見人無我斷七識滅法障解脫識藏習滅究竟清淨此答第一問也因是故者牒上三意以起答文也不異下明有異不異之義也不異者謂三乘同斷煩惱障同得一味解脫故言不異若其異者則佛菩薩智障永斷而諸聲聞未斷智障今約煩惱障斷暫言不異非謂智障斷也智障下明二障斷相謂智障斷者見法無我得諦理殊勝清淨是智障斷相煩惱障斷者先所修習見人無我已則煩惱障斷七識滅也以法障解脫故藏識習因亦滅二障既滅則得究竟清淨因本住法故前後非性無盡本願故如來無慮無察而演說法正智所化故念不妄故無慮無察四住地無明住地習氣斷故二煩惱障斷離二種死覺人法無我及二障斷此答第二問也謂本住法三際平等湛然一心故云前後非性如來本願稱性周普故無盡也以本住故無慮無察以願無盡故而演說法正智所化者正中道義謂以中道之智被物念離有無故不妄也說即非說度生同空故又稱云無慮無察此由如來斷盡諸障圓具三覺故爾大慧心意意識眼識等七剎那習氣因善無漏品離不復輪轉大慧如來藏者輪轉涅槃苦樂因空亂意慧愚痴凡夫所不能覺大慧金剛力士所隨護者是化佛耳非真如來大慧真如來者離一切根量一切凡夫聲聞緣覺及外道根量悉滅得現法樂住無間法智忍故非金剛力士所護此答第三問也謂眼識等七是剎那習氣因修善無漏品則離此七不復輪轉是故不能與生死苦樂作因唯如來藏常住不滅能與生死涅槃作因此非凡小所能覺也空亂意慧者謂空慧亂意慧也空屬二乘亂屬外道金剛所護者是化佛隱覆之迹非真法佛之本也真如來下牒明法佛本義謂法佛離諸心量一切凡小心量悉滅得現前法樂及住持平等法忍無間魏譯作平等離對所對眾魔所不能動故非力士所護一切化佛不從業生化佛者非佛不離佛因陶家輪等眾生所作相而說法非自通處說自覺境界此答第五問也謂化佛非真隨機現相說法亦從權耳由是不從自通業行所生也化佛權現故非佛去法無化故不離佛如月臨四海萬影同真佛應羣生眾權皆實因陶家輪眾生作相說法者謂諸眾生輪轉六道互為昇降如陶家之輪如來現身亦同勝劣此非法佛自通及說自覺境界復次大慧愚夫依七識身滅起斷見不覺識藏故起常見自妄想故不知本際自妄想慧滅故解脫四住地無明住地習氣斷故一切過斷此答第四問也謂彼愚夫依七識身剎那滅處則起斷見見相續處不知是藏識體則起常見然諸生滅從自妄想生以妄想故本際虗妄故不知也若自妄想慧滅則得解脫生死本際四住下明其滅妄想得解脫之斷德也爾時世尊欲重宣此義而說偈言三乘亦非乘如來不磨滅一切佛所說說離諸過惡三乘權設則乘非乘也化佛非真然不離法故不磨滅一切佛所同說者謂同說佛離諸過也為諸無間智及無餘涅槃誘進諸下劣是故隱覆說此頌初文三意也諸佛所起智即分別說道諸乘非為乘彼則非涅槃謂諸佛以如實所起智分別說彼諸乘非為實乘彼所得涅槃亦非實處欲色有及見說是四住地意識之所起識宅意所住欲等四住由意所起意以識藏為宅依之而住意及眼識等斷滅說無常或作涅槃見而為說常住謂前七識剎那斷滅故說無常見無常即著於斷識藏相續作涅槃見計以為實則著於常爾時大慧菩薩以偈問曰彼諸菩薩等志求佛道者酒肉及與葱飲食為云何惟願無上尊哀愍為演說愚夫所貪著臭穢無名稱虎狼所甘嗜云何而可食食者生諸過不食為福善惟願為我說食不食罪福葱者五辛之總名也然雖獨舉意實兼之是故後偈云一切肉與葱及諸韭薤等五辛者梵網經云一大蒜二茖葱即薤也三慈葱乃葱之正名也四蘭葱即小蒜也雜阿含經云非小蒜是木葱即韭也五興渠又云興宜葉如蔓菁根如蘿蔔生熟皆臭如蒜出于闐國此方無故不翻大慧菩薩說偈問已復白佛言惟願世尊為我等說食不食肉功德過惡我及諸菩薩於現在未來當為種種希望食肉眾生分別說法令彼眾生慈心相向得慈心已各於住地清淨明了疾得究竟無上菩提聲聞緣覺自地止息已亦得速成無上菩提惡邪論法諸外道輩邪見斷常顛倒計著尚有遮法不聽食肉況復如來世間救護正法成就而食肉耶佛告大慧善哉善哉諦聽諦聽善思念之當為汝說大慧白佛言唯然受教佛告大慧有無量因緣不應食肉然我今當為汝當說謂一切眾生從本已來展轉因緣常為六親以親想故不應食肉驢騾駱駝狐狗牛馬人獸等肉屠者雜賣故不應食肉不淨氣分所生長故不應食肉眾生聞氣悉生恐怖如旃陀羅及譚婆等狗見憎惡驚怖羣吠故不應食肉旃陀羅譯云嚴幟謂持杖搖鈴以惡幟自嚴故又云屠者譚婆譯云食狗肉人又令修行者慈心不生故不應食肉凡愚所嗜臭穢不淨無善名稱故不應食肉令諸呪術不成就故不應食肉以殺生者見形起識深味著故不應食肉食肉之人見彼禽獸之形起於識想深生味著故不應食彼食肉者諸天所棄故不應食肉首楞云十方天仙嫌其臭穢咸皆遠離諸餓鬼等因其食次舐其唇吻常與鬼住令口氣臭故不應食肉多惡夢故不應食肉空閑林中虎狼聞香故不應食肉令飲食無節量故不應食肉如彼飽飫之徒烹調五鼎炮炙八珍於飲食無節者奚以過此令修行者不生厭離故不應食肉我常說言凡所飲食作食子肉想作服藥想故不應食肉聽食肉者無有是處佛誡食肉之人作食子肉想以制其心復制比丘乞食人間不自熟食凡食不別精麤食者為療饑故作服藥想療饑求食豈必於肉復次大慧過去有王名師子蘇陀娑食種種肉遂至食人臣民不堪即便謀反斷其俸祿以食肉者有如是過故不應食肉此示食肉有過之微也王名師子蘇陀娑魏譯作師子奴唐譯作師子生據奴生二義蓋是蘇陀娑之譯語耳考其立名之由者唐譯云昔有一王乘馬遊獵馬驚奔逸入於山險既無歸路又絕人居有牝師子與同遊處遂行醜行生諸子息其最長者名曰斑足後得作王領七億家食肉不厭初食禽獸後乃至人此似立名之由也復次大慧凡諸殺者為財利故殺生屠販彼諸愚癡食肉眾生以錢為網而捕諸肉彼殺生者若以財物若以鈎網取彼空行水陸眾生種種殺害屠販求利大慧亦無不教不求不想而有魚肉以是義故不應食肉此示殺因也以二因故殺一因財利二因貪食凡諸下因利故殺者也彼諸下因食故殺者也彼殺下謂因殺故造諸殺具或以食或以利殺諸眾生是故不應食肉集註云世間之肉未有不殺而得肉者縱使不教不求不想而得之是必從於殺也故不應食大慧我有時說遮五種肉或制十種今於此經一切種一切時開除方便一切悉斷集註云諸經遮制五種十種以不能頓斷眾生食肉故尚有開除方便今此經中一切悉斷為最後清淨明誨十種者謂人蛇象馬龍狐猪狗師子獼猴五種者謂不見不聞不疑自死鳥殘大慧如來應供等正覺尚無所食況食魚肉亦不教人集註云如來但以法喜禪悅為味故無所食況於淨不淨肉豈教他人食之耶以大悲前行故視一切眾生猶如一子是故不聽令食子肉大悲前行者謂世尊度生以大悲為前導故無苦不無樂不與等視眾生猶如一子是故不聽食肉也子肉子字承上一子意謂等視眾生作一子想食眾生肉即食子肉爾時世尊欲重宣此義而說偈言曾昔為親屬鄙穢不淨雜不淨所生長聞氣悉恐怖一切肉與葱及諸韭薤等種種放逸酒修行常遠離放逸酒者酒能發人貪嗔欲惡家國滅亡故禮有生禍之規書著崇飲之旨世教尚爾況修無上菩提而不戒之哉靡惡不從此發故稱放逸酒也是故智論開三十五失始於現生虛乏終於來世愚癡四分律又明三十六失始於不孝父母不敬三寶終於落水失火凍死熱亡酒過如此修出世行者應制亦常離麻油及諸穿孔牀以彼諸細蟲於中極恐怖新說云自下諸偈多示其過悉令遠離少頌長行言離麻油者外國風俗擣麻使生蟲合壓之規多汁益肥如何可食及孔隙諸牀多有蟲聚皆不可坐臥以諸蟲於坐臥之時生驚怖故飲食生放逸放逸生諸覺從覺生貪欲是故不應食覺謂惡覺也由食生貪欲貪令心迷醉迷醉長愛欲生死不解脫為利殺眾生以財網諸肉二俱是惡業死墮叫呼獄若無教想求則無三淨肉彼非無因有是故不應食新說云既無教想求則三淨肉非有凡諸肉者皆殺命而得如何可食彼諸修行者由是悉遠離十方佛世尊一切咸訶責展轉更相食死墮虎狼類臭穢可厭惡所生常愚癡多生旃陀羅獵師譚婆種或生陁夷尼陀夷尼魏譯作羅剎女及諸食肉性羅剎猫狸等徧於是中生死墮虎狼類猶約近而言也諸經皆云先墮地獄經無數劫復入餓鬼餓鬼罪畢方作畜生酬償先債償債畢已始復人身三途劇報動經塵劫覩此應生怖畏速戒可也所生下謂雖復人身殺習未盡故作旃陀羅等縛象與大雲央掘利摩羅縛象魏譯作象掖唐譯作象脇央掘利摩羅西域記譯云指鬘皆如來所說經名及此楞伽經我悉制斷肉諸佛及菩薩聲聞所訶責食已無慚愧生生常癡冥先說見聞疑已斷一切肉妄想不覺知故生食肉處集註云佛先所說見聞疑殺等肉不應食之而彼愚夫不明如來所制淨不淨肉悉已令斷於開遮方便處起諸妄想謂聽食其淨肉如彼貪欲過障礙聖解脫酒肉葱韭蒜悉為聖道障未來世眾生於肉愚癡說言此淨無罪佛聽我等食食如服藥想亦如食子肉知足生厭離修行行乞食安住慈心者我說常厭離虎狼諸惡獸恒可同遊止若食諸血肉眾生悉恐怖是故修行者慈心不食肉以不食故永絕冤對縱虎狼之惡可同遊止人若無慈殺心偏盛物見生怖或飛或走豈獨生怖亦復含嗔由是群吠屠狗追逐啣齧雖無害於此物固傷其類耳食肉無慈慧永背正解脫及違聖表相是故不應食新說云背正解脫者由無慈慧虧利自他及違聖人護生儀表得生梵志種及諸修行處智慧富貴家斯由不食肉前明食肉之過此示不食之功總答大慧食不食肉功德過惡之問也是經大部未至來此土者佛語心一品耳一品問答唯談一心此心之邪正偏圓全經具顯然而妙心既明群邪既破無復所事矣是心雖明壇穢不止則慈慧不發正觀不淨正行不勤卒難臻其妙域故以斷肉一章結其全義良有以也是猶首楞立三漸次除助因刳正性違現業者同耳閣筆偈筆底楞伽一字無浮雲散去月明孤恩深欲報辭難盡塵劫分身舌不枯楞伽經參訂疏後䟦緬惟吾心之體也不遺照而恒寂謂之妙非反寂而恒照謂之明妙而明明而妙體用互回偏正兼到此非人情可以盡之也於是凡外之流各建綱宗發明心旨然皆不得其正何也據其情量言之不越乎有無等四句故也是故迦文委悉披剝曲盡幽致使其理極情忘而自悟也以其悟故始覺吾心之自聖如演若狂歇頭非外來本然其頭曾無得失吾心之本體亦復然耳然而背此心論迷悟證此心則迷悟兩途俱為剩語而況經之與疏乎夫以斯道覺斯民則此經言言皆心何可廢也惜乎其辭質其義微學者未之解然後疏而通之則疏獨非其心乎茲疏也其言切其旨平無支離汗漫之習直明本經使諸學者過目了然會文歸己恍若披雲霧而見青天吾願足矣若其流芳貽惠施者之功居多我何與焉時萬曆三十七年歲次己酉秋八月既望西湖秦亭山沙門釋迦廣莫和南謹識
